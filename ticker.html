<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ticker OBS PRO</title>

<style>
body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: Arial;
}

#ticker-container {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: #ff0000;
    color: white;
    display: flex;
    align-items: center;
    font-size: 26px;
    font-weight: bold;
    overflow: hidden;
}

#ticker-content {
    position: absolute;
    white-space: nowrap;
    will-change: transform;
}
</style>
</head>

<body>

<div id="ticker-container">
    <div id="ticker-content">Esperando mensajes...</div>
</div>

<script>
let ultimoTexto = "";
const pxPorSegundo = 100;

const ticker = document.getElementById('ticker-content');
let posicionX = window.innerWidth;
let ultimoTiempo = performance.now();

function moverTicker(t) {
    let delta = (t - ultimoTiempo) / 1000;
    ultimoTiempo = t;

    posicionX -= pxPorSegundo * delta;

    if (posicionX < -ticker.offsetWidth) {
        posicionX = window.innerWidth;
    }

    ticker.style.transform = `translateX(${posicionX}px)`;
    requestAnimationFrame(moverTicker);
}

requestAnimationFrame(moverTicker);

function updateTicker() {
    fetch('api.php?action=get&nocache=' + Date.now())
    .then(r => r.json())
    .then(data => {

        if (data.settings) {
            document.getElementById('ticker-container').style.backgroundColor = data.settings.color;
        }

        let texto = "Esperando mensajes...";

        if (data.messages && data.messages.length > 0) {
            texto = data.messages.map(m => m.text).join('   •   ');
        }

        if (texto !== ultimoTexto) {
            ticker.innerHTML = texto;
            ultimoTexto = texto;

            // 🔥 Reinicia suavemente desde la derecha
            posicionX = window.innerWidth;
        }

    })
    .catch(() => {});
}

setInterval(updateTicker, 3000);
updateTicker();
</script>

</body>
</html>
