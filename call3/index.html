<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARADERO StreamCall PRO - Corregido</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        body.obs-mode { background-color: transparent !important; }

        /* --- LOBBY --- */
        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #0f172a; padding: 20px; text-align: center; }
        .glass-box { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 400px; width: 100%; }
        input { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 1.2rem; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; text-transform: uppercase; }
        
        .quality-select { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; cursor: pointer; }

        .btn { width: 100%; padding: 10px; font-weight: 900; font-size: 0.8rem; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; }
        .btn-blue { background: #3b82f6; color: white; margin-bottom: 5px; }
        .btn-green { background: #10b981; color: black; margin-bottom: 5px; }
        .btn-red { background: #ef4444; color: white; margin-bottom: 5px; }

        /* --- DIRECTOR --- */
        .director-layout { display: flex; flex-direction: column; height: 100vh; background: #000; }
        .director-header { background: #0f172a; border-bottom: 1px solid #334155; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid-container { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 10px; padding: 10px; overflow-y: auto; align-content: center; }
        .slot-card { background: #1e293b; border: 2px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 300px; }
        .slot-video-area { flex: 1; background: #000; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .slot-video { flex: 1; width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 10; }
        
        /* --- GUEST UI --- */
        .guest-layout { width: 100vw; height: 100vh; position: relative; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .guest-video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .guest-tally-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 15px solid transparent; pointer-events: none; transition: border-color 0.3s; z-index: 50; box-sizing: border-box; }
        .guest-layout.tally-live .guest-tally-border { border-color: #ef4444; box-shadow: inset 0 0 50px rgba(239,68,68,0.8); }
        .guest-layout.tally-prev .guest-tally-border { border-color: #22c55e; box-shadow: inset 0 0 50px rgba(34,197,94,0.8); }
        
        .guest-overlay { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; z-index: 100; border: 1px solid #333; }
        .mic-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; transition: 0.2s; background: #334155; color: white; }
        .mic-btn.off { background: #ef4444; }

        /* --- VU METER --- */
        .vu-meter-container { width: 100%; height: 6px; background: #000; position: relative; z-index: 20; }
        .vu-meter-bar { height: 100%; background: linear-gradient(90deg, #22c55e, #facc15, #ef4444); width: 0%; transition: width 0.05s linear; }

        /* --- OBS --- */
        .obs-layout { width: 100vw; height: 100vh; position: relative; background: transparent; }
        .obs-video { width: 100%; height: 100%; object-fit: cover; }
        .obs-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #facc15; padding: 20px; border-radius: 10px; font-weight: bold; }

        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .t-btn.active-live { animation: pulseRed 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const PEER_CONFIG = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } };
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';

        let sharedAudioCtx = null;
        const getAudioContext = () => {
            if (!sharedAudioCtx) sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
            return sharedAudioCtx;
        };

        const VideoPlayer = ({ stream, muted, className, style }) => {
            const videoRef = useRef(null);
            useEffect(() => {
                if (videoRef.current && stream) {
                    videoRef.current.srcObject = stream;
                    videoRef.current.play().catch(e => console.log("Play interceptado"));
                }
            }, [stream]);
            return <video ref={videoRef} className={className} style={style} autoPlay playsInline muted={muted}></video>;
        };

        const VUMeter = ({ stream }) => {
            const barRef = useRef(null);
            useEffect(() => {
                if (!stream || stream.getAudioTracks().length === 0) return;
                let anim, source;
                try {
                    const ctx = getAudioContext();
                    const analyser = ctx.createAnalyser();
                    source = ctx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    const tick = () => {
                        if (!stream.active) return;
                        analyser.getByteFrequencyData(data);
                        let sum = data.reduce((a, b) => a + b, 0);
                        let level = Math.min((sum / data.length) * 2.5, 100);
                        if (barRef.current) barRef.current.style.width = level + '%';
                        anim = requestAnimationFrame(tick);
                    };
                    tick();
                } catch(e) {}
                return () => { if (anim) cancelAnimationFrame(anim); if (source) source.disconnect(); };
            }, [stream]);
            return <div className="vu-meter-container"><div ref={barRef} className="vu-meter-bar"></div></div>;
        };

        // --- VISTA DIRECTOR ---
        const DirectorView = ({ roomName }) => {
            const [slots, setSlots] = useState({ 1: { connected: false, tally: 'idle', stream: null }, 2: { connected: false, tally: 'idle', stream: null }, 3: { connected: false, tally: 'idle', stream: null } });
            const [audioDevices, setAudioDevices] = useState([]);
            const [selectedAudio, setSelectedAudio] = useState('');
            const [talkbackActive, setTalkbackActive] = useState(false);
            const peer = useRef(null);
            const mqttClient = useRef(null);
            const returnStreamRef = useRef(null);

            useEffect(() => {
                mqttClient.current = mqtt.connect(MQTT_BROKER);
                navigator.mediaDevices.enumerateDevices().then(devs => {
                    const audios = devs.filter(d => d.kind === 'audioinput');
                    setAudioDevices(audios);
                    if (audios.length > 0) setSelectedAudio(audios[0].deviceId);
                });
                const myId = `sc_dir_${roomName.toUpperCase()}`;
                peer.current = new Peer(myId, PEER_CONFIG);
                peer.current.on('call', (call) => {
                    const match = call.peer.match(/_(\d+)$/);
                    if (match) {
                        const slotId = parseInt(match[1]);
                        call.answer();
                        call.on('stream', (s) => setSlots(prev => ({ ...prev, [slotId]: { ...prev[slotId], connected: true, stream: s } })));
                    }
                });
                return () => { peer.current?.destroy(); mqttClient.current?.end(); };
            }, [roomName]);

            const handleTally = (slotId, state) => {
                setSlots(prev => ({ ...prev, [slotId]: { ...prev[slotId], tally: state } }));
                mqttClient.current?.publish(`sc_tally/${roomName.toUpperCase()}/${slotId}`, JSON.stringify({ state }), { retain: true });
            };

            const copyLink = (mode, slotId) => {
                const url = `${window.location.origin}${window.location.pathname}?mode=${mode}&room=${roomName}&slot=${slotId}`;
                navigator.clipboard.writeText(url);
                alert("Enlace copiado");
            };

            return (
                <div className="director-layout">
                    <div className="director-header">
                        <h2 className="text-xl font-black text-blue-400">STREAMCALL PRO: {roomName}</h2>
                        <div className="flex gap-2">
                            <select className="bg-black text-white p-2 rounded" value={selectedAudio} onChange={e => setSelectedAudio(e.target.value)}>
                                {audioDevices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || 'Mic'}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="grid-container">
                        {[1, 2, 3].map(id => (
                            <div key={id} className={`slot-card ${slots[id].tally === 'live' ? 'border-red-500' : ''}`}>
                                <div className="slot-video-area">
                                    {slots[id].stream ? <VideoPlayer stream={slots[id].stream} muted={true} className="slot-video" /> : <div className="text-gray-500">MÓVIL {id} OFFLINE</div>}
                                </div>
                                {slots[id].stream && <VUMeter stream={slots[id].stream} />}
                                <div className="p-4 flex justify-between items-center bg-slate-900">
                                    <div className="flex gap-2">
                                        <button className={`p-2 rounded font-bold ${slots[id].tally === 'idle' ? 'bg-gray-600' : 'bg-gray-800'}`} onClick={() => handleTally(id, 'idle')}>OFF</button>
                                        <button className={`p-2 rounded font-bold ${slots[id].tally === 'prev' ? 'bg-green-600' : 'bg-gray-800'}`} onClick={() => handleTally(id, 'prev')}>PREV</button>
                                        <button className={`p-2 rounded font-bold ${slots[id].tally === 'live' ? 'bg-red-600' : 'bg-gray-800'}`} onClick={() => handleTally(id, 'live')}>AIRE</button>
                                    </div>
                                    <div className="flex flex-col gap-1">
                                        <button className="text-[10px] bg-blue-600 p-1 rounded" onClick={() => copyLink('guest', id)}>LINK MÓVIL</button>
                                        <button className="text-[10px] bg-green-600 p-1 rounded" onClick={() => copyLink('obs', id)}>LINK OBS</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- VISTA INVITADO (CORREGIDA) ---
        const GuestView = ({ roomName, slotId }) => {
            const [joined, setJoined] = useState(false);
            const [quality, setQuality] = useState('720');
            const [facingMode, setFacingMode] = useState('user'); // 'user' = frontal, 'environment' = trasera
            const [tally, setTally] = useState('idle');
            const [micMuted, setMicMuted] = useState(false);
            const [camOff, setCamOff] = useState(false);
            
            const peer = useRef(null);
            const localStream = useRef(null);
            const [myStreamState, setMyStreamState] = useState(null);

            const switchCamera = async () => {
                const nextMode = facingMode === 'user' ? 'environment' : 'user';
                try {
                    // 1. IMPORTANTE: Detener tracks de video anteriores para liberar hardware (Fix para celulares)
                    if (localStream.current) {
                        localStream.current.getVideoTracks().forEach(t => t.stop());
                    }

                    const res = { '360': [640,360], '720': [1280,720], '1080': [1920,1080] };
                    
                    // 2. Pedir nuevo flujo con el sensor solicitado
                    const newVideoStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: res[quality][0] }, 
                            height: { ideal: res[quality][1] }, 
                            facingMode: { ideal: nextMode } 
                        }
                    });

                    const newVideoTrack = newVideoStream.getVideoTracks()[0];

                    // 3. Reemplazar track en llamadas PeerJS activas
                    if (peer.current && peer.current.connections) {
                        Object.values(peer.current.connections).forEach(connArray => {
                            connArray.forEach(conn => {
                                if (conn.peerConnection) {
                                    const sender = conn.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                                    if (sender) sender.replaceTrack(newVideoTrack);
                                }
                            });
                        });
                    }

                    // 4. Actualizar localmente manteniendo el audio
                    const audioTrack = localStream.current.getAudioTracks()[0];
                    const combinedStream = new MediaStream([newVideoTrack, audioTrack]);
                    localStream.current = combinedStream;
                    setMyStreamState(combinedStream);
                    setFacingMode(nextMode);

                } catch (e) {
                    alert("Error al cambiar cámara: No disponible.");
                }
            };

            useEffect(() => {
                if (!joined) return;
                const mq = mqtt.connect(MQTT_BROKER);
                mq.on('connect', () => mq.subscribe(`sc_tally/${roomName.toUpperCase()}/${slotId}`));
                mq.on('message', (t, m) => setTally(JSON.parse(m.toString()).state));

                const init = async () => {
                    try {
                        const res = { '360': [640,360], '720': [1280,720], '1080': [1920,1080] };
                        const s = await navigator.mediaDevices.getUserMedia({ 
                            video: { width: { ideal: res[quality][0] }, height: { ideal: res[quality][1] }, facingMode: 'user' },
                            audio: { echoCancellation: true }
                        });
                        localStream.current = s;
                        setMyStreamState(s);
                        
                        peer.current = new Peer(`sc_guest_${roomName.toUpperCase()}_${slotId}`, PEER_CONFIG);
                        peer.current.on('open', () => {
                            setTimeout(() => { peer.current.call(`sc_dir_${roomName.toUpperCase()}`, localStream.current); }, 500);
                        });
                        peer.current.on('connection', (conn) => {
                            conn.on('data', (d) => {
                                if (d === 'WAKE_UP_OBS') peer.current.call(`sc_obs_${roomName.toUpperCase()}_${slotId}`, localStream.current);
                            });
                        });
                    } catch (e) { alert("Error de medios"); }
                };
                init();
                return () => { peer.current?.destroy(); mq.end(); };
            }, [joined]);

            if (!joined) return (
                <div className="lobby-container"><div className="glass-box">
                    <h2 className="text-xl font-bold mb-4">SALA: {roomName} - CH {slotId}</h2>
                    <select className="quality-select" value={quality} onChange={e => setQuality(e.target.value)}>
                        <option value="360">360p (Data Saving)</option>
                        <option value="720">720p (HD)</option>
                        <option value="1080">1080p (Full HD)</option>
                    </select>
                    <button className="btn btn-blue py-4" onClick={() => setJoined(true)}>CONECTAR CÁMARA</button>
                </div></div>
            );

            return (
                <div className={`guest-layout tally-${tally}`}>
                    <div className="guest-tally-border"></div>
                    {myStreamState && (
                        <VideoPlayer 
                            stream={myStreamState} 
                            muted={true} 
                            className="guest-video" 
                            style={{ transform: facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)' }} 
                        />
                    )}
                    <div className="guest-overlay">
                        <div className={`mic-btn ${micMuted?'off':''}`} onClick={() => {
                            localStream.current.getAudioTracks()[0].enabled = micMuted;
                            setMicMuted(!micMuted);
                        }}>{micMuted ? '🔇' : '🎤'}</div>
                        <div className="mic-btn bg-blue-600" onClick={switchCamera}>🔄</div>
                    </div>
                    {tally !== 'idle' && <div className="absolute top-10 font-black text-2xl px-4 py-2 rounded bg-black/50 border border-white">{tally === 'live' ? '🔴 AL AIRE' : '🟢 PREVENIDO'}</div>}
                </div>
            );
        };

        // --- VISTA OBS ---
        const ObsView = ({ roomName, slotId }) => {
            const [stream, setStream] = useState(null);
            const peer = useRef(null);

            useEffect(() => {
                const myId = `sc_obs_${roomName.toUpperCase()}_${slotId}`;
                peer.current = new Peer(myId, PEER_CONFIG);
                peer.current.on('call', (c) => {
                    c.answer();
                    c.on('stream', (s) => setStream(s));
                });
                const interval = setInterval(() => {
                    if (!stream) {
                        const conn = peer.current.connect(`sc_guest_${roomName.toUpperCase()}_${slotId}`);
                        conn?.on('open', () => { conn.send('WAKE_UP_OBS'); setTimeout(() => conn.close(), 500); });
                    }
                }, 3000);
                return () => { peer.current?.destroy(); clearInterval(interval); };
            }, [roomName, slotId, stream]);

            return (
                <div className="obs-layout">
                    {stream ? <VideoPlayer stream={stream} muted={false} className="obs-video" /> : <div className="obs-status">ESPERANDO SEÑAL...</div>}
                </div>
            );
        };

        const App = () => {
            const [route, setRoute] = useState({ mode: 'lobby', room: '', slot: '1' });
            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                if (p.get('mode')) {
                    if (p.get('mode') === 'obs') document.body.classList.add('obs-mode');
                    setRoute({ mode: p.get('mode'), room: p.get('room'), slot: p.get('slot') || '1' });
                }
            }, []);

            if (route.mode === 'lobby') return (
                <div className="lobby-container"><div className="glass-box">
                    <h1 className="text-2xl font-black text-blue-500 mb-6">STREAMCALL PRO</h1>
                    <input placeholder="NOMBRE DE SALA" onChange={e => setRoute({...route, room: e.target.value.toUpperCase()})} />
                    <button className="btn btn-blue" onClick={() => window.location.href=`?mode=director&room=${route.room}`}>CREAR SALA</button>
                </div></div>
            );
            if (route.mode === 'director') return <DirectorView roomName={route.room} />;
            if (route.mode === 'guest') return <GuestView roomName={route.room} slotId={route.slot} />;
            if (route.mode === 'obs') return <ObsView roomName={route.room} slotId={route.slot} />;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
