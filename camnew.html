<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall V10 PRO - Cámara Corregida</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            background: #09090b;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        body.obs-mode {
            background: transparent !important;
        }

        body.light-theme {
            background: #f8f9fa;
            color: #1a1a1a;
        }

        .lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: radial-gradient(circle at center, #18181b 0%, #09090b 100%);
            padding: 20px;
        }

        body.light-theme .lobby-container {
            background: radial-gradient(circle at center, #e5e7eb 0%, #f3f4f6 100%);
        }

        .glass-box {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            max-width: 400px;
            width: 100%;
        }

        body.light-theme .glass-box {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(0, 0, 0, 0.1);
        }

        input,
        select {
            width: 100%;
            background: #121214;
            border: 1px solid #3f3f46;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.2rem;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body.light-theme input,
        body.light-theme select {
            background: #f0f0f0;
            border-color: #d1d5db;
            color: #1a1a1a;
        }

        input:focus,
        select:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-weight: 800;
            font-size: 0.95rem;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin-bottom: 12px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-violet {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
        }

        .btn-emerald {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-rose {
            background: linear-gradient(135deg, #f43f5e, #be123c);
            color: white;
        }

        .btn-dark {
            background: #27272a;
            color: white;
            border: 1px solid #3f3f46;
        }

        .btn-dark:hover:not(:disabled) {
            background: #3f3f46;
        }

        .btn-blue {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .obs-layout {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .obs-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .obs-status {
            position: relative;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            color: #a78bfa;
            padding: 20px 30px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border: 2px solid #a78bfa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .director-layout {
            display: flex;
            height: 100vh;
            position: relative;
        }

        .video-stage {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .director-controls {
            width: 380px;
            background: #0f0f11;
            border-left: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            padding: 20px;
        }

        body.light-theme .director-controls {
            background: #f8f9fa;
            border-left-color: #e5e7eb;
        }

        /* NUEVO: Preview de cámara del Director */
        .director-self-preview {
            width: 100%;
            aspect-ratio: 16/9;
            background: #18181b;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid #3f3f46;
            position: relative;
        }

        .director-self-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .director-self-preview .preview-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(139, 92, 246, 0.9);
            color: white;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        .tally-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .t-btn {
            padding: 16px 5px;
            font-size: 0.8rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            background: #18181b;
            color: #71717a;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .t-btn.active-idle {
            border-color: #52525b;
            color: white;
            background: #27272a;
        }

        .t-btn.active-prev {
            background: rgba(16, 185, 129, 0.15);
            border-color: #10b981;
            color: #34d399;
        }

        .t-btn.active-live {
            background: rgba(244, 63, 94, 0.15);
            border-color: #f43f5e;
            color: #fb7185;
            animation: pulseRose 2s infinite;
        }

        .clean-mode .director-controls {
            display: none !important;
        }

        .exit-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
            background: rgba(225, 29, 72, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s;
        }

        .exit-btn:hover {
            background: rgba(225, 29, 72, 1);
        }

        .guest-layout {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .guest-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .guest-tally-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 12px solid transparent;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 50;
            box-sizing: border-box;
        }

        .guest-layout.tally-live .guest-tally-border {
            border-color: #f43f5e;
            box-shadow: inset 0 0 60px rgba(244, 63, 94, 0.6);
        }

        .guest-layout.tally-prev .guest-tally-border {
            border-color: #10b981;
            box-shadow: inset 0 0 60px rgba(16, 185, 129, 0.6);
        }

        .return-pip {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            aspect-ratio: 16/9;
            background: #111;
            border: 2px solid #52525b;
            border-radius: 16px;
            overflow: hidden;
            z-index: 80;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .return-pip.active {
            opacity: 1;
            pointer-events: auto;
        }

        .return-pip video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pip-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .pip-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            opacity: 0.4;
            pointer-events: none;
        }

        .guest-overlay {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .mic-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.2s;
            background: #27272a;
            color: white;
            border: 1px solid #3f3f46;
        }

        .mic-btn:hover:not(.off) {
            background: #3f3f46;
            transform: scale(1.05);
        }

        .mic-btn.off {
            background: #e11d48;
            border-color: #f43f5e;
        }

        .big-tally-text {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: 800;
            padding: 8px 24px;
            border-radius: 12px;
            z-index: 100;
            text-transform: uppercase;
            display: none;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .guest-layout.tally-live .big-tally-text {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e11d48;
            color: white;
        }

        .guest-layout.tally-prev .big-tally-text {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #10b981;
            color: white;
        }

        .stats-panel {
            background: rgba(24, 24, 27, 0.7);
            border: 1px solid #3f3f46;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            font-size: 0.8rem;
            color: #a1a1a1;
            font-family: 'Courier New', monospace;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        .stat-good {
            color: #10b981;
        }

        .stat-bad {
            color: #ef4444;
        }

        .divider {
            height: 1px;
            background: #3f3f46;
            margin: 15px 0;
        }

        .connection-status {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 100;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .guest-layout .connection-status {
            left: auto;
            right: 15px;
        }

        .conn-connecting {
            background: rgba(251, 191, 36, 0.9);
            color: #000;
        }

        .conn-connected {
            background: rgba(16, 185, 129, 0.9);
            color: #fff;
        }

        .conn-disconnected {
            background: rgba(239, 68, 68, 0.9);
            color: #fff;
        }

        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader {
            border: 4px solid rgba(139, 92, 246, 0.2);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        .error-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #dc2626;
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulseRose {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(244, 63, 94, 0);
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .director-controls {
                width: 100% !important;
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                max-height: 50vh;
                border-left: none;
                border-top: 1px solid #27272a;
            }

            .video-stage {
                height: 50%;
            }

            .return-pip {
                width: 150px;
            }
        }
    </style>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CONFIG = {
            PEER_CONFIG: {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                    ],
                    iceTransportPolicy: 'all'
                }
            },
            MQTT_BROKER: 'wss://broker.emqx.io:8084/mqtt',
            MQTT_USER: 'streamcall',
            MQTT_PASS: 'streamcall123',
        };

        const Logger = {
            logs: [],
            info: (e, d) => { Logger.logs.push({ level: 'info', event: e, data: String(d), ts: Date.now() }); console.log(`[INFO] ${e}:`, d); },
            error: (e, d) => { Logger.logs.push({ level: 'error', event: e, data: String(d), ts: Date.now() }); console.error(`[ERROR] ${e}:`, d); },
            warn: (e, d) => { Logger.logs.push({ level: 'warn', event: e, data: String(d), ts: Date.now() }); console.warn(`[WARN] ${e}:`, d); },
            export: () => {
                const blob = new Blob([JSON.stringify(Logger.logs, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                Object.assign(document.createElement('a'), { href: url, download: `sc-logs-${Date.now()}.json` }).click();
                URL.revokeObjectURL(url);
            }
        };

        const Storage = {
            save: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { } },
            load: (k, d) => { try { const i = localStorage.getItem(k); return i ? JSON.parse(i) : d; } catch (e) { return d; } }
        };

        const RecordingService = {
            recorder: null, chunks: [], isRecording: false,
            start(stream) {
                if (!stream || !stream.getTracks().length) return;
                this.chunks = [];
                const mime = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm', 'video/mp4']
                    .find(m => MediaRecorder.isTypeSupported(m)) || '';
                this.recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
                this.recorder.ondataavailable = e => { if (e.data.size > 0) this.chunks.push(e.data); };
                this.recorder.onstop = () => {
                    const ext = mime.includes('mp4') ? 'mp4' : 'webm';
                    const blob = new Blob(this.chunks, { type: mime || 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    Object.assign(document.createElement('a'), { href: url, download: `sc-${Date.now()}.${ext}` }).click();
                    setTimeout(() => URL.revokeObjectURL(url), 60000);
                };
                this.recorder.start(); this.isRecording = true;
            },
            stop() { if (this.recorder && this.isRecording) { this.recorder.stop(); this.isRecording = false; } }
        };

        const eventBus = {
            listeners: {},
            on(event, cb) { if (!this.listeners[event]) this.listeners[event] = []; this.listeners[event].push(cb); },
            off(event, cb) { if (!this.listeners[event]) return; this.listeners[event] = this.listeners[event].filter(l => l !== cb); },
            emit(event, data) { if (this.listeners[event]) this.listeners[event].forEach(cb => cb(data)); }
        };
        const toast = (msg, type = 'success') => eventBus.emit('toast', { msg, type });

        const Toaster = () => {
            const [toasts, setToasts] = useState([]);
            useEffect(() => {
                const handle = t => {
                    const id = Date.now() + Math.random();
                    setToasts(prev => [...prev, { ...t, id }]);
                    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 3000);
                };
                eventBus.on('toast', handle);
                return () => eventBus.off('toast', handle);
            }, []);
            return (
                <div style={{ position: 'fixed', top: 20, right: 20, zIndex: 99999, display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {toasts.map(t => (
                        <div key={t.id} style={{
                            background: t.type === 'error' ? '#ef4444' : '#10b981', color: 'white',
                            padding: '12px 24px', borderRadius: 8, fontWeight: 'bold',
                            boxShadow: '0 4px 12px rgba(0,0,0,0.3)', animation: 'slideInRight 0.3s ease'
                        }}>
                            {t.msg}
                        </div>
                    ))}
                </div>
            );
        };

        const AudioMeter = ({ stream }) => {
            const [vol, setVol] = useState(0);
            const reqRef = useRef();
            useEffect(() => {
                if (!stream || !stream.getAudioTracks().length) return;
                let ctx, src, analyser;
                try {
                    ctx = new (window.AudioContext || window.webkitAudioContext)();
                    src = ctx.createMediaStreamSource(stream);
                    analyser = ctx.createAnalyser();
                    analyser.fftSize = 256;
                    src.connect(analyser);
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    const render = () => {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                        setVol(sum / dataArray.length);
                        reqRef.current = requestAnimationFrame(render);
                    };
                    render();
                } catch (e) { }
                return () => {
                    cancelAnimationFrame(reqRef.current);
                    if (src) src.disconnect();
                    if (ctx && ctx.state !== 'closed') ctx.close().catch(() => { });
                };
            }, [stream]);

            return (
                <div style={{ width: '50px', height: '6px', background: '#27272a', borderRadius: '3px', overflow: 'hidden', marginTop: '6px' }}>
                    <div style={{ width: `${Math.min(100, vol)}%`, height: '100%', background: vol > 25 ? '#10b981' : '#a78bfa', transition: 'width 0.1s linear' }} />
                </div>
            );
        };

        const StatsPanel = ({ peerRef }) => {
            const [stats, setStats] = useState({ latency: 0, packetLoss: 0, jitter: 0 });
            useEffect(() => {
                const timer = setInterval(async () => {
                    const pc = peerRef.current?.connections ? Object.values(peerRef.current.connections)[0]?.[0]?.peerConnection : null;
                    if (!pc) return;
                    try {
                        const s = await pc.getStats();
                        s.forEach(r => {
                            if (r.type === 'inbound-rtp' && r.kind === 'video') {
                                setStats({
                                    latency: Math.round((r.currentRoundTripTime || 0) * 1000),
                                    packetLoss: +Math.max(0, ((r.packetsLost || 0) / ((r.packetsReceived || 0) + (r.packetsLost || 0) || 1) * 100)).toFixed(2),
                                    jitter: +((r.jitter || 0) * 1000).toFixed(2),
                                });
                            }
                        });
                    } catch (e) { }
                }, 2000);
                return () => clearInterval(timer);
            }, [peerRef]);

            return (
                <div className="stats-panel">
                    <div className="stat-line"><span>Latencia:</span><span className={stats.latency < 100 ? 'stat-good' : 'stat-bad'}>{stats.latency} ms</span></div>
                    <div className="stat-line"><span>Pérdida:</span><span className={stats.packetLoss < 1 ? 'stat-good' : 'stat-bad'}>{stats.packetLoss}%</span></div>
                    <div className="stat-line"><span>Jitter:</span><span className={stats.jitter < 30 ? 'stat-good' : 'stat-bad'}>{stats.jitter} ms</span></div>
                </div>
            );
        };

        const ConnectionStatus = ({ state }) => {
            const labels = {
                connecting: 'Conectando...',
                connected: 'Conectado',
                disconnected: 'Desconectado',
                failed: 'Error de conexión'
            };
            return (
                <div className={`connection-status conn-${state}`}>
                    <span className="conn-dot"></span>
                    {labels[state] || state}
                </div>
            );
        };

        /* ════════════════════════════════════════════════════════════
           DIRECTOR / OBS VIEW - CON RETORNO DE CÁMARA
           ════════════════════════════════════════════════════════════ */
        const ReceiverView = ({ roomName, isObsMode }) => {
            const [status, setStatus] = useState('BUSCANDO...');
            const [connected, setConnected] = useState(false);
            const [connState, setConnState] = useState('connecting');
            const [tally, setTally] = useState('idle');
            const [cleanMode, setCleanMode] = useState(false);
            const [audioDevices, setAudioDevices] = useState([]);
            const [videoDevices, setVideoDevices] = useState([]);
            const [selectedAudio, setSelectedAudio] = useState('');
            const [selectedVideo, setSelectedVideo] = useState('');
            const [micMuted, setMicMuted] = useState(false);
            const [camMuted, setCamMuted] = useState(true);
            const [returnEnabled, setReturnEnabled] = useState(true);
            const [rec, setRec] = useState(false);
            const [remoteRec, setRemoteRec] = useState(false);
            const [err, setErr] = useState(null);

            const peerRef = useRef(null);
            const videoRef = useRef(null);
            const audioRef = useRef(null);
            const selfVideoRef = useRef(null);
            const mqttRef = useRef(null);
            const dirStreamRef = useRef(null);  // Stream del Director (audio + video)
            const recRef = useRef(false);
            const timerStats = useRef(null);
            const selectedARef = useRef('');
            const selectedVRef = useRef('');
            const activeCallRef = useRef(null);

            useEffect(() => { recRef.current = rec; }, [rec]);
            useEffect(() => { selectedARef.current = selectedAudio; }, [selectedAudio]);
            useEffect(() => { selectedVRef.current = selectedVideo; }, [selectedVideo]);

            useEffect(() => {
                init();
                const handleBeforeUnload = () => {
                    if (recRef.current) RecordingService.stop();
                    dirStreamRef.current?.getTracks().forEach(t => t.stop());
                    peerRef.current?.destroy();
                    mqttRef.current?.end();
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => {
                    window.removeEventListener('beforeunload', handleBeforeUnload);
                    clearInterval(timerStats.current);
                    try {
                        if (recRef.current) RecordingService.stop();
                        dirStreamRef.current?.getTracks().forEach(t => t.stop());
                        peerRef.current?.destroy();
                        mqttRef.current?.end();
                    } catch (e) { }
                };
            }, [roomName, isObsMode]);

            // NUEVO: Adquirir stream del Director (AUDIO + VIDEO para retorno)
            const acquireDirectorStream = async () => {
                try {
                    // Detener stream anterior
                    dirStreamRef.current?.getTracks().forEach(t => t.stop());

                    const constraints = {
                        audio: selectedARef.current
                            ? { deviceId: { exact: selectedARef.current }, echoCancellation: true, noiseSuppression: true }
                            : { echoCancellation: true, noiseSuppression: true },
                        video: selectedVRef.current
                            ? { deviceId: { exact: selectedVRef.current }, width: { ideal: 640 }, height: { ideal: 360 } }
                            : { width: { ideal: 640 }, height: { ideal: 360 } }
                    };

                    dirStreamRef.current = await navigator.mediaDevices.getUserMedia(constraints);

                    // Mostrar preview propio
                    if (selfVideoRef.current) {
                        selfVideoRef.current.srcObject = dirStreamRef.current;
                        selfVideoRef.current.play().catch(() => { });
                    }

                    // MANTENER ESTADO: Aplicar mute a los nuevos tracks si el usuario estaba muteado
                    const vt = dirStreamRef.current.getVideoTracks()[0];
                    if (vt) vt.enabled = !camMuted;
                    const at = dirStreamRef.current.getAudioTracks()[0];
                    if (at) at.enabled = !micMuted;

                    Logger.info('DirStream', 'adquirido - audio:' + dirStreamRef.current.getAudioTracks().length + ' video:' + dirStreamRef.current.getVideoTracks().length);
                } catch (e) {
                    Logger.warn('DirStream', e.message);
                    // Fallback: solo audio
                    try {
                        dirStreamRef.current = await navigator.mediaDevices.getUserMedia({
                            audio: { echoCancellation: true, noiseSuppression: true }
                        });

                        // AÑADIR BLACK CANVAS VIDEO TRACK PARA MANTENER SENDER ABIERTO Y PERMITIR REPLACE
                        const canvas = document.createElement('canvas');
                        canvas.width = 640; canvas.height = 360;
                        const ctx = canvas.getContext('2d');
                        setInterval(() => {
                            ctx.fillStyle = '#09090b';
                            ctx.fillRect(0, 0, 640, 360);
                            ctx.fillStyle = '#3f3f46';
                            ctx.font = '24px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText('Cámara Bloqueada o No Disponible', 320, 180);
                        }, 1000);
                        const canvasStream = canvas.captureStream(15);
                        const canvasVideoTrack = canvasStream.getVideoTracks()[0];
                        if (canvasVideoTrack) {
                            dirStreamRef.current.addTrack(canvasVideoTrack);
                            Logger.info('DirStream', 'añadido track de video artificial (fallback)');
                        }

                        Logger.info('DirStream', 'fallback a solo audio completado');
                    } catch (e2) {
                        dirStreamRef.current = null;
                    }
                }
            };

            const init = async () => {
                try {
                    if (!isObsMode) {
                        const devs = await navigator.mediaDevices.enumerateDevices();
                        const aDevs = devs.filter(d => d.kind === 'audioinput');
                        const vDevs = devs.filter(d => d.kind === 'videoinput');
                        setAudioDevices(aDevs);
                        setVideoDevices(vDevs);

                        const savedA = Storage.load('sa', aDevs[0]?.deviceId || '');
                        const savedV = Storage.load('sv', vDevs[0]?.deviceId || '');
                        setSelectedAudio(savedA);
                        setSelectedVideo(savedV);
                        selectedARef.current = savedA;
                        selectedVRef.current = savedV;

                        // Adquirir stream del Director (audio + video)
                        await acquireDirectorStream();

                        mqttRef.current = window.mqtt.connect(CONFIG.MQTT_BROKER, {
                            clientId: `dir_${Date.now()}`,
                            username: CONFIG.MQTT_USER,
                            password: CONFIG.MQTT_PASS,
                            clean: true
                        });
                        mqttRef.current.on('connect', () => {
                            mqttRef.current.subscribe(`sc_rec_guest/${roomName}`);
                            // Enviar estado inicial de retorno
                            mqttRef.current.publish(`sc_return/${roomName}`, JSON.stringify({ camMuted: true, micMuted: false }), { retain: true });
                        });
                        mqttRef.current.on('message', (_, payload) => {
                            try {
                                const d = JSON.parse(payload.toString());
                                if (d.recording !== undefined) setRemoteRec(d.recording);
                            } catch (e) { }
                        });
                        mqttRef.current.on('error', e => Logger.warn('MQTT-dir', e.message));
                    }

                    const myId = isObsMode
                        ? `obs_${roomName.toUpperCase()}`
                        : `dir_${roomName.toUpperCase()}`;

                    peerRef.current = new Peer(myId, CONFIG.PEER_CONFIG);

                    peerRef.current.on('open', () => {
                        setStatus('LISTO');
                        setConnState('connected');
                    });

                    peerRef.current.on('call', handleCall);

                    peerRef.current.on('error', e => {
                        Logger.error('Peer-dir', e.type);
                        setConnState('failed');
                        if (e.type !== 'peer-unavailable') setErr(e.type);
                    });

                    timerStats.current = setInterval(() => {
                        const conns = Object.values(peerRef.current?.connections || {});
                        const pc = conns[0]?.[0]?.peerConnection;
                        if (pc) {
                            if (pc.iceConnectionState) {
                                setConnState(pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed' ? 'connected' : pc.iceConnectionState);
                            }
                        }
                    }, 2000);

                } catch (e) {
                    Logger.error('Dir-init', e.message);
                    setConnState('failed');
                    setErr(e.message);
                }
            };

            const handleCall = (call) => {
                try {
                    activeCallRef.current = call;

                    // NUEVO: Responder con el stream del Director (audio + video)
                    let answerStream = dirStreamRef.current;
                    if (!answerStream) {
                        // Fallback: stream vacío con pista de audio silenciosa
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const dest = ctx.createMediaStreamDestination();
                        answerStream = dest.stream;
                    }

                    call.answer(answerStream);

                    call.on('stream', guestStream => {
                        if (videoRef.current) {
                            videoRef.current.srcObject = guestStream;
                            videoRef.current.play().catch(() => { });
                        }
                        if (audioRef.current) {
                            audioRef.current.srcObject = guestStream;
                            audioRef.current.play().catch(() => { });
                        }
                        setConnected(true);
                        setConnState('connected');
                        setStatus('ONLINE');
                        setErr(null);
                        if (recRef.current && !RecordingService.isRecording) {
                            RecordingService.start(guestStream);
                        }
                        Logger.info('Dir-stream', 'Guest stream recibido');
                    });

                    call.on('close', () => {
                        setConnected(false);
                        setConnState('disconnected');
                    });
                    call.on('error', e => {
                        setErr(e.message);
                        setConnState('failed');
                    });
                } catch (e) {
                    Logger.error('Dir-handleCall', e.message);
                }
            };

            // NUEVO: Cambiar dispositivo de video
            const changeVideo = async () => {
                await acquireDirectorStream();

                // Reemplazar tracks en conexiones activas
                const newStream = dirStreamRef.current;
                if (!newStream) return;

                const conns = Object.values(peerRef.current?.connections || {}).flat();
                for (const conn of conns) {
                    const pc = conn.peerConnection;
                    if (!pc) continue;

                    // Reemplazar video
                    const newVideoTrack = newStream.getVideoTracks()[0];
                    const videoSender = pc.getSenders().find(s => s.track?.kind === 'video');
                    if (videoSender && newVideoTrack) {
                        videoSender.replaceTrack(newVideoTrack).catch(e => Logger.warn('replaceVideo', e.message));
                    }

                    // Reemplazar audio
                    const newAudioTrack = newStream.getAudioTracks()[0];
                    const audioSender = pc.getSenders().find(s => s.track?.kind === 'audio');
                    if (audioSender && newAudioTrack) {
                        audioSender.replaceTrack(newAudioTrack).catch(e => Logger.warn('replaceAudio', e.message));
                    }
                }
            };

            const changeMic = async () => {
                await acquireDirectorStream();
                const newTrack = dirStreamRef.current?.getAudioTracks()[0];
                if (!newTrack) return;

                const conns = Object.values(peerRef.current?.connections || {}).flat();
                if (conns.length === 0) return;

                for (const conn of conns) {
                    const sender = conn.peerConnection?.getSenders().find(s => s.track?.kind === 'audio');
                    if (sender) {
                        sender.replaceTrack(newTrack).catch(e => Logger.warn('replaceTrack', e.message));
                    }
                }
            };

            const toggleMicMute = () => {
                const tracks = dirStreamRef.current?.getAudioTracks() || [];
                if (!tracks.length) return;
                tracks[0].enabled = !tracks[0].enabled;
                const isMuted = !tracks[0].enabled;
                setMicMuted(isMuted);
                mqttRef.current?.publish(`sc_return/${roomName}`, JSON.stringify({ micMuted: isMuted }), { retain: true });
            };

            const toggleCamMute = () => {
                const tracks = dirStreamRef.current?.getVideoTracks() || [];
                if (!tracks.length) return;
                tracks[0].enabled = !tracks[0].enabled;
                const isMuted = !tracks[0].enabled;
                setCamMuted(isMuted);
                mqttRef.current?.publish(`sc_return/${roomName}`, JSON.stringify({ camMuted: isMuted }), { retain: true });
            };

            const tally_set = s => {
                setTally(s);
                mqttRef.current?.publish(`sc_tally/${roomName}`, JSON.stringify({ state: s }), { retain: true });
            };

            const copy_link = m => {
                const safeRoom = roomName.replace(/[^a-zA-Z0-9]/g, '');
                const u = `${window.location.href.split('?')[0]}?mode=${m}&room=${safeRoom}`;
                navigator.clipboard.writeText(u).then(() => toast('✓ Enlace copiado al portapapeles'));
            };

            if (isObsMode) return (
                <div className="obs-layout">
                    <video ref={videoRef} className="obs-video" autoPlay playsInline muted />
                    <audio ref={audioRef} autoPlay playsInline style={{ display: 'none' }} />
                    {!connected && <div className="obs-status"><div className="loader" /> {status}</div>}
                    {err && <div className="error-toast">{err}</div>}
                </div>
            );

            return (
                <div className={`director-layout ${cleanMode ? 'clean-mode' : ''}`}>
                    {cleanMode && <div className="exit-btn" onClick={() => setCleanMode(false)}>✕ Salir</div>}
                    <div className="video-stage">
                        <ConnectionStatus state={connState} />
                        <video ref={videoRef} className="remote-video" autoPlay playsInline muted />
                        <audio ref={audioRef} autoPlay playsInline style={{ display: 'none' }} />
                        {!connected && <div style={{ position: 'absolute', color: '#71717a' }}>📡 {status}</div>}
                    </div>
                    <div className="director-controls">
                        <h2 style={{ fontSize: '1.1rem', fontWeight: 800, background: 'linear-gradient(135deg,#a78bfa,#d8b4fe)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '20px', textAlign: 'center' }}>
                            📡 StreamCall PRO
                        </h2>


                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                            <label style={{ color: '#a78bfa', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🎙 Micrófono Retorno</label>
                            {!micMuted && connected && <AudioMeter stream={dirStreamRef.current} />}
                        </div>
                        <select value={selectedAudio} onChange={e => {
                            setSelectedAudio(e.target.value);
                            Storage.save('sa', e.target.value);
                            selectedARef.current = e.target.value;
                            if (connected) changeMic();
                        }}>
                            <option value="">-- Seleccionar micrófono --</option>
                            {audioDevices.map(d => (
                                <option key={d.deviceId} value={d.deviceId}>{d.label || 'Micrófono'}</option>
                            ))}
                        </select>

                        {/* NUEVO: Selector de cámara */}
                        <label style={{ color: '#a78bfa', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>📷 Cámara Retorno</label>
                        <select value={selectedVideo} onChange={e => {
                            setSelectedVideo(e.target.value);
                            Storage.save('sv', e.target.value);
                            selectedVRef.current = e.target.value;
                            if (connected) changeVideo();
                        }}>
                            <option value="">-- Seleccionar cámara --</option>
                            {videoDevices.map(d => (
                                <option key={d.deviceId} value={d.deviceId}>{d.label || 'Cámara'}</option>
                            ))}
                        </select>

                        <div style={{ display: 'flex', gap: '10px' }}>
                            <button className={`btn ${micMuted ? 'btn-rose' : 'btn-dark'}`} onClick={toggleMicMute} disabled={!connected} style={{ flex: 1 }}>
                                {micMuted ? '🔇' : '🎤'}
                            </button>
                            <button className={`btn ${camMuted ? 'btn-rose' : 'btn-blue'}`} onClick={toggleCamMute} disabled={!connected} style={{ flex: 1 }}>
                                {camMuted ? '📵' : '📹'}
                            </button>
                        </div>

                        <div className="divider" />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>⏺ Grabación</label>
                        <button className={`btn ${rec ? 'btn-rose' : 'btn-emerald'}`} disabled={!connected}
                            onClick={() => {
                                const newState = !rec;
                                if (newState) {
                                    if (videoRef.current?.srcObject) { RecordingService.start(videoRef.current.srcObject); }
                                    else { setErr('Sin stream activo'); return; }
                                } else {
                                    RecordingService.stop();
                                }
                                recRef.current = newState; setRec(newState);
                                mqttRef.current?.publish(`sc_rec/${roomName}`, JSON.stringify({ recording: newState }), { retain: true });
                            }}>
                            {rec ? '⏹ Parar grabación' : '⏺ Grabar'}
                        </button>
                        {remoteRec && <div style={{ background: 'rgba(225,29,72,0.1)', color: '#fb7185', padding: 10, borderRadius: 8, textAlign: 'center', marginTop: 10, fontWeight: 'bold', border: '1px solid rgba(244,63,94,0.3)', animation: 'pulseRose 2s infinite' }}>🔴 Guest Grabando (Local)</div>}

                        <div className="divider" />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🔗 Compartir</label>
                        <button className="btn btn-emerald" onClick={() => copy_link('obs')}>📺 Copiar Link OBS</button>
                        <button className="btn btn-dark" onClick={() => copy_link('guest')}>👤 Copiar Link Guest</button>

                        <div className="divider" />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🚦 Tally</label>
                        <div className="tally-grid">
                            <button className={`t-btn ${tally === 'idle' ? 'active-idle' : ''}`} onClick={() => tally_set('idle')}>OFF</button>
                            <button className={`t-btn ${tally === 'prev' ? 'active-prev' : ''}`} onClick={() => tally_set('prev')}>PREV</button>
                            <button className={`t-btn ${tally === 'live' ? 'active-live' : ''}`} onClick={() => tally_set('live')}>AIRE</button>
                        </div>

                        {connected && <StatsPanel peerRef={peerRef} />}
                        <button className="btn btn-dark" onClick={() => setCleanMode(true)}>⛶ Modo Limpio</button>
                    </div>
                    {err && <div className="error-toast">{err}</div>}
                </div>
            );
        };

        /* ════════════════════════════════════════════════════════════
           GUEST VIEW - CON CAMBIO DE CÁMARA CORREGIDO
           ════════════════════════════════════════════════════════════ */
        const GuestView = ({ roomName }) => {
            const [joined, setJoined] = useState(false);
            const [quality, setQuality] = useState(Storage.load('pq', '720'));
            const [tally, setTally] = useState('idle');
            const [micOff, setMicOff] = useState(false);
            const [camOff, setCamOff] = useState(false);
            const [hasReturn, setHasReturn] = useState(false);
            const [dirCamMuted, setDirCamMuted] = useState(true);
            const [dirMicMuted, setDirMicMuted] = useState(true);
            const [camera, setCamera] = useState(Storage.load('cm', 'user'));
            const [rec, setRec] = useState(false);
            const [remoteRec, setRemoteRec] = useState(false);
            const [err, setErr] = useState(null);
            const [connState, setConnState] = useState('connecting');
            const [cameras, setCameras] = useState([]);

            const localVideoRef = useRef(null);
            const returnVideoRef = useRef(null);
            const returnAudioRef = useRef(null);
            const peerRef = useRef(null);
            const mqttRef = useRef(null);
            const localStreamRef = useRef(null);
            const timerStats = useRef(null);
            const recRef = useRef(false);
            const abortRef = useRef(false);
            const outCallRef = useRef(null);

            useEffect(() => { recRef.current = rec; }, [rec]);

            useEffect(() => {
                if (!joined) return;
                abortRef.current = false;
                init_guest();

                const handleBeforeUnload = () => {
                    if (recRef.current) RecordingService.stop();
                    localStreamRef.current?.getTracks().forEach(t => t.stop());
                    peerRef.current?.destroy();
                    mqttRef.current?.end();
                };
                window.addEventListener('beforeunload', handleBeforeUnload);

                return () => {
                    window.removeEventListener('beforeunload', handleBeforeUnload);
                    abortRef.current = true;
                    clearInterval(timerStats.current);
                    try {
                        if (recRef.current) RecordingService.stop();
                        localStreamRef.current?.getTracks().forEach(t => t.stop());
                        peerRef.current?.destroy();
                        mqttRef.current?.end();
                    } catch (e) { }
                };
            }, [joined]);

            const applyBitrate = (pc, q) => {
                if (!pc) return;
                const limits = { '360': 600000, '720': 1500000, '1080': 3500000 };
                const maxBr = limits[q] || 1500000;
                pc.getSenders().forEach(sender => {
                    if (sender.track?.kind === 'video') {
                        const params = sender.getParameters();
                        if (!params.encodings) params.encodings = [{}];
                        if (params.encodings[0].maxBitrate !== maxBr) {
                            params.encodings[0].maxBitrate = maxBr;
                            sender.setParameters(params).catch(() => { });
                        }
                    }
                });
            };

            // CORREGIDO: Función para obtener stream con facingMode específico
            const getStreamWithFacingMode = async (facingMode) => {
                const res = { '360': [640, 360], '720': [1280, 720], '1080': [1920, 1080] };
                const [w, h] = res[quality] || res['720'];

                // Primero intentar con facingMode exacto
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: w },
                            height: { ideal: h },
                            facingMode: { exact: facingMode }
                        },
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });
                    return stream;
                } catch (e) {
                    // Si falla (ej: no hay cámara trasera), intentar con ideal
                    Logger.warn('getStream', `facingMode exact ${facingMode} falló, intentando ideal`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: w },
                            height: { ideal: h },
                            facingMode: { ideal: facingMode }
                        },
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });
                    return stream;
                }
            };

            // CORREGIDO: Cambiar cámara reiniciando todo el stream
            const switchCamera = async () => {
                try {
                    const newFacingMode = camera === 'user' ? 'environment' : 'user';

                    // Detener stream actual
                    localStreamRef.current?.getTracks().forEach(t => t.stop());

                    // Obtener nuevo stream con facingMode
                    const newStream = await getStreamWithFacingMode(newFacingMode);

                    if (abortRef.current) {
                        newStream.getTracks().forEach(t => t.stop());
                        return;
                    }

                    localStreamRef.current = newStream;

                    // Actualizar video local
                    if (localVideoRef.current) {
                        localVideoRef.current.srcObject = newStream;
                    }

                    // MANTENER ESTADO: Aplicar el estado de mute actual a los nuevos tracks obtenidos
                    const newVideoTrackFallback = newStream.getVideoTracks()[0];
                    if (newVideoTrackFallback) newVideoTrackFallback.enabled = !camOff;
                    const newAudioTrackFallback = newStream.getAudioTracks()[0];
                    if (newAudioTrackFallback) newAudioTrackFallback.enabled = !micOff;

                    // CORREGIDO: Reemplazar tracks en TODAS las conexiones activas
                    if (peerRef.current) {
                        const allConnections = Object.values(peerRef.current.connections || {}).flat();

                        for (const conn of allConnections) {
                            const pc = conn.peerConnection;
                            if (!pc) continue;

                            const senders = pc.getSenders();

                            // Reemplazar video
                            const videoTrack = newStream.getVideoTracks()[0];
                            const videoSender = senders.find(s => s.track?.kind === 'video');
                            if (videoSender && videoTrack) {
                                await videoSender.replaceTrack(videoTrack);
                                Logger.info('switchCamera', 'video track reemplazado');
                            }

                            // Reemplazar audio
                            const audioTrack = newStream.getAudioTracks()[0];
                            const audioSender = senders.find(s => s.track?.kind === 'audio');
                            if (audioSender && audioTrack) {
                                await audioSender.replaceTrack(audioTrack);
                            }
                        }
                    }

                    // Guardar y actualizar estado
                    setCamera(newFacingMode);
                    Storage.save('cm', newFacingMode);
                    Logger.info('switchCamera', `cambiado a ${newFacingMode}`);

                } catch (e) {
                    Logger.error('switchCamera', e.message);
                    setErr('Error al cambiar cámara: ' + e.message);
                }
            };

            const init_guest = async () => {
                try {
                    // Obtener lista de cámaras disponibles
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevs = devices.filter(d => d.kind === 'videoinput');
                    setCameras(videoDevs);
                    Logger.info('Guest-cameras', `encontradas ${videoDevs.length} cámaras`);

                    mqttRef.current = window.mqtt.connect(CONFIG.MQTT_BROKER, {
                        clientId: `guest_${Date.now()}`,
                        username: CONFIG.MQTT_USER, password: CONFIG.MQTT_PASS
                    });
                    let subscribed = false;
                    mqttRef.current.on('connect', () => {
                        if (subscribed) return; subscribed = true;
                        mqttRef.current.subscribe(`sc_tally/${roomName}`);
                        mqttRef.current.subscribe(`sc_rec/${roomName}`);
                        mqttRef.current.subscribe(`sc_return/${roomName}`);
                        mqttRef.current.on('message', (_, payload) => {
                            try {
                                const d = JSON.parse(payload.toString());
                                if (d.state) setTally(d.state);
                                if (d.recording !== undefined) setRemoteRec(d.recording);
                                if (d.camMuted !== undefined) setDirCamMuted(d.camMuted);
                                if (d.micMuted !== undefined) setDirMicMuted(d.micMuted);
                            } catch (e) { }
                        });
                    });
                    mqttRef.current.on('error', e => Logger.warn('MQTT-guest', e.message));

                    // CORREGIDO: Usar getStreamWithFacingMode
                    const stream = await getStreamWithFacingMode(camera);

                    if (abortRef.current) { stream.getTracks().forEach(t => t.stop()); return; }

                    localStreamRef.current = stream;
                    if (localVideoRef.current) {
                        localVideoRef.current.srcObject = stream;
                        localVideoRef.current.play().catch(() => { });
                    }

                    const safeRoom = roomName.replace(/[^a-zA-Z0-9]/g, '');
                    peerRef.current = new Peer(`guest_${safeRoom}_${Date.now().toString(36)}`, CONFIG.PEER_CONFIG);

                    peerRef.current.on('open', () => {
                        if (abortRef.current) return;
                        Logger.info('Guest-peer', `Conectado como guest`);
                        setConnState('connected');

                        const setupGuestCall = (call) => {
                            outCallRef.current = call;
                            call.on('stream', returnStream => {
                                Logger.info('Guest-return', 'stream recibido, tracks:' + returnStream.getTracks().length);
                                if (returnVideoRef.current) {
                                    returnVideoRef.current.srcObject = returnStream;
                                    returnVideoRef.current.play().catch(() => { });
                                }
                                if (returnAudioRef.current) {
                                    returnAudioRef.current.srcObject = returnStream;
                                    returnAudioRef.current.play().catch(() => { });
                                }
                                setHasReturn(true);
                            });
                            call.on('error', e => {
                                Logger.warn('OutCall-err', e.message);
                                setConnState('failed');
                                call.isReconnecting = false;
                            });
                            call.on('close', () => {
                                setHasReturn(false);
                                setConnState('disconnected');
                                call.isReconnecting = false;
                                Logger.warn('OutCall', 'closed');
                            });
                        };

                        const outCall = peerRef.current.call(`dir_${safeRoom}`, localStreamRef.current);
                        setupGuestCall(outCall);

                        const obsCall = peerRef.current.call(`obs_${safeRoom}`, localStreamRef.current);
                        obsCall?.on('error', () => { });
                    });

                    peerRef.current.on('call', c => {
                        c.answer(localStreamRef.current);
                        c.on('error', () => { });
                    });

                    peerRef.current.on('error', e => {
                        if (e.type !== 'peer-unavailable') {
                            setErr(e.type);
                            setConnState('failed');
                        }
                    });

                    peerRef.current.on('disconnected', () => setConnState('disconnected'));

                    timerStats.current = setInterval(() => {
                        const conns = Object.values(peerRef.current?.connections || {});
                        const pc = conns[0]?.[0]?.peerConnection;
                        if (pc) {
                            applyBitrate(pc, quality);
                            if (pc.iceConnectionState) {
                                const state = pc.iceConnectionState;
                                setConnState(state === 'connected' || state === 'completed' ? 'connected' : state);

                                // AUTO RECONNECT LOGIC
                                if ((state === 'disconnected' || state === 'failed') && outCallRef.current && !outCallRef.current.isReconnecting && !abortRef.current) {
                                    outCallRef.current.isReconnecting = true;
                                    Logger.info('Guest-peer', 'Intentando reconectar tras fallo...');
                                    setTimeout(() => {
                                        if (abortRef.current || !peerRef.current || peerRef.current.destroyed) return;
                                        const safeRoom = roomName.replace(/[^a-zA-Z0-9]/g, '');
                                        const newCall = peerRef.current.call(`dir_${safeRoom}`, localStreamRef.current);
                                        if (newCall) setupGuestCall(newCall);
                                    }, 3000);
                                }
                            }
                        }
                    }, 2000);

                    setErr(null);
                } catch (e) {
                    Logger.error('Guest-init', e.message);
                    setConnState('failed');
                    setErr(e.message);
                }
            };

            if (!joined) return (
                <div className="lobby-container">
                    <div className="glass-box">
                        <div style={{ width: 64, height: 64, background: 'rgba(139,92,246,0.2)', borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 28 }}>📹</div>
                        <h2 style={{ fontSize: '1.5rem', fontWeight: 800, marginBottom: 8, textAlign: 'center' }}>Sala: {roomName}</h2>
                        <p style={{ color: '#71717a', textAlign: 'center', marginBottom: 24, fontSize: '0.9rem' }}>Configura tu calidad antes de entrar</p>
                        <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: 8, fontWeight: 'bold' }}>Calidad de video</label>
                        <select value={quality} onChange={e => { setQuality(e.target.value); Storage.save('pq', e.target.value); }}>
                            <option value="360">360p — Baja</option>
                            <option value="720">720p — Media</option>
                            <option value="1080">1080p — Alta</option>
                        </select>

                        {/* NUEVO: Mostrar cámaras disponibles */}
                        <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: 8, fontWeight: 'bold' }}>Cámara inicial</label>
                        <select value={camera} onChange={e => { setCamera(e.target.value); Storage.save('cm', e.target.value); }}>
                            <option value="user">Frontal (Selfie)</option>
                            <option value="environment">Trasera</option>
                        </select>

                        <button className="btn btn-violet" onClick={() => setJoined(true)}>Entrar →</button>
                        {err && <div className="error-toast">{err}</div>}
                    </div>
                </div>
            );

            return (
                <div className={`guest-layout tally-${tally}`}>
                    <ConnectionStatus state={connState} />
                    <div className="guest-tally-border" />
                    <div className="big-tally-text">
                        {tally === 'live' ? <>🔴 AL AIRE</> : <>⚠️ PREVIO</>}
                    </div>
                    {remoteRec && (
                        <div style={{ position: 'absolute', top: 20, right: 20, background: 'rgba(225,29,72,0.9)', color: 'white', padding: '8px 16px', borderRadius: 8, fontWeight: 'bold', zIndex: 100, display: 'flex', alignItems: 'center', gap: 8, animation: 'pulseRose 2s infinite' }}>
                            <div style={{ width: 10, height: 10, background: 'white', borderRadius: '50%' }} /> REC (Director)
                        </div>
                    )}

                    <div className={`return-pip ${hasReturn && !dirCamMuted ? 'active' : ''}`}>
                        <video ref={returnVideoRef} autoPlay playsInline muted style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                        <audio ref={returnAudioRef} autoPlay playsInline style={{ display: 'none' }} />
                        <div className="pip-icon">🎧</div>
                        <div className="pip-label">
                            📺 Retorno {dirMicMuted && '🔇'}
                        </div>
                    </div>

                    <video ref={localVideoRef} className="guest-video" muted autoPlay playsInline />

                    <div className="guest-overlay">
                        <div style={{ fontSize: '0.75rem', fontWeight: 'bold', color: '#a1a1a1', background: 'rgba(139,92,246,0.1)', padding: '6px 12px', borderRadius: 20 }}>
                            {roomName}
                        </div>
                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                            <div className={`mic-btn ${micOff ? 'off' : ''}`} title={micOff ? 'Activar mic' : 'Silenciar mic'}
                                onClick={() => {
                                    const at = localStreamRef.current?.getAudioTracks();
                                    if (!at?.length) return;
                                    at[0].enabled = !at[0].enabled; setMicOff(!at[0].enabled);
                                }}>
                                {micOff ? '🔇' : '🎤'}
                            </div>
                            {!micOff && <AudioMeter stream={localStreamRef.current} />}
                        </div>
                        <div className={`mic-btn ${camOff ? 'off' : ''}`} title={camOff ? 'Activar cámara' : 'Apagar cámara'}
                            onClick={() => {
                                const vt = localStreamRef.current?.getVideoTracks();
                                if (!vt?.length) return;
                                vt[0].enabled = !vt[0].enabled; setCamOff(!vt[0].enabled);
                            }}>
                            {camOff ? '📵' : '📹'}
                        </div>

                        {/* CORREGIDO: Botón de cambiar cámara usa switchCamera */}
                        <div className="mic-btn" title={`Cambiar a cámara ${camera === 'user' ? 'trasera' : 'frontal'}`}
                            onClick={switchCamera}>
                            🔄
                        </div>

                        <div className={`mic-btn ${rec ? 'off' : ''}`} title={rec ? 'Parar grabación' : 'Grabar local'}
                            onClick={() => {
                                const newState = !rec;
                                if (newState) {
                                    if (localStreamRef.current) RecordingService.start(localStreamRef.current);
                                } else {
                                    RecordingService.stop();
                                }
                                recRef.current = newState; setRec(newState);
                                mqttRef.current?.publish(`sc_rec_guest/${roomName}`, JSON.stringify({ recording: newState }), { retain: true });
                            }}>
                            {rec ? '⏹' : '⏺'}
                        </div>
                    </div>
                    {err && <div className="error-toast">{err}</div>}
                </div>
            );
        };

        /* APP ROOT */
        const App = () => {
            const [mode, setMode] = useState(null);
            const [room, setRoom] = useState('');
            const [theme, setTheme] = useState(Storage.load('th', 'dark'));

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const m = p.get('mode'), r = p.get('room');
                if (m && r) {
                    const safeRoom = r.replace(/[^a-zA-Z0-9]/g, '');
                    setRoom(safeRoom);
                    setMode(m);
                    if (m === 'obs') document.body.classList.add('obs-mode');
                }
                else { setRoom(Math.random().toString(36).substring(2, 6).toUpperCase()); }
                if (theme === 'light') document.body.classList.add('light-theme');
            }, []);

            const goTo = m => {
                if (!room.trim()) return;
                const safeRoom = room.replace(/[^a-zA-Z0-9]/g, '');
                window.location.href = `?mode=${m}&room=${safeRoom}`;
            };

            if (mode === 'director') return <><Toaster /><ReceiverView roomName={room} isObsMode={false} /></>;
            if (mode === 'obs') return <><Toaster /><ReceiverView roomName={room} isObsMode={true} /></>;
            if (mode === 'guest') return <><Toaster /><GuestView roomName={room} /></>;

            return (
                <>
                    <Toaster />
                    <div className="lobby-container">
                        <div className="glass-box">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                                <div style={{ width: 64, height: 64, background: 'rgba(139,92,246,0.2)', borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28 }}>📡</div>
                                <button onClick={() => { const nt = theme === 'dark' ? 'light' : 'dark'; setTheme(nt); Storage.save('th', nt); document.body.classList.toggle('light-theme'); }}
                                    style={{ background: 'none', border: 'none', color: '#8b5cf6', fontSize: '1.5rem', cursor: 'pointer' }}>
                                    {theme === 'dark' ? '🌙' : '☀️'}
                                </button>
                            </div>
                            <h1 style={{ fontSize: '2rem', fontWeight: 800, marginBottom: 4, textTransform: 'uppercase', background: 'linear-gradient(135deg,#a78bfa,#d8b4fe)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', textAlign: 'center' }}>
                                StreamCall PRO
                            </h1>
                            <p style={{ color: '#52525b', textAlign: 'center', marginBottom: 28, fontSize: '0.8rem' }}>v10.2 — Cámara Retorno + Switch</p>
                            <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: 8, fontWeight: 'bold' }}>ID de Sala</label>
                            <input value={room} onChange={e => setRoom(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''))} placeholder="SALA" maxLength="20" />
                            <button className="btn btn-violet" onClick={() => goTo('director')}>🎛 Entrar como Director</button>
                            <button className="btn btn-emerald" onClick={() => goTo('guest')}>👤 Entrar como Guest</button>
                        </div>
                    </div>
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
