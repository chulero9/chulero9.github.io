<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARADERO StreamCall PRO</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        *, *::before, *::after { box-sizing: border-box; }
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        body.obs-mode { background-color: transparent !important; }

        /* ======================== LOBBY ======================== */
        .lobby-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; background: #0f172a;
            padding: 20px; text-align: center;
        }
        .glass-box {
            background: rgba(30,41,59,0.85);
            padding: 40px; border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 430px; width: 100%;
        }
        .glass-box input {
            width: 100%; background: #000;
            border: 2px solid #334155; color: white;
            padding: 15px; border-radius: 8px;
            font-size: 1.2rem; text-align: center;
            font-weight: bold; margin-bottom: 20px;
            outline: none; text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }
        .quality-select {
            width: 100%; background: #000;
            border: 2px solid #334155; color: white;
            padding: 12px; border-radius: 8px;
            font-size: 1rem; text-align: center;
            font-weight: bold; margin-bottom: 20px;
            outline: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .btn {
            width: 100%; padding: 10px;
            font-weight: 900; font-size: 0.85rem;
            border-radius: 8px; cursor: pointer;
            border: none; transition: background 0.2s, transform 0.1s;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }
        .btn:active { transform: scale(0.97); }
        .btn-blue  { background: #3b82f6; color: white; margin-bottom: 5px; }
        .btn-green { background: #10b981; color: black; margin-bottom: 5px; }
        .btn-red   { background: #ef4444; color: white; margin-bottom: 5px; }
        .btn-gray  { background: #334155; color: white; margin-bottom: 5px; border: 1px solid #475569; }

        /* =================== CAMERA PICKER =================== */
        .cam-picker { display: flex; gap: 10px; margin-bottom: 18px; }
        .cam-pick-btn {
            flex: 1; padding: 12px 0;
            font-weight: 800; font-size: 0.85rem;
            border-radius: 10px; border: 2px solid #334155;
            background: #0f172a; color: #64748b;
            cursor: pointer; transition: 0.2s;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }
        .cam-pick-btn:active { transform: scale(0.96); }
        .cam-pick-btn.active-env  { border-color: #facc15; background: rgba(250,204,21,0.12); color: #facc15; }
        .cam-pick-btn.active-user { border-color: #60a5fa; background: rgba(96,165,250,0.12);  color: #60a5fa; }

        /* ========================= OBS ========================= */
        .obs-layout {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
        }
        .obs-video {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        .obs-status {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); z-index: 9999;
            background: rgba(0,0,0,0.85); color: #facc15;
            padding: 20px 40px; border-radius: 12px;
            font-family: monospace; font-size: 20px; font-weight: bold;
            border: 2px solid #facc15; text-align: center; white-space: pre-wrap;
        }

        /* ======================= DIRECTOR ======================= */
        .director-layout  { display: flex; flex-direction: column; height: 100vh; background: #000; }
        .director-header  {
            background: #0f172a; border-bottom: 1px solid #334155;
            padding: 10px 20px;
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 10px;
        }
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 10px; padding: 10px;
            overflow-y: auto; align-content: start;
        }

        .slot-card {
            background: #1e293b; border: 2px solid #334155;
            border-radius: 12px; display: flex; flex-direction: column;
            overflow: hidden; position: relative; min-height: 280px;
        }
        .slot-card.live { border-color: #ef4444; }
        .slot-card.prev { border-color: #22c55e; }

        .slot-video-area {
            flex: 1; background: #000; position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; border-bottom: 2px solid #334155;
            min-height: 200px;
        }
        .slot-video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .slot-status {
            position: absolute; text-transform: uppercase;
            font-weight: bold; color: #64748b; font-size: 1.1rem; z-index: 1;
        }

        /* VU Meter */
        .vu-meter-container { width: 100%; height: 6px; background: #000; border-top: 1px solid #334; }
        .vu-meter-bar {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #facc15, #ef4444);
            width: 0%; transition: width 0.05s linear;
        }

        .slot-controls-area {
            padding: 10px;
            display: flex; justify-content: space-between;
            align-items: center; background: #0f172a;
            gap: 8px; flex-wrap: wrap;
        }
        .slot-info { display: flex; flex-direction: column; min-width: 90px; }
        .slot-title { font-weight: 900; color: #fff; font-size: 1rem; }

        .dir-select {
            background: #000 !important; border: 1px solid #334155 !important;
            color: #fff !important; padding: 8px; border-radius: 6px;
            font-size: 0.85rem; outline: none;
            font-family: 'Inter', sans-serif;
        }

        .tally-group { display: flex; gap: 5px; flex: 1; }
        .t-btn {
            flex: 1; padding: 10px 0; font-size: 0.8rem; font-weight: bold;
            border-radius: 6px; cursor: pointer; border: 2px solid transparent;
            background: #1e293b; color: #94a3b8; text-align: center; transition: 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .t-btn:hover { filter: brightness(1.3); }
        .t-btn.active-idle { border-color: #64748b; color: white; }
        .t-btn.active-prev { background: rgba(34,197,94,0.18); border-color: #22c55e; color: #22c55e; }
        .t-btn.active-live { background: rgba(239,68,68,0.18);  border-color: #ef4444; color: #ef4444; animation: pulseRed 2s infinite; }

        .link-group { display: flex; flex-direction: column; gap: 5px; min-width: 120px; }
        .link-group .btn { margin-bottom: 0; padding: 7px; font-size: 0.72rem; }

        /* ========================= GUEST ========================= */
        .guest-layout {
            width: 100vw; height: 100vh; position: relative;
            background: #111; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden;
        }
        .guest-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        .guest-tally-border {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border: 15px solid transparent;
            pointer-events: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            z-index: 50;
        }
        .guest-layout.tally-live .guest-tally-border {
            border-color: #ef4444;
            box-shadow: inset 0 0 60px rgba(239,68,68,0.7);
        }
        .guest-layout.tally-prev .guest-tally-border {
            border-color: #22c55e;
            box-shadow: inset 0 0 60px rgba(34,197,94,0.7);
        }

        .big-tally-text {
            position: absolute; top: 40px;
            left: 50%; transform: translateX(-50%);
            font-size: 1.5rem; font-weight: 900;
            padding: 6px 24px; border-radius: 10px;
            z-index: 100; text-transform: uppercase;
            display: none; white-space: nowrap;
        }
        .guest-layout.tally-live .big-tally-text { display: block; background: #ef4444; color: white; }
        .guest-layout.tally-prev .big-tally-text { display: block; background: #22c55e; color: black; }

        .cam-mode-badge {
            position: absolute; top: 16px; right: 16px;
            background: rgba(0,0,0,0.75); color: #facc15;
            font-size: 0.72rem; font-weight: 800;
            padding: 5px 12px; border-radius: 20px;
            z-index: 100; border: 1px solid rgba(250,204,21,0.4);
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        .return-pip {
            position: absolute; top: 20px; left: 20px;
            width: 180px; aspect-ratio: 16/9;
            background: #000; border: 2px solid #475569;
            border-radius: 10px; overflow: hidden;
            z-index: 80; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .return-pip.active { opacity: 1; pointer-events: auto; }
        .return-pip video { width: 100%; height: 100%; object-fit: cover; }
        .pip-label {
            position: absolute; bottom: 4px; left: 4px;
            background: rgba(0,0,0,0.8); color: white;
            font-size: 9px; padding: 3px 7px;
            border-radius: 4px; font-weight: bold;
        }

        .guest-overlay {
            position: absolute; bottom: 36px;
            left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 22px; border-radius: 50px;
            display: flex; align-items: center; gap: 12px;
            z-index: 100; border: 1px solid #333;
            backdrop-filter: blur(6px);
        }
        .icon-btn {
            width: 46px; height: 46px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.2rem; transition: 0.2s;
            background: #334155; border: none; color: white; flex-shrink: 0;
        }
        .icon-btn:active { transform: scale(0.9); }
        .icon-btn:disabled { cursor: wait; transform: none; }
        .icon-btn.off    { background: #ef4444; }
        .icon-btn.switch { background: #3b82f6; }
        .ch-label {
            font-size: 11px; font-weight: 900; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.08em;
        }

        /* ====================== ANIMATIONS ====================== */
        @keyframes pulseRed {
            0%   { box-shadow: 0 0 0 0   rgba(239,68,68,0.5); }
            70%  { box-shadow: 0 0 0 10px rgba(239,68,68,0);   }
            100% { box-shadow: 0 0 0 0   rgba(239,68,68,0);   }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Config ── */
    const PEER_CONFIG = {
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        }
    };
    const MQTT_BROKER  = 'wss://broker.emqx.io:8084/mqtt';
    const RESOLUTIONS  = { '360': [640,360], '720': [1280,720], '1080': [1920,1080] };

    /* ── Shared AudioContext ── */
    let sharedAudioCtx = null;
    const getAudioContext = () => {
        if (!sharedAudioCtx)
            sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
        return sharedAudioCtx;
    };

    /* ════════════════════════════════════════════════════════
       VideoPlayer
    ════════════════════════════════════════════════════════ */
    const VideoPlayer = ({ stream, muted, className, style }) => {
        const ref = useRef(null);
        useEffect(() => {
            if (ref.current && stream) {
                ref.current.srcObject = stream;
                ref.current.play().catch(() => {});
            }
        }, [stream]);
        return (
            <video
                ref={ref}
                className={className}
                style={style}
                autoPlay
                playsInline
                muted={!!muted}
            />
        );
    };

    /* ════════════════════════════════════════════════════════
       VU Meter
    ════════════════════════════════════════════════════════ */
    const VUMeter = ({ stream }) => {
        const barRef = useRef(null);
        useEffect(() => {
            if (!stream || !stream.getAudioTracks().length) return;
            let anim, source;
            try {
                const ctx     = getAudioContext();
                const analyser = ctx.createAnalyser();
                source = ctx.createMediaStreamSource(stream);
                source.connect(analyser);
                const data = new Uint8Array(analyser.frequencyBinCount);
                const tick = () => {
                    if (!stream.active) return;
                    analyser.getByteFrequencyData(data);
                    let sum = 0;
                    for (let i = 0; i < data.length; i++) sum += data[i];
                    const level = Math.min((sum / data.length) * 2.5, 100);
                    if (barRef.current) barRef.current.style.width = level + '%';
                    anim = requestAnimationFrame(tick);
                };
                tick();
            } catch (e) {}
            return () => {
                if (anim) cancelAnimationFrame(anim);
                try { if (source) source.disconnect(); } catch (e) {}
            };
        }, [stream]);
        return (
            <div className="vu-meter-container">
                <div ref={barRef} className="vu-meter-bar" />
            </div>
        );
    };

    /* ════════════════════════════════════════════════════════
       DIRECTOR VIEW  (3 canales)
    ════════════════════════════════════════════════════════ */
    const DirectorView = ({ roomName }) => {
        const makeSlots = () => ({
            1: { connected: false, tally: 'idle', stream: null },
            2: { connected: false, tally: 'idle', stream: null },
            3: { connected: false, tally: 'idle', stream: null }
        });
        const [slots,         setSlots]         = useState(makeSlots);
        const [audioDevices,  setAudioDevices]  = useState([]);
        const [selectedAudio, setSelectedAudio] = useState('');
        const [talkbackActive, setTalkbackActive] = useState(false);

        const peer           = useRef(null);
        const mqttClient     = useRef(null);
        const returnStreamRef = useRef(null);
        const talkbackRef    = useRef(false);

        useEffect(() => {
            mqttClient.current = mqtt.connect(MQTT_BROKER);

            navigator.mediaDevices.enumerateDevices().then(devs => {
                const audios = devs.filter(d => d.kind === 'audioinput');
                setAudioDevices(audios);
                if (audios.length) setSelectedAudio(audios[0].deviceId);
            });

            const myId = `sc_dir_${roomName.toUpperCase()}`;
            peer.current = new Peer(myId, PEER_CONFIG);

            peer.current.on('call', (call) => {
                const match = call.peer.match(/_(\d+)$/);
                if (match) {
                    const slotId = parseInt(match[1]);
                    if (slotId >= 1 && slotId <= 3) {
                        call.answer();
                        call.on('stream', (stream) => {
                            setSlots(prev => ({
                                ...prev,
                                [slotId]: { ...prev[slotId], connected: true, stream }
                            }));
                            if (talkbackRef.current && returnStreamRef.current) {
                                setTimeout(() => {
                                    peer.current.call(
                                        `sc_guest_${roomName.toUpperCase()}_${slotId}`,
                                        returnStreamRef.current
                                    );
                                }, 1500);
                            }
                        });
                        call.on('close', () => {
                            setSlots(prev => ({
                                ...prev,
                                [slotId]: { ...prev[slotId], connected: false, stream: null }
                            }));
                        });
                    }
                }
            });

            return () => { peer.current?.destroy(); mqttClient.current?.end(); };
        }, [roomName]);

        const handleTally = (slotId, state) => {
            setSlots(prev => ({ ...prev, [slotId]: { ...prev[slotId], tally: state } }));
            mqttClient.current?.publish(
                `sc_tally/${roomName.toUpperCase()}/${slotId}`,
                JSON.stringify({ state }),
                { retain: true }
            );
        };

        const toggleReturnAll = async () => {
            if (talkbackActive) {
                returnStreamRef.current?.getTracks().forEach(t => t.stop());
                setTalkbackActive(false);
                talkbackRef.current = false;
            } else {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({
                        audio: { deviceId: selectedAudio },
                        video: true
                    });
                    returnStreamRef.current = s;
                    setTalkbackActive(true);
                    talkbackRef.current = true;
                    let delay = 0;
                    [1,2,3].forEach(slotId => {
                        if (slots[slotId].connected) {
                            setTimeout(() => {
                                peer.current.call(
                                    `sc_guest_${roomName.toUpperCase()}_${slotId}`, s
                                );
                            }, delay);
                            delay += 300;
                        }
                    });
                } catch (e) { alert('Error al iniciar IFB global'); }
            }
        };

        const copyLink = (mode, slotId) => {
            const base = window.location.href.split('?')[0];
            const url  = `${base}?mode=${mode}&room=${roomName}&slot=${slotId}`;
            navigator.clipboard.writeText(url);
            alert(`Enlace de ${mode.toUpperCase()} (Móvil ${slotId}) copiado.`);
        };

        return (
            <div className="director-layout">
                <div className="director-header">
                    <div>
                        <div style={{ fontSize:'1.2rem', fontWeight:900, color:'#60a5fa', textTransform:'uppercase', letterSpacing:'-0.04em' }}>
                            StreamCall PRO — 3 CANALES
                        </div>
                        <div style={{ color:'#94a3b8', fontSize:'0.8rem', fontWeight:700 }}>
                            SALA: {roomName.toUpperCase()}
                        </div>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap' }}>
                        <select
                            className="dir-select"
                            value={selectedAudio}
                            onChange={e => setSelectedAudio(e.target.value)}
                            style={{ maxWidth:'200px' }}
                        >
                            {audioDevices.map(d => (
                                <option key={d.deviceId} value={d.deviceId}>{d.label || 'Micrófono'}</option>
                            ))}
                        </select>
                        <button
                            className={`btn ${talkbackActive ? 'btn-red' : 'btn-blue'}`}
                            style={{ width:'auto', padding:'10px 20px', margin:0 }}
                            onClick={toggleReturnAll}
                        >
                            {talkbackActive ? '🔴 CORTAR IFB GLOBAL' : '▶️ IFB GLOBAL'}
                        </button>
                    </div>
                </div>

                <div className="grid-container">
                    {[1,2,3].map(slotId => {
                        const slot = slots[slotId];
                        return (
                            <div
                                key={slotId}
                                className={`slot-card ${slot.tally==='live'?'live':slot.tally==='prev'?'prev':''}`}
                            >
                                <div className="slot-video-area">
                                    {slot.stream
                                        ? <VideoPlayer stream={slot.stream} muted={true} className="slot-video" />
                                        : <div className="slot-status">ESPERANDO MÓVIL {slotId}…</div>
                                    }
                                </div>
                                {slot.connected && <VUMeter stream={slot.stream} />}
                                <div className="slot-controls-area">
                                    <div className="slot-info">
                                        <span className="slot-title">MÓVIL {slotId}</span>
                                        <span style={{ fontSize:'0.75rem', fontWeight:700, color: slot.connected ? '#4ade80' : '#f87171' }}>
                                            {slot.connected ? 'ONLINE' : 'OFFLINE'}
                                        </span>
                                    </div>
                                    <div className="tally-group">
                                        <button className={`t-btn ${slot.tally==='idle'?'active-idle':''}`} onClick={()=>handleTally(slotId,'idle')}>OFF</button>
                                        <button className={`t-btn ${slot.tally==='prev'?'active-prev':''}`} onClick={()=>handleTally(slotId,'prev')}>PREV</button>
                                        <button className={`t-btn ${slot.tally==='live'?'active-live':''}`} onClick={()=>handleTally(slotId,'live')}>AIRE</button>
                                    </div>
                                    <div className="link-group">
                                        <button className="btn btn-green" onClick={()=>copyLink('obs',slotId)}>COPY OBS</button>
                                        <button className="btn btn-blue"  onClick={()=>copyLink('guest',slotId)}>COPY MÓVIL</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    };

    /* ════════════════════════════════════════════════════════
       OBS VIEW
    ════════════════════════════════════════════════════════ */
    const ObsView = ({ roomName, slotId }) => {
        const [status, setStatus] = useState('INICIANDO OBS…');
        const [stream, setStream] = useState(null);
        const peer    = useRef(null);
        const videoRef = useRef(null);

        useEffect(() => {
            let pingInterval;
            const baseId  = roomName.toUpperCase();
            const myId    = `sc_obs_${baseId}_${slotId}`;
            const guestId = `sc_guest_${baseId}_${slotId}`;

            peer.current = new Peer(myId, PEER_CONFIG);

            peer.current.on('open', () => {
                setStatus(`Buscando MÓVIL ${slotId} en la red…`);
                pingInterval = setInterval(() => {
                    if (!stream) {
                        const conn = peer.current.connect(guestId, { reliable: false });
                        conn.on('open', () => {
                            conn.send('WAKE_UP_OBS');
                            setTimeout(() => conn.close(), 500);
                        });
                    }
                }, 3000);
            });

            peer.current.on('call', (call) => {
                if (pingInterval) clearInterval(pingInterval);
                setStatus('RECIBIENDO SEÑAL…');
                call.answer();
                call.on('stream', (s) => { setStream(s); setStatus(''); });
                call.on('close',  () => { setStream(null); setStatus(`MÓVIL ${slotId} DESCONECTADO`); });
            });

            peer.current.on('error', () => setStatus(`ESPERANDO MÓVIL ${slotId}…`));

            return () => {
                if (pingInterval) clearInterval(pingInterval);
                peer.current?.destroy();
            };
        }, [roomName, slotId]);

        useEffect(() => {
            if (stream && videoRef.current) {
                videoRef.current.srcObject = stream;
                videoRef.current.play().catch(() => {});
            }
        }, [stream]);

        return (
            <div className="obs-layout">
                {stream && (
                    <video ref={videoRef} className="obs-video" autoPlay playsInline muted={false} />
                )}
                {!stream && <div className="obs-status">{status}</div>}
            </div>
        );
    };

    /* ════════════════════════════════════════════════════════
       GUEST VIEW  ←  CÁMARA TRASERA POR DEFECTO
    ════════════════════════════════════════════════════════ */
    const GuestView = ({ roomName, slotId }) => {
        /* ── Pre-join ── */
        const [joined,     setJoined]     = useState(false);
        const [quality,    setQuality]    = useState('720');
        /* DEFAULT → cámara trasera */
        const [facingMode, setFacingMode] = useState('environment');

        /* ── In-call ── */
        const [tally,         setTally]         = useState('idle');
        const [micMuted,      setMicMuted]      = useState(false);
        const [camOff,        setCamOff]         = useState(false);
        const [returnStream,  setReturnStream]  = useState(null);
        const [myStreamState, setMyStreamState] = useState(null);

        const peer        = useRef(null);
        const mqttClient  = useRef(null);
        const localStream = useRef(null);
        const currentVideoDeviceId = useRef('');
        const switchingCameraRef   = useRef(false);
        const [videoDevices, setVideoDevices] = useState([]);
        const [switchingCamera, setSwitchingCamera] = useState(false);

        const refreshVideoDevices = async () => {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videos = devices.filter(d => d.kind === 'videoinput');
                setVideoDevices(videos);
                return videos;
            } catch {
                return videoDevices;
            }
        };

        const findPreferredDevice = (devices, mode, currentDeviceId) => {
            if (!devices || !devices.length) return null;

            const backRegex = /back|rear|trase|environment|world|outer/i;
            const frontRegex = /front|frontal|user|face|facetime|inner/i;
            const matcher = mode === 'environment' ? backRegex : frontRegex;

            const exactMatch = devices.find(d => matcher.test(d.label || '') && d.deviceId !== currentDeviceId);
            if (exactMatch) return exactMatch;

            const differentDevice = devices.find(d => d.deviceId !== currentDeviceId);
            return differentDevice || devices[0] || null;
        };

        const replaceOutgoingVideoTrack = async (newTrack) => {
            if (!peer.current?.connections) return;

            const groups = Object.values(peer.current.connections);
            for (const group of groups) {
                for (const conn of group) {
                    const sender = conn.peerConnection
                        ?.getSenders()
                        ?.find(s => s.track && s.track.kind === 'video');
                    if (sender) {
                        try {
                            await sender.replaceTrack(newTrack);
                        } catch (err) {
                            console.warn('No se pudo reemplazar track de video', err);
                        }
                    }
                }
            }
        };

        /* ── Switch camera ── */
        const switchCamera = async () => {
            if (switchingCameraRef.current || !navigator.mediaDevices?.getUserMedia) return;

            const nextMode = facingMode === 'environment' ? 'user' : 'environment';
            const [w, h] = RESOLUTIONS[quality];
            const oldVideoTrack = localStream.current?.getVideoTracks?.()[0] || null;

            const getNewVideoTrack = async (releaseCurrentCameraFirst = false) => {
                const devices = await refreshVideoDevices();
                const preferredDevice = findPreferredDevice(devices, nextMode, currentVideoDeviceId.current);
                const attempts = [];

                if (preferredDevice?.deviceId) {
                    attempts.push({ deviceId: { exact: preferredDevice.deviceId } });
                }
                attempts.push({ facingMode: { exact: nextMode } });
                attempts.push({ facingMode: { ideal: nextMode } });
                if (preferredDevice?.deviceId) {
                    attempts.push({ deviceId: preferredDevice.deviceId });
                }
                attempts.push(true);

                if (releaseCurrentCameraFirst && oldVideoTrack && oldVideoTrack.readyState !== 'ended') {
                    try { oldVideoTrack.stop(); } catch {}
                }

                let lastError = null;
                for (const extra of attempts) {
                    try {
                        const tempStream = await navigator.mediaDevices.getUserMedia({
                            video: extra === true
                                ? { width: { ideal: w }, height: { ideal: h } }
                                : { width: { ideal: w }, height: { ideal: h }, ...extra },
                            audio: false
                        });
                        const track = tempStream.getVideoTracks()[0];
                        return { track, tempStream };
                    } catch (err) {
                        lastError = err;
                    }
                }
                throw lastError || new Error('No se pudo acceder a otra cámara');
            };

            switchingCameraRef.current = true;
            setSwitchingCamera(true);

            try {
                let result;
                try {
                    result = await getNewVideoTrack(false);
                } catch (firstError) {
                    console.warn('Primer intento de cambio de cámara falló, reintentando…', firstError);
                    result = await getNewVideoTrack(true);
                }

                const newTrack = result.track;
                newTrack.enabled = !camOff;

                await replaceOutgoingVideoTrack(newTrack);

                const audioTracks = localStream.current?.getAudioTracks?.() || [];
                const nextStream = new MediaStream([...audioTracks, newTrack]);
                localStream.current = nextStream;
                setMyStreamState(nextStream);

                currentVideoDeviceId.current = newTrack.getSettings?.().deviceId || '';
                setFacingMode(nextMode);

                if (oldVideoTrack && oldVideoTrack.readyState !== 'ended') {
                    try { oldVideoTrack.stop(); } catch {}
                }

                result.tempStream?.getTracks?.().forEach(track => {
                    if (track !== newTrack) {
                        try { track.stop(); } catch {}
                    }
                });
            } catch (e) {
                console.error('Error al cambiar la cámara', e);
                alert('No se pudo cambiar la cámara en este dispositivo');
            } finally {
                switchingCameraRef.current = false;
                setSwitchingCamera(false);
            }
        };

        /* ── Join / init ── */
        useEffect(() => {
            if (!joined) return;

            const mq = mqtt.connect(MQTT_BROKER);
            mqttClient.current = mq;
            mq.on('connect', () => mq.subscribe(`sc_tally/${roomName.toUpperCase()}/${slotId}`));
            mq.on('message', (_t, msg) => {
                try { setTally(JSON.parse(msg.toString()).state); } catch {}
            });

            const init = async () => {
                try {
                    const [w, h] = RESOLUTIONS[quality];

                    /* ★ Solicita CÁMARA TRASERA (environment) al iniciar */
                    const s = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width:  { ideal: w },
                            height: { ideal: h },
                            facingMode: { ideal: facingMode }   /* usa el modo elegido en lobby */
                        },
                        audio: { echoCancellation: true, noiseSuppression: true }
                    });

                    localStream.current = s;
                    setMyStreamState(s);
                    currentVideoDeviceId.current = s.getVideoTracks?.()[0]?.getSettings?.().deviceId || '';
                    refreshVideoDevices();

                    const baseId = roomName.toUpperCase();
                    peer.current = new Peer(`sc_guest_${baseId}_${slotId}`, PEER_CONFIG);

                    peer.current.on('open', () => {
                        setTimeout(() => peer.current.call(`sc_dir_${baseId}`, localStream.current), 300);
                    });

                    peer.current.on('connection', (conn) => {
                        conn.on('data', (data) => {
                            if (data === 'WAKE_UP_OBS' && localStream.current)
                                peer.current.call(`sc_obs_${baseId}_${slotId}`, localStream.current);
                        });
                    });

                    peer.current.on('call', (c) => {
                        c.answer();
                        c.on('stream', (rem) => setReturnStream(rem));
                    });
                } catch {
                    alert('Error al acceder a cámara/micrófono');
                }
            };

            init();
            return () => {
                peer.current?.destroy();
                mq.end();
                localStream.current?.getTracks().forEach(t => t.stop());
            };
        }, [joined]);

        const toggleMic = () => {
            if (!localStream.current) return;
            const t = localStream.current.getAudioTracks()[0];
            t.enabled = !t.enabled;
            setMicMuted(!t.enabled);
        };
        const toggleCam = () => {
            if (!localStream.current) return;
            const t = localStream.current.getVideoTracks()[0];
            t.enabled = !t.enabled;
            setCamOff(!t.enabled);
        };

        /* ── Pre-join screen ── */
        if (!joined) {
            return (
                <div className="lobby-container">
                    <div className="glass-box">
                        <div style={{ fontSize:'1.1rem', fontWeight:900, marginBottom:'4px', color:'white', textTransform:'uppercase', letterSpacing:'0.1em' }}>
                            SALA: {roomName}
                        </div>
                        <div style={{ fontSize:'1.6rem', fontWeight:900, marginBottom:'22px', color:'#60a5fa', textTransform:'uppercase', letterSpacing:'0.08em' }}>
                            MÓVIL {slotId}
                        </div>

                        {/* ── Camera picker ── */}
                        <div style={{ color:'#94a3b8', fontSize:'0.7rem', fontWeight:800, textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:'8px', textAlign:'left' }}>
                            Cámara de inicio
                        </div>
                        <div className="cam-picker">
                            <button
                                className={`cam-pick-btn ${facingMode === 'environment' ? 'active-env' : ''}`}
                                onClick={() => setFacingMode('environment')}
                            >
                                📷 TRASERA
                            </button>
                            <button
                                className={`cam-pick-btn ${facingMode === 'user' ? 'active-user' : ''}`}
                                onClick={() => setFacingMode('user')}
                            >
                                🤳 FRONTAL
                            </button>
                        </div>

                        {/* ── Quality picker ── */}
                        <select
                            className="quality-select"
                            value={quality}
                            onChange={e => setQuality(e.target.value)}
                        >
                            <option value="360">360p (BAJA)</option>
                            <option value="720">720p (MEDIA)</option>
                            <option value="1080">1080p (ALTA)</option>
                        </select>

                        <button
                            className="btn btn-blue"
                            style={{ padding:'15px', fontSize:'1.05rem' }}
                            onClick={() => setJoined(true)}
                        >
                            ENTRAR AL VIVO
                        </button>
                    </div>
                </div>
            );
        }

        /* ── In-call screen ── */
        const isMirrored = (facingMode === 'user');
        return (
            <div className={`guest-layout tally-${tally}`}>
                {/* Tally border glow */}
                <div className="guest-tally-border" />

                {/* Tally label */}
                <div className="big-tally-text">
                    {tally === 'live' ? 'AL AIRE' : tally === 'prev' ? 'PREVENIDO' : ''}
                </div>

                {/* Camera indicator badge */}
                <div className="cam-mode-badge">
                    {facingMode === 'environment' ? '📷 TRASERA' : '🤳 FRONTAL'}
                </div>

                {/* Return PiP */}
                <div className={`return-pip ${returnStream ? 'active' : ''}`}>
                    {returnStream && <VideoPlayer stream={returnStream} muted={false} />}
                    <div className="pip-label">RETORNO DIRECTOR</div>
                </div>

                {/* Local camera feed */}
                {myStreamState && (
                    <VideoPlayer
                        stream={myStreamState}
                        muted={true}
                        className="guest-video"
                        style={{ transform: isMirrored ? 'scaleX(-1)' : 'none' }}
                    />
                )}

                {/* Controls bar */}
                <div className="guest-overlay">
                    <span className="ch-label">CH&nbsp;{slotId}</span>

                    <button className={`icon-btn ${micMuted ? 'off' : ''}`} onClick={toggleMic}>
                        {micMuted ? '🔇' : '🎤'}
                    </button>

                    <button className={`icon-btn ${camOff ? 'off' : ''}`} onClick={toggleCam}>
                        {camOff ? '🚫' : '📷'}
                    </button>

                    <button
                        className="icon-btn switch"
                        onClick={switchCamera}
                        title="Cambiar cámara"
                        disabled={switchingCamera}
                        style={{ opacity: switchingCamera ? 0.6 : 1 }}
                    >
                        {switchingCamera ? '⏳' : '🔄'}
                    </button>
                </div>
            </div>
        );
    };

    /* ════════════════════════════════════════════════════════
       LOBBY  (entrada al director)
    ════════════════════════════════════════════════════════ */
    const LobbyView = ({ defaultRoom }) => {
        const [room, setRoom] = useState(defaultRoom);
        const go = () => { window.location.href = `?mode=director&room=${room}`; };
        const handleKey = (e) => { if (e.key === 'Enter') go(); };
        return (
            <div className="lobby-container">
                <div className="glass-box">
                    <div style={{ fontSize:'2.2rem', fontWeight:900, marginBottom:'8px', color:'#3b82f6', textTransform:'uppercase', letterSpacing:'-0.04em' }}>
                        StreamCall PRO
                    </div>
                    <div style={{ color:'#475569', fontSize:'0.8rem', fontWeight:700, marginBottom:'28px', textTransform:'uppercase', letterSpacing:'0.1em' }}>
                        3 canales · Tally · IFB · OBS
                    </div>
                    <input
                        value={room}
                        onChange={e => setRoom(e.target.value.toUpperCase())}
                        onKeyDown={handleKey}
                        placeholder="NOMBRE DE SALA"
                    />
                    <button
                        className="btn btn-blue"
                        style={{ padding:'16px', fontSize:'1.05rem' }}
                        onClick={go}
                    >
                        ABRIR DASHBOARD DIRECTOR
                    </button>
                </div>
            </div>
        );
    };

    /* ════════════════════════════════════════════════════════
       APP ROUTER
    ════════════════════════════════════════════════════════ */
    const App = () => {
        const [appState, setAppState] = useState({ mode: null, room: null, slot: '1' });

        useEffect(() => {
            const p = new URLSearchParams(window.location.search);
            const m = p.get('mode');
            const r = p.get('room');
            const s = p.get('slot') || '1';
            if (m && r) {
                if (m === 'obs') document.body.classList.add('obs-mode');
                setAppState({ mode: m, room: r, slot: s });
            } else {
                setAppState({
                    mode: 'lobby',
                    room: Math.random().toString(36).substring(2,6).toUpperCase(),
                    slot: '1'
                });
            }
        }, []);

        if (!appState.mode) return null;
        if (appState.mode === 'director') return <DirectorView roomName={appState.room} />;
        if (appState.mode === 'obs')      return <ObsView roomName={appState.room} slotId={appState.slot} />;
        if (appState.mode === 'guest')    return <GuestView roomName={appState.room} slotId={appState.slot} />;
        return <LobbyView defaultRoom={appState.room} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
