        @keyframes slideUp {

        .teleprompter-overlay {

            left: 50%;
            transform: translate(-50%, 0);

            border-radius: 20px;

        @keyframes fadeInOut {

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CONFIG = {
            PEER_CONFIG: {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                    ],
                    iceTransportPolicy: 'all'
                }
            },
            MQTT_BROKER: 'wss://broker.emqx.io:8084/mqtt',
            MQTT_USER: 'streamcall',
            MQTT_PASS: 'streamcall123',
        };

        const Logger = {
            logs: [],
            info: (e, d) => { Logger.logs.push({ level: 'info', event: e, data: String(d), ts: Date.now() }); console.log(`[INFO] ${e}:`, d); },
            error: (e, d) => { Logger.logs.push({ level: 'error', event: e, data: String(d), ts: Date.now() }); console.error(`[ERROR] ${e}:`, d); },
            warn: (e, d) => { Logger.logs.push({ level: 'warn', event: e, data: String(d), ts: Date.now() }); console.warn(`[WARN] ${e}:`, d); }
        };

        const Storage = {
            save: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { } },
            load: (k, d) => { try { const i = localStorage.getItem(k); return i ? JSON.parse(i) : d; } catch (e) { return d; } }
        };

        const createVideoRecorder = () => ({
            recorder: null, chunks: [], isRecording: false,
            start(stream, name) {
                if (!stream || !stream.getTracks().length) return;
                this.chunks = [];
                const mime = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm', 'video/mp4']
                    .find(m => MediaRecorder.isTypeSupported(m)) || '';
                this.recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
                this.recorder.ondataavailable = e => { if (e.data.size > 0) this.chunks.push(e.data); };
                this.recorder.onstop = () => {
                    const ext = mime.includes('mp4') ? 'mp4' : 'webm';
                    const blob = new Blob(this.chunks, { type: mime || 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    Object.assign(document.createElement('a'), { href: url, download: `${name}-${Date.now()}.${ext}` }).click();
                    setTimeout(() => URL.revokeObjectURL(url), 60000);
                };
                this.recorder.start(); this.isRecording = true;
            },
            stop() { if (this.recorder && this.isRecording) { this.recorder.stop(); this.isRecording = false; } }
        });

        const eventBus = {
            listeners: {},
            on(event, cb) { if (!this.listeners[event]) this.listeners[event] = []; this.listeners[event].push(cb); },
            off(event, cb) { if (!this.listeners[event]) return; this.listeners[event] = this.listeners[event].filter(l => l !== cb); },
            emit(event, data) { if (this.listeners[event]) this.listeners[event].forEach(cb => cb(data)); }
        };
        const toast = (msg, type = 'success') => eventBus.emit('toast', { msg, type });

        const Toaster = () => {
            const [toasts, setToasts] = useState([]);
            useEffect(() => {
                const handle = t => {
                    const id = Date.now() + Math.random();
                    setToasts(prev => [...prev, { ...t, id }]);
                    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 3000);
                };
                eventBus.on('toast', handle);
                return () => eventBus.off('toast', handle);
            }, []);
            return (
                <div style={{ position: 'fixed', top: 20, right: 20, zIndex: 99999, display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {toasts.map(t => (
                        <div key={t.id} style={{
                            background: t.type === 'error' ? '#ef4444' : '#10b981', color: 'white',
                            padding: '12px 24px', borderRadius: 8, fontWeight: 'bold',
                            boxShadow: '0 4px 12px rgba(0,0,0,0.3)', animation: 'slideInRight 0.3s ease'
                        }}>
                            {t.msg}
                        </div>
                    ))}
                </div>
            );
        };

        const AudioMeter = ({ stream }) => {
            const [vol, setVol] = useState(0);
            const reqRef = useRef();
            useEffect(() => {
                if (!stream || !stream.getAudioTracks().length) return;
                let ctx, src, analyser;
                try {
                    ctx = new (window.AudioContext || window.webkitAudioContext)();
                    src = ctx.createMediaStreamSource(stream);
                    analyser = ctx.createAnalyser();
                    analyser.fftSize = 256;
                    src.connect(analyser);
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    const render = () => {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                        setVol(sum / dataArray.length);
                        reqRef.current = requestAnimationFrame(render);
                    };
                    render();
                } catch (e) { }
                return () => {
                    cancelAnimationFrame(reqRef.current);
                    if (src) src.disconnect();
                    if (ctx && ctx.state !== 'closed') ctx.close().catch(() => { });
                };
            }, [stream]);

            return (
                <div style={{ width: '50px', height: '6px', background: '#27272a', borderRadius: '3px', overflow: 'hidden', marginTop: '6px' }}>
                    <div style={{ width: `${Math.min(100, vol)}%`, height: '100%', background: vol > 25 ? '#10b981' : '#a78bfa', transition: 'width 0.1s linear' }} />
                </div>
            );
        };

        const StatsPanel = ({ peerRef }) => {
            const [stats, setStats] = useState({ latency: 0, packetLoss: 0, jitter: 0 });
            useEffect(() => {
                const timer = setInterval(async () => {
                    const pc = peerRef.current?.connections ? Object.values(peerRef.current.connections)[0]?.[0]?.peerConnection : null;
                    if (!pc) return;
                    try {
                        const s = await pc.getStats();
                        s.forEach(r => {
                            if (r.type === 'inbound-rtp' && r.kind === 'video') {
                                setStats({
                                    latency: Math.round((r.currentRoundTripTime || 0) * 1000),
                                    packetLoss: +Math.max(0, ((r.packetsLost || 0) / ((r.packetsReceived || 0) + (r.packetsLost || 0) || 1) * 100)).toFixed(2),
                                    jitter: +((r.jitter || 0) * 1000).toFixed(2),
                                });
                            }
                        });
                    } catch (e) { }
                }, 2000);
                return () => clearInterval(timer);
            }, [peerRef]);

            return (
                <div className="stats-panel">
                    <div className="stat-line"><span>Latencia:</span><span className={stats.latency < 100 ? 'stat-good' : 'stat-bad'}>{stats.latency} ms</span></div>
                    <div className="stat-line"><span>Pérdida:</span><span className={stats.packetLoss < 1 ? 'stat-good' : 'stat-bad'}>{stats.packetLoss}%</span></div>
                    <div className="stat-line"><span>Jitter:</span><span className={stats.jitter < 30 ? 'stat-good' : 'stat-bad'}>{stats.jitter} ms</span></div>
                </div>
            );
        };

        const ConnectionStatus = ({ state, ping = 0 }) => {
            if (state !== 'connected') {
                const labels = { connecting: 'Conectando...', disconnected: 'Desconectado', failed: 'Error' };
                return (
                    <div className={`connection-status conn-${state}`}>
                        <span className="conn-dot"></span>
                        {labels[state] || state}
                    </div>
                );
            }
            let color = '#ef4444';
            if (ping > 0 && ping < 150) color = '#10b981';
            else if (ping > 0 && ping < 400) color = '#f59e0b';
            return (
                <div className="connection-status" style={{ background: 'rgba(0,0,0,0.6)', color }}>
                    <div style={{ display: 'flex', gap: 3, alignItems: 'flex-end', height: 14, paddingBottom: 2 }}>
                        <div style={{ width: 4, height: 6, background: color, borderRadius: 2 }} />
                        <div style={{ width: 4, height: 10, background: ping < 400 && ping > 0 ? color : '#52525b', borderRadius: 2 }} />
                        <div style={{ width: 4, height: 14, background: ping < 150 && ping > 0 ? color : '#52525b', borderRadius: 2 }} />
                    </div>
                    <span>{ping > 0 ? `${ping}ms` : 'Al Aire'}</span>
                </div>
            );
        };

        const GuestCard = ({ guest, isObsMode, namePrefix }) => {
            const videoRef = useRef(null);
            const audioRef = useRef(null);
            const [recording, setRecording] = useState(false);
            const [ping, setPing] = useState(0);
            const recorderRef = useRef(null);

            useEffect(() => {
                if (!recorderRef.current) recorderRef.current = createVideoRecorder();

                const pt = setInterval(() => {
                    const pc = guest.call?.peerConnection;
                    if (pc) {
                        pc.getStats().then(s => {
                            s.forEach(r => {
                                if (r.type === 'candidate-pair' && r.state === 'succeeded') {
                                    setPing(Math.round((r.currentRoundTripTime || 0) * 1000));
                                }
                            });
                        });
                    }
                }, 2000);
                return () => clearInterval(pt);
            }, [guest]);

            useEffect(() => {
                if (videoRef.current && guest.stream) {
                    videoRef.current.srcObject = guest.stream;
                    videoRef.current.play().catch(() => { });
                }
                if (audioRef.current && guest.stream) {
                    audioRef.current.srcObject = guest.stream;
                    audioRef.current.play().catch(() => { });
                }
            }, [guest.stream]);

            const toggleRec = () => {
                const newState = !recording;
                if (newState && guest.stream) recorderRef.current.start(guest.stream, `sc-${namePrefix}-${guest.id.slice(-4)}`);
                else recorderRef.current.stop();
                setRecording(newState);
            };

            const captureSnapshot = () => {
                if (!videoRef.current) return;
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth || 1280;
                canvas.height = videoRef.current.videoHeight || 720;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
                const url = canvas.toDataURL('image/png');
                Object.assign(document.createElement('a'), { href: url, download: `snap-${namePrefix}-${guest.id.slice(-4)}-${Date.now()}.png` }).click();
            };

            return (
                <div className="guest-card">
                    <video ref={videoRef} autoPlay playsInline muted={isObsMode} onClick={() => videoRef.current.requestFullscreen?.()} />
                    {!isObsMode && <audio ref={audioRef} autoPlay playsInline style={{ display: 'none' }} />}
                    {!isObsMode && (
                        <div className="guest-card-overlay">
                            <div className="guest-id">
                                <ConnectionStatus state={guest.connState} ping={ping} />
                                <span style={{ display: 'block', marginLeft: '30px', marginTop: '4px' }}>{guest.id.substring(0, 10)}</span>
                            </div>
                            <div className="guest-actions">
                                <button className="gc-btn" onClick={captureSnapshot} title="Tomar Foto">📸</button>
                                <button className={`gc-btn ${recording ? 'recording' : ''}`} onClick={toggleRec} title="Grabar Video">
                                    {recording ? '⏹ REC' : '⏺'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* ════════════════════════════════════════════════════════════
           DIRECTOR / OBS VIEW - CON RETORNO DE CÁMARA & MULTICAM
           ════════════════════════════════════════════════════════════ */
        const ReceiverView = ({ roomName, isObsMode }) => {
            const [status, setStatus] = useState('BUSCANDO...');
            const [guests, setGuests] = useState([]);
            const [tally, setTally] = useState('idle');
            const [cleanMode, setCleanMode] = useState(false);
            const [audioDevices, setAudioDevices] = useState([]);
            const [videoDevices, setVideoDevices] = useState([]);
            const [selectedAudio, setSelectedAudio] = useState('');
            const [selectedVideo, setSelectedVideo] = useState('');
            const [micMuted, setMicMuted] = useState(false);
            const [camMuted, setCamMuted] = useState(true);
            const [prompterMsg, setPrompterMsg] = useState('');
            const [err, setErr] = useState(null);

            const connected = guests.length > 0;
            const peerRef = useRef(null);
            const mqttRef = useRef(null);
            const dirStreamRef = useRef(null);
            const timerStats = useRef(null);
            const selectedARef = useRef('');
            const selectedVRef = useRef('');

            useEffect(() => { selectedARef.current = selectedAudio; }, [selectedAudio]);
            useEffect(() => { selectedVRef.current = selectedVideo; }, [selectedVideo]);

            useEffect(() => {
                init();
                const handleBeforeUnload = () => {
                    dirStreamRef.current?.getTracks().forEach(t => t.stop());
                    peerRef.current?.destroy();
                    mqttRef.current?.end();
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => {
                    window.removeEventListener('beforeunload', handleBeforeUnload);
                    clearInterval(timerStats.current);
                    try {
                        dirStreamRef.current?.getTracks().forEach(t => t.stop());
                        peerRef.current?.destroy();
                        mqttRef.current?.end();
                    } catch (e) { }
                };
            }, [roomName, isObsMode]);

            const acquireDirectorStream = async () => {
                try {
                    dirStreamRef.current?.getTracks().forEach(t => t.stop());

                    const constraints = {
                        audio: selectedARef.current
                            ? { deviceId: { exact: selectedARef.current }, echoCancellation: true, noiseSuppression: true }
                            : { echoCancellation: true, noiseSuppression: true },
                        video: selectedVRef.current
                            ? { deviceId: { exact: selectedVRef.current }, width: { ideal: 640 }, height: { ideal: 360 } }
                            : { width: { ideal: 640 }, height: { ideal: 360 } }
                    };

                    dirStreamRef.current = await navigator.mediaDevices.getUserMedia(constraints);

                    const vt = dirStreamRef.current.getVideoTracks()[0];
                    if (vt) vt.enabled = !camMuted;
                    const at = dirStreamRef.current.getAudioTracks()[0];
                    if (at) at.enabled = !micMuted;

                } catch (e) {
                    Logger.warn('DirStream', e.message);
                    try {
                        dirStreamRef.current = await navigator.mediaDevices.getUserMedia({
                            audio: { echoCancellation: true, noiseSuppression: true }
                        });

                        const canvas = document.createElement('canvas');
                        canvas.width = 640; canvas.height = 360;
                        const ctx = canvas.getContext('2d');
                        setInterval(() => {
                            ctx.fillStyle = '#09090b';
                            ctx.fillRect(0, 0, 640, 360);
                            ctx.fillStyle = '#3f3f46';
                            ctx.font = '24px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText('Cámara Bloqueada o No Disponible', 320, 180);
                        }, 1000);
                        const canvasStream = canvas.captureStream(15);
                        const canvasVideoTrack = canvasStream.getVideoTracks()[0];
                        if (canvasVideoTrack) dirStreamRef.current.addTrack(canvasVideoTrack);
                    } catch (e2) {
                        dirStreamRef.current = null;
                    }
                }
            };

            const init = async () => {
                try {
                    if (!isObsMode) {
                        const devs = await navigator.mediaDevices.enumerateDevices();
                        const aDevs = devs.filter(d => d.kind === 'audioinput');
                        const vDevs = devs.filter(d => d.kind === 'videoinput');
                        setAudioDevices(aDevs);
                        setVideoDevices(vDevs);

                        const savedA = Storage.load('sa', aDevs[0]?.deviceId || '');
                        const savedV = Storage.load('sv', vDevs[0]?.deviceId || '');
                        setSelectedAudio(savedA);
                        setSelectedVideo(savedV);
                        selectedARef.current = savedA;
                        selectedVRef.current = savedV;

                        await acquireDirectorStream();

                        mqttRef.current = window.mqtt.connect(CONFIG.MQTT_BROKER, {
                            clientId: `dir_${Date.now()}`,
                            username: CONFIG.MQTT_USER,
                            password: CONFIG.MQTT_PASS,
                            clean: true
                        });
                        mqttRef.current.on('connect', () => {
                            mqttRef.current.publish(`sc_return/${roomName}`, JSON.stringify({ camMuted: true, micMuted: false }), { retain: true });
                        });
                        mqttRef.current.on('error', e => Logger.warn('MQTT-dir', e.message));
                    }

                    const myId = isObsMode ? `obs_${roomName.toUpperCase()}` : `dir_${roomName.toUpperCase()}`;
                    peerRef.current = new Peer(myId, CONFIG.PEER_CONFIG);

                    peerRef.current.on('open', () => {
                        setStatus('LISTO');
                    });

                    peerRef.current.on('call', handleCall);

                    peerRef.current.on('error', e => {
                        Logger.error('Peer-dir', e.type);
                        if (e.type !== 'peer-unavailable') setErr(e.type);
                    });

                    timerStats.current = setInterval(() => {
                        setGuests(prev => {
                            let changed = false;
                            const newGuests = prev.map(g => {
                                const pc = g.call?.peerConnection;
                                if (pc && pc.iceConnectionState) {
                                    const state = (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') ? 'connected' : pc.iceConnectionState;
                                    if (g.connState !== state) { changed = true; return { ...g, connState: state }; }
                                }
                                return g;
                            });
                            return changed ? newGuests : prev;
                        });
                    }, 2000);

                } catch (e) {
                    Logger.error('Dir-init', e.message);
                    setErr(e.message);
                }
            };

            const handleCall = (call) => {
                try {
                    let answerStream = dirStreamRef.current;
                    if (!answerStream) {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const dest = ctx.createMediaStreamDestination();
                        answerStream = dest.stream;
                    }

                    call.answer(answerStream);

                    call.on('stream', guestStream => {
                        setGuests(prev => {
                            const exists = prev.find(g => g.id === call.peer);
                            if (exists) return prev.map(g => g.id === call.peer ? { ...g, stream: guestStream } : g);
                            return [...prev, { id: call.peer, call, stream: guestStream, connState: 'connected' }];
                        });
                        setStatus('ONLINE');
                        setErr(null);
                    });

                    call.on('close', () => {
                        setGuests(prev => prev.filter(g => g.id !== call.peer));
                    });
                    call.on('error', e => {
                        setErr(e.message);
                    });
                } catch (e) {
                    Logger.error('Dir-handleCall', e.message);
                }
            };

            const changeVideo = async () => {
                await acquireDirectorStream();
                const newStream = dirStreamRef.current;
                if (!newStream) return;

                const conns = Object.values(peerRef.current?.connections || {}).flat();
                for (const conn of conns) {
                    const pc = conn.peerConnection;
                    if (!pc) continue;
                    const newVideoTrack = newStream.getVideoTracks()[0];
                    const videoSender = pc.getSenders().find(s => s.track?.kind === 'video');
                    if (videoSender && newVideoTrack) videoSender.replaceTrack(newVideoTrack).catch(() => { });
                    const newAudioTrack = newStream.getAudioTracks()[0];
                    const audioSender = pc.getSenders().find(s => s.track?.kind === 'audio');
                    if (audioSender && newAudioTrack) audioSender.replaceTrack(newAudioTrack).catch(() => { });
                }
            };

            const changeMic = async () => {
                await acquireDirectorStream();
                const newTrack = dirStreamRef.current?.getAudioTracks()[0];
                if (!newTrack) return;
                const conns = Object.values(peerRef.current?.connections || {}).flat();
                for (const conn of conns) {
                    const sender = conn.peerConnection?.getSenders().find(s => s.track?.kind === 'audio');
                    if (sender) sender.replaceTrack(newTrack).catch(() => { });
                }
            };

            const toggleMicMute = (forceState = null) => {
                const tracks = dirStreamRef.current?.getAudioTracks() || [];
                if (!tracks.length) return;
                const newState = forceState !== null ? forceState : !tracks[0].enabled;
                tracks[0].enabled = newState;
                const isMuted = !newState;
                setMicMuted(isMuted);
                mqttRef.current?.publish(`sc_return/${roomName}`, JSON.stringify({ micMuted: isMuted }), { retain: true });
            };

            const toggleCamMute = () => {
                const tracks = dirStreamRef.current?.getVideoTracks() || [];
                if (!tracks.length) return;
                tracks[0].enabled = !tracks[0].enabled;
                const isMuted = !tracks[0].enabled;
                setCamMuted(isMuted);
                mqttRef.current?.publish(`sc_return/${roomName}`, JSON.stringify({ camMuted: isMuted }), { retain: true });
            };

            const tally_set = s => {
                setTally(s);
                mqttRef.current?.publish(`sc_tally/${roomName}`, JSON.stringify({ state: s }), { retain: true });
            };

            const sendPrompter = () => {
                if (!prompterMsg.trim()) return;
                mqttRef.current?.publish(`sc_prompter/${roomName}`, JSON.stringify({ msg: prompterMsg }));
                setPrompterMsg('');
                toast('Mensaje enviado al Guest');
            };

            const forceQuality = () => {
                if (window.confirm('¿Forzar a todos los Guests a bajar su calidad a 360p para estabilizar la red?')) {
                    mqttRef.current?.publish(`sc_cmd/${roomName}`, JSON.stringify({ cmd: 'force_quality', q: '360' }));
                    toast('Comando de reducción de calidad enviado');
                }
            };

            const copy_link = m => {
                const safeRoom = roomName.replace(/[^a-zA-Z0-9]/g, '');
                const u = `${window.location.href.split('?')[0]}?mode=${m}&room=${safeRoom}`;
                navigator.clipboard.writeText(u).then(() => toast('✓ Enlace copiado al portapapeles'));
            };

            if (isObsMode) return (
                <div className="obs-layout">
                    {guests.length === 0 ? (
                        <div className="obs-status"><div className="loader" /> {status}</div>
                    ) : (
                        <div className="multicam-grid">
                            {guests.map(g => <GuestCard key={g.id} guest={g} isObsMode={true} />)}
                        </div>
                    )}
                    {err && <div className="error-toast">{err}</div>}
                </div>
            );

            return (
                <div className={`director-layout ${cleanMode ? 'clean-mode' : ''}`}>
                    {cleanMode && <div className="exit-btn" onClick={() => setCleanMode(false)}>✕ Salir</div>}
                    <div className="video-stage">
                        {guests.length === 0 ? (
                            <div style={{ position: 'absolute', color: '#71717a' }}>📡 {status}</div>
                        ) : (
                            <div className="multicam-grid">
                                {guests.map(g => <GuestCard key={g.id} guest={g} isObsMode={false} namePrefix={roomName} />)}
                            </div>
                        )}
                    </div>
                    <div className="director-controls">
                        <h2 style={{ fontSize: '1.1rem', fontWeight: 800, background: 'linear-gradient(135deg,#a78bfa,#d8b4fe)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '20px', textAlign: 'center' }}>
                            📡 StreamCall PRO
                        </h2>

                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                            <label style={{ color: '#a78bfa', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🎙 Micrófono Retorno</label>
                            {!micMuted && connected && <AudioMeter stream={dirStreamRef.current} />}
                        </div>
                        <select value={selectedAudio} onChange={e => {
                            setSelectedAudio(e.target.value);
                            Storage.save('sa', e.target.value);
                            selectedARef.current = e.target.value;
                            changeMic();
                        }}>
                            <option value="">-- Seleccionar micrófono --</option>
                            {audioDevices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || 'Micrófono'}</option>)}
                        </select>

                        <label style={{ color: '#a78bfa', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>📷 Cámara Retorno</label>
                        <select value={selectedVideo} onChange={e => {
                            setSelectedVideo(e.target.value);
                            Storage.save('sv', e.target.value);
                            selectedVRef.current = e.target.value;
                            changeVideo();
                        }}>
                            <option value="">-- Seleccionar cámara --</option>
                            {videoDevices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || 'Cámara'}</option>)}
                        </select>

                        <div style={{ display: 'flex', gap: '10px' }}>
                            <button className={`btn ${micMuted ? 'btn-rose' : 'btn-emerald'}`}
                                onPointerDown={(e) => { e.preventDefault(); if (micMuted) toggleMicMute(true); }}
                                onPointerUp={(e) => { e.preventDefault(); if (!micMuted) toggleMicMute(false); }}
                                onPointerLeave={(e) => { e.preventDefault(); if (!micMuted) toggleMicMute(false); }}
                                onContextMenu={(e) => e.preventDefault()}
                                disabled={!connected} style={{ flex: 1.5, touchAction: 'none' }}>
                                👇 PTT (Manten Presionado)
                            </button>
                            <button className={`btn ${micMuted ? 'btn-rose' : 'btn-dark'}`} onClick={() => toggleMicMute()} disabled={!connected} style={{ flex: 1 }}>
                                {micMuted ? '🔇 MUTE' : '🎤 ON'}
                            </button>
                            <button className={`btn ${camMuted ? 'btn-rose' : 'btn-blue'}`} onClick={toggleCamMute} disabled={!connected} style={{ flex: 1 }}>
                                {camMuted ? '📵' : '📹'}
                            </button>
                        </div>

                        <div className="divider" />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>📝 Teleprompter a Guests</label>
                        <div style={{ display: 'flex', gap: 5 }}>
                            <input value={prompterMsg} onChange={e => setPrompterMsg(e.target.value)} placeholder="Mensaje rápido..." style={{ flex: 1 }} />
                            <button className="btn btn-violet" onClick={sendPrompter} style={{ width: 'auto', marginBottom: 0 }}>Enviar</button>
                        </div>

                        <div className="divider" />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>⚡ Rendimiento</label>
                        <button className="btn btn-rose" onClick={forceQuality} style={{ fontSize: '0.8rem' }}>🔻 Forzar Baja Calidad (360p)</button>

                        <div className="divider" />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🔗 Compartir</label>
                        <button className="btn btn-emerald" onClick={() => copy_link('obs')}>📺 Copiar Link OBS</button>
                        <button className="btn btn-dark" onClick={() => copy_link('guest')}>👤 Copiar Link Guest</button>

                        <div className="divider" />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🚦 Tally</label>
                        <div className="tally-grid">
                            <button className={`t-btn ${tally === 'idle' ? 'active-idle' : ''}`} onClick={() => tally_set('idle')}>OFF</button>
                            <button className={`t-btn ${tally === 'prev' ? 'active-prev' : ''}`} onClick={() => tally_set('prev')}>PREV</button>
                            <button className={`t-btn ${tally === 'live' ? 'active-live' : ''}`} onClick={() => tally_set('live')}>AIRE</button>
                        </div>

                        {connected && <StatsPanel peerRef={peerRef} />}
                        <button className="btn btn-dark" onClick={() => setCleanMode(true)}>⛶ Modo Limpio</button>
                    </div>
                    {err && <div className="error-toast">{err}</div>}
                </div>
            );
        };

        /* ════════════════════════════════════════════════════════════
           GUEST VIEW - CON CAMBIO DE CÁMARA CORREGIDO
           ════════════════════════════════════════════════════════════ */
        const GuestView = ({ roomName }) => {
            const [joined, setJoined] = useState(false);
            const [quality, setQuality] = useState(Storage.load('pq', '720'));
            const [tally, setTally] = useState('idle');
            const [micOff, setMicOff] = useState(false);
            const [camOff, setCamOff] = useState(false);
            const [hasReturn, setHasReturn] = useState(false);
            const [dirCamMuted, setDirCamMuted] = useState(true);
            const [dirMicMuted, setDirMicMuted] = useState(true);
            const [camera, setCamera] = useState(Storage.load('cm', 'user'));
            const [prompterText, setPrompterText] = useState('');
            const [idle, setIdle] = useState(false);
            const [pipPos, setPipPos] = useState({ x: 20, y: 20 });
            const [ping, setPing] = useState(0);
            const [err, setErr] = useState(null);
            const [connState, setConnState] = useState('connecting');
            const [cameras, setCameras] = useState([]);

            const localVideoRef = useRef(null);
            const returnVideoRef = useRef(null);
            const returnAudioRef = useRef(null);
            const peerRef = useRef(null);
            const mqttRef = useRef(null);
            const localStreamRef = useRef(null);
            const timerStats = useRef(null);
            const idleTimer = useRef(null);
            const abortRef = useRef(false);
            const outCallRef = useRef(null);
            const dragInfo = useRef({ isDragging: false, startX: 0, startY: 0, initX: 0, initY: 0 });

            useEffect(() => {
                const resetIdle = () => {
                    setIdle(false);
                    clearTimeout(idleTimer.current);
                    idleTimer.current = setTimeout(() => setIdle(true), 3000);
                };
                window.addEventListener('mousemove', resetIdle);
                window.addEventListener('touchstart', resetIdle);
                resetIdle();
                return () => {
                    window.removeEventListener('mousemove', resetIdle);
                    window.removeEventListener('touchstart', resetIdle);
                    clearTimeout(idleTimer.current);
                };
            }, []);

            useEffect(() => {
                if (!joined) return;
                abortRef.current = false;
                init_guest();

                const handleBeforeUnload = () => {
                    localStreamRef.current?.getTracks().forEach(t => t.stop());
                    peerRef.current?.destroy();
                    mqttRef.current?.end();
                };
                window.addEventListener('beforeunload', handleBeforeUnload);

                return () => {
                    window.removeEventListener('beforeunload', handleBeforeUnload);
                    abortRef.current = true;
                    clearInterval(timerStats.current);
                    try {
                        localStreamRef.current?.getTracks().forEach(t => t.stop());
                        peerRef.current?.destroy();
                        mqttRef.current?.end();
                    } catch (e) { }
                };
            }, [joined]);

            const applyBitrate = (pc, q) => {
                if (!pc) return;
                const limits = { '360': 600000, '720': 1500000, '1080': 3500000 };
                const maxBr = limits[q] || 1500000;
                pc.getSenders().forEach(sender => {
                    if (sender.track?.kind === 'video') {
                        const params = sender.getParameters();
                        if (!params.encodings) params.encodings = [{}];
                        if (params.encodings[0].maxBitrate !== maxBr) {
                            params.encodings[0].maxBitrate = maxBr;
                            sender.setParameters(params).catch(() => { });
                        }
                    }
                });
            };

            const getStreamWithFacingMode = async (facingMode, targetQuality = quality) => {
                const res = { '360': [640, 360], '720': [1280, 720], '1080': [1920, 1080] };
                const [w, h] = res[targetQuality] || res['720'];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: w }, height: { ideal: h }, facingMode: { exact: facingMode } },
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });
                    return stream;
                } catch (e) {
                    Logger.warn('getStream', `facingMode exact ${facingMode} falló, intentando ideal`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: w }, height: { ideal: h }, facingMode: { ideal: facingMode } },
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });
                    return stream;
                }
            };

            const switchCamera = async (forceQuality = null) => {
                try {
                    const newFacingMode = forceQuality ? camera : (camera === 'user' ? 'environment' : 'user');
                    const targetQ = forceQuality || quality;
                    localStreamRef.current?.getTracks().forEach(t => t.stop());
                    const newStream = await getStreamWithFacingMode(newFacingMode, targetQ);

                    if (abortRef.current) {
                        newStream.getTracks().forEach(t => t.stop());
                        return;
                    }

                    localStreamRef.current = newStream;
                    if (localVideoRef.current) localVideoRef.current.srcObject = newStream;

                    const newVideoTrackFallback = newStream.getVideoTracks()[0];
                    if (newVideoTrackFallback) newVideoTrackFallback.enabled = !camOff;
                    const newAudioTrackFallback = newStream.getAudioTracks()[0];
                    if (newAudioTrackFallback) newAudioTrackFallback.enabled = !micOff;

                    if (peerRef.current) {
                        const allConnections = Object.values(peerRef.current.connections || {}).flat();
                        for (const conn of allConnections) {
                            const pc = conn.peerConnection;
                            if (!pc) continue;
                            const senders = pc.getSenders();
                            const videoTrack = newStream.getVideoTracks()[0];
                            const videoSender = senders.find(s => s.track?.kind === 'video');
                            if (videoSender && videoTrack) await videoSender.replaceTrack(videoTrack).catch(() => { });
                            const audioTrack = newStream.getAudioTracks()[0];
                            const audioSender = senders.find(s => s.track?.kind === 'audio');
                            if (audioSender && audioTrack) await audioSender.replaceTrack(audioTrack).catch(() => { });
                        }
                    }

                    if (!forceQuality) {
                        setCamera(newFacingMode);
                        Storage.save('cm', newFacingMode);
                    }
                } catch (e) {
                    Logger.error('switchCamera', e.message);
                    setErr('Error de stream: ' + e.message);
                }
            };

            const init_guest = async () => {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevs = devices.filter(d => d.kind === 'videoinput');
                    setCameras(videoDevs);

                    mqttRef.current = window.mqtt.connect(CONFIG.MQTT_BROKER, {
                        clientId: `guest_${Date.now()}`,
                        username: CONFIG.MQTT_USER, password: CONFIG.MQTT_PASS
                    });

                    let subscribed = false;
                    mqttRef.current.on('connect', () => {
                        if (subscribed) return; subscribed = true;
                        mqttRef.current.subscribe(`sc_tally/${roomName}`);
                        mqttRef.current.subscribe(`sc_rec/${roomName}`);
                        mqttRef.current.subscribe(`sc_return/${roomName}`);
                        mqttRef.current.subscribe(`sc_prompter/${roomName}`);
                        mqttRef.current.subscribe(`sc_cmd/${roomName}`);

                        mqttRef.current.on('message', (_, payload) => {
                            try {
                                const topic = _.toString();
                                const d = JSON.parse(payload.toString());

                                if (topic.includes('sc_prompter') && d.msg) {
                                    setPrompterText(d.msg);
                                    // Limpiar animacion despues de 7 segundos
                                    setTimeout(() => setPrompterText(''), 7000);
                                }
                                else if (topic.includes('sc_cmd') && d.cmd === 'force_quality') {
                                    if (quality !== '360') {
                                        setQuality('360'); Storage.save('pq', '360');
                                        switchCamera('360');
                                        toast('Reduciendo formato a 360p para estabilizar red...');
                                    }
                                }
                                else {
                                    if (d.state) setTally(d.state);
                                    if (d.camMuted !== undefined) setDirCamMuted(d.camMuted);
                                    if (d.micMuted !== undefined) setDirMicMuted(d.micMuted);
                                }
                            } catch (e) { }
                        });
                    });
                    mqttRef.current.on('error', e => Logger.warn('MQTT-guest', e.message));

                    const stream = await getStreamWithFacingMode(camera, quality);
                    if (abortRef.current) { stream.getTracks().forEach(t => t.stop()); return; }

                    localStreamRef.current = stream;
                    if (localVideoRef.current) {
                        localVideoRef.current.srcObject = stream;
                        localVideoRef.current.play().catch(() => { });
                    }

                    const safeRoom = roomName.replace(/[^a-zA-Z0-9]/g, '');
                    peerRef.current = new Peer(`guest_${safeRoom}_${Date.now().toString(36).substr(2, 4)}`, CONFIG.PEER_CONFIG);

                    peerRef.current.on('open', () => {
                        if (abortRef.current) return;
                        setConnState('connected');

                        const setupGuestCall = (call) => {
                            outCallRef.current = call;
                            call.on('stream', returnStream => {
                                if (returnVideoRef.current) {
                                    returnVideoRef.current.srcObject = returnStream;
                                    returnVideoRef.current.play().catch(() => { });
                                }
                                if (returnAudioRef.current) {
                                    returnAudioRef.current.srcObject = returnStream;
                                    returnAudioRef.current.play().catch(() => { });
                                }
                                setHasReturn(true);
                            });
                            call.on('error', e => {
                                setConnState('failed');
                                call.isReconnecting = false;
                            });
                            call.on('close', () => {
                                setHasReturn(false);
                                setConnState('disconnected');
                                call.isReconnecting = false;
                            });
                        };

                        const outCall = peerRef.current.call(`dir_${safeRoom}`, localStreamRef.current);
                        setupGuestCall(outCall);
                        const obsCall = peerRef.current.call(`obs_${safeRoom}`, localStreamRef.current);
                        obsCall?.on('error', () => { });
                    });

                    peerRef.current.on('call', c => {
                        c.answer(localStreamRef.current);
                        c.on('error', () => { });
                    });

                    peerRef.current.on('error', e => {
                        if (e.type !== 'peer-unavailable') { setErr(e.type); setConnState('failed'); }
                    });

                    peerRef.current.on('disconnected', () => setConnState('disconnected'));

                    timerStats.current = setInterval(() => {
                        const conns = Object.values(peerRef.current?.connections || {});
                        const pc = conns[0]?.[0]?.peerConnection;
                        if (pc) {
                            applyBitrate(pc, quality);

                            pc.getStats().then(s => {
                                s.forEach(r => {
                                    if (r.type === 'candidate-pair' && r.state === 'succeeded') {
                                        setPing(Math.round((r.currentRoundTripTime || 0) * 1000));
                                    }
                                });
                            });

                            if (pc.iceConnectionState) {
                                const state = pc.iceConnectionState;
                                setConnState(state === 'connected' || state === 'completed' ? 'connected' : state);

                                if ((state === 'disconnected' || state === 'failed') && outCallRef.current && !outCallRef.current.isReconnecting && !abortRef.current) {
                                    outCallRef.current.isReconnecting = true;
                                    setTimeout(() => {
                                        if (abortRef.current || !peerRef.current || peerRef.current.destroyed) return;
                                        const safeRoom = roomName.replace(/[^a-zA-Z0-9]/g, '');
                                        const newCall = peerRef.current.call(`dir_${safeRoom}`, localStreamRef.current);
                                        if (newCall) setupGuestCall(newCall);
                                    }, 3000);
                                }
                            }
                        }
                    }, 2000);

                    setErr(null);
                } catch (e) {
                    Logger.error('Guest-init', e.message);
                    setConnState('failed');
                    setErr(e.message);
                }
            };

            const onPipPointerDown = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                dragInfo.current = { isDragging: true, startX: e.clientX, startY: e.clientY, initX: pipPos.x, initY: pipPos.y };
                e.currentTarget.setPointerCapture(e.pointerId);
            };

            const onPipPointerMove = (e) => {
                if (!dragInfo.current.isDragging) return;
                const dx = e.clientX - dragInfo.current.startX;
                const dy = e.clientY - dragInfo.current.startY;
                setPipPos({ x: dragInfo.current.initX + dx, y: dragInfo.current.initY + dy });
            };

            const onPipPointerUp = (e) => {
                dragInfo.current.isDragging = false;
                e.currentTarget.releasePointerCapture(e.pointerId);
            };

            if (!joined) return (
                <div className="lobby-container">
                    <div className="glass-box">
                        <div style={{ width: 64, height: 64, background: 'rgba(139,92,246,0.2)', borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 28 }}>📹</div>
                        <h2 style={{ fontSize: '1.5rem', fontWeight: 800, marginBottom: 8, textAlign: 'center' }}>Sala: {roomName}</h2>
                        <p style={{ color: '#71717a', textAlign: 'center', marginBottom: 24, fontSize: '0.9rem' }}>Configura tu calidad antes de entrar</p>
                        <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: 8, fontWeight: 'bold' }}>Calidad de video</label>
                        <select value={quality} onChange={e => { setQuality(e.target.value); Storage.save('pq', e.target.value); }}>
                            <option value="360">360p — Baja</option>
                            <option value="720">720p — Media</option>
                            <option value="1080">1080p — Alta</option>
                        </select>

                        <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: 8, fontWeight: 'bold' }}>Cámara inicial</label>
                        <select value={camera} onChange={e => { setCamera(e.target.value); Storage.save('cm', e.target.value); }}>
                            <option value="user">Frontal (Selfie)</option>
                            <option value="environment">Trasera</option>
                        </select>

                        <button className="btn btn-violet" onClick={() => setJoined(true)}>Entrar →</button>
                        {err && <div className="error-toast">{err}</div>}
                    </div>
                </div>
            );

            return (
                <div className={`guest-layout tally-${tally}`}>
                    <div className="guest-tally-border" />
                    <div className={`guest-ui-wrapper ${idle ? 'idle-hide' : ''}`}>
                        <ConnectionStatus state={connState} ping={ping} />
                        <div className="big-tally-text">
                            {tally === 'live' ? (<><span style={{ fontSize: '0.9rem' }}>🔴</span> AL AIRE</>
                            ) : (
                                <><span style={{ fontSize: '0.9rem' }}>⚠️</span> PREVENIDO</>)}
                        </div>
                    </div>



                    {prompterText && (
                        <div className="teleprompter-overlay">
                            {prompterText}
                        </div>
                    )}

                    <div
                        className={`return-pip ${hasReturn && !dirCamMuted ? 'active' : ''}`}
                        style={{ top: Math.max(0, pipPos.y), left: Math.max(0, pipPos.x), cursor: 'grab', touchAction: 'none' }}
                        onPointerDown={onPipPointerDown} onPointerMove={onPipPointerMove} onPointerUp={onPipPointerUp} onPointerCancel={onPipPointerUp}
                    >
                        <video ref={returnVideoRef} autoPlay playsInline muted style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                        <audio ref={returnAudioRef} autoPlay playsInline style={{ display: 'none' }} />
                        <div className="pip-label">
                            📺 Retorno {dirMicMuted && '🔇'} (Arrastra aquí)
                        </div>
                    </div>

                    <video ref={localVideoRef} className="guest-video" muted autoPlay playsInline />

                    <div className={`guest-ui-wrapper ${idle ? 'idle-hide' : ''}`}>
                        <div className="guest-overlay">
                            <div style={{ fontSize: '0.75rem', fontWeight: 'bold', color: '#a1a1a1', background: 'rgba(139,92,246,0.1)', padding: '6px 12px', borderRadius: 20 }}>
                                {roomName}
                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                                <div className={`mic-btn ${micOff ? 'off' : ''}`} title={micOff ? 'Activar mic' : 'Silenciar mic'}
                                    onClick={() => {
                                        const at = localStreamRef.current?.getAudioTracks();
                                        if (!at?.length) return;
                                        at[0].enabled = !at[0].enabled; setMicOff(!at[0].enabled);
                                    }}>
                                    {micOff ? '🔇' : '🎤'}
                                </div>
                                {!micOff && <AudioMeter stream={localStreamRef.current} />}
                            </div>
                            <div className={`mic-btn ${camOff ? 'off' : ''}`} title={camOff ? 'Activar cámara' : 'Apagar cámara'}
                                onClick={() => {
                                    const vt = localStreamRef.current?.getVideoTracks();
                                    if (!vt?.length) return;
                                    vt[0].enabled = !vt[0].enabled; setCamOff(!vt[0].enabled);
                                }}>
                                {camOff ? '📵' : '📹'}
                            </div>

                            <div className="mic-btn" title={`Cambiar a cámara ${camera === 'user' ? 'trasera' : 'frontal'}`} onClick={() => switchCamera()}>
                                🔄
                            </div>
                            {/* Eliminado Botón de grabación local (Guest ya no graba localmente para ahorrar CPU, todo se descarga del lado del Dir) */}
                        </div>
                    </div>
                    {err && <div className="error-toast">{err}</div>}
                </div>
            );
        };

        /* APP ROOT */
        const App = () => {
            const [mode, setMode] = useState(null);
            const [room, setRoom] = useState('');
            const [theme, setTheme] = useState(Storage.load('th', 'dark'));

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const m = p.get('mode'), r = p.get('room');
                if (m && r) {
                    const safeRoom = r.replace(/[^a-zA-Z0-9]/g, '');
                    setRoom(safeRoom);
                    setMode(m);
                    if (m === 'obs') document.body.classList.add('obs-mode');
                }
                else { setRoom(Math.random().toString(36).substring(2, 6).toUpperCase()); }
                if (theme === 'light') document.body.classList.add('light-theme');
            }, []);

            const goTo = m => {
                if (!room.trim()) return;
                const safeRoom = room.replace(/[^a-zA-Z0-9]/g, '');
                window.location.href = `?mode=${m}&room=${safeRoom}`;
            };

            if (mode === 'director') return <><Toaster /><ReceiverView roomName={room} isObsMode={false} /></>;
            if (mode === 'obs') return <><Toaster /><ReceiverView roomName={room} isObsMode={true} /></>;
            if (mode === 'guest') return <><Toaster /><GuestView roomName={room} /></>;

            return (
                <>
                    <Toaster />
                    <div className="lobby-container">
                        <div className="glass-box">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                                <div style={{ width: 64, height: 64, background: 'rgba(139,92,246,0.2)', borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28 }}>📡</div>
                                <button onClick={() => { const nt = theme === 'dark' ? 'light' : 'dark'; setTheme(nt); Storage.save('th', nt); document.body.classList.toggle('light-theme'); }}
                                    style={{ background: 'none', border: 'none', color: '#8b5cf6', fontSize: '1.5rem', cursor: 'pointer' }}>
                                    {theme === 'dark' ? '🌙' : '☀️'}
                                </button>
                            </div>
                            <h1 style={{ fontSize: '2rem', fontWeight: 800, marginBottom: 4, textTransform: 'uppercase', background: 'linear-gradient(135deg,#a78bfa,#d8b4fe)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', textAlign: 'center' }}>
                                StreamCall PRO
                            </h1>
                            <p style={{ color: '#52525b', textAlign: 'center', marginBottom: 28, fontSize: '0.8rem' }}>v10.2 — Cámara Retorno + Switch</p>
                            <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: 8, fontWeight: 'bold' }}>ID de Sala</label>
                            <input value={room} onChange={e => setRoom(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''))} placeholder="SALA" maxLength="20" />
                            <button className="btn btn-violet" onClick={() => goTo('director')}>🎛 Entrar como Director</button>
                            <button className="btn btn-emerald" onClick={() => goTo('guest')}>👤 Entrar como Guest</button>
                        </div>
                    </div>
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
