
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall V10 PRO (Fixed)</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        * { box-sizing: border-box; }
        body {
            background: #09090b; color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }
        body.obs-mode  { background: transparent !important; }
        body.light-theme { background: #f8f9fa; color: #1a1a1a; }

        .lobby-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%;
            background: radial-gradient(circle at center, #18181b 0%, #09090b 100%);
            padding: 20px;
        }
        body.light-theme .lobby-container { background: radial-gradient(circle at center, #e5e7eb 0%, #f3f4f6 100%); }
        .glass-box {
            background: rgba(24,24,27,0.6); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            max-width: 400px; width: 100%;
        }
        body.light-theme .glass-box { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.1); }
        input, select {
            width: 100%; background: #121214; border: 1px solid #3f3f46;
            color: white; padding: 16px; border-radius: 12px;
            font-size: 1.2rem; text-align: center; font-weight: bold;
            margin-bottom: 20px; outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        body.light-theme input, body.light-theme select { background: #f0f0f0; border-color: #d1d5db; color: #1a1a1a; }
        input:focus, select:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139,92,246,0.2); }

        .btn {
            width: 100%; padding: 14px; font-weight: 800; font-size: 0.95rem;
            border-radius: 12px; cursor: pointer; border: none;
            transition: all 0.2s ease; text-transform: uppercase;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif; margin-bottom: 12px;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-violet  { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .btn-emerald { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-rose    { background: linear-gradient(135deg, #f43f5e, #be123c); color: white; }
        .btn-dark    { background: #27272a; color: white; border: 1px solid #3f3f46; }
        .btn-dark:hover:not(:disabled) { background: #3f3f46; }

        .obs-layout {
            width: 100vw; height: 100vh; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; background: #000;
        }
        .obs-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index:1; }
        .obs-status {
            position: relative; z-index: 9999; background: rgba(0,0,0,0.85); color: #a78bfa;
            padding: 20px 30px; border-radius: 12px;
            font-family: 'Courier New', monospace; font-size: 16px;
            border: 2px solid #a78bfa; display: flex; align-items: center; gap: 10px;
        }

        .director-layout { display: flex; height: 100vh; position: relative; }
        .video-stage {
            flex: 1; background: #000; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .remote-video { width: 100%; height: 100%; object-fit: contain; }
        .director-controls {
            width: 380px; background: #0f0f11; border-left: 1px solid #27272a;
            display: flex; flex-direction: column;
            z-index: 10; flex-shrink: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto; padding: 20px;
        }
        body.light-theme .director-controls { background: #f8f9fa; border-left-color: #e5e7eb; }

        .tally-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .t-btn {
            padding: 16px 5px; font-size: 0.8rem; font-weight: 800;
            border-radius: 10px; cursor: pointer; border: 2px solid transparent;
            background: #18181b; color: #71717a; transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .t-btn.active-idle { border-color: #52525b; color: white; background: #27272a; }
        .t-btn.active-prev { background: rgba(16,185,129,0.15); border-color: #10b981; color: #34d399; }
        .t-btn.active-live { background: rgba(244,63,94,0.15); border-color: #f43f5e; color: #fb7185; animation: pulseRose 2s infinite; }

        .clean-mode .director-controls { display: none !important; }
        .exit-btn {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            background: rgba(225,29,72,0.9); color: white; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); font-size: 12px;
            display: flex; align-items: center; gap: 6px;
            font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s;
        }
        .exit-btn:hover { background: rgba(225,29,72,1); }

        .guest-layout {
            width: 100vw; height: 100vh; position: relative; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .guest-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .guest-tally-border {
            position: absolute; top:0; left:0; width:100%; height:100%;
            border: 12px solid transparent; pointer-events: none;
            transition: all 0.3s ease; z-index: 50; box-sizing: border-box;
        }
        .guest-layout.tally-live .guest-tally-border { border-color: #f43f5e; box-shadow: inset 0 0 60px rgba(244,63,94,0.6); }
        .guest-layout.tally-prev .guest-tally-border { border-color: #10b981; box-shadow: inset 0 0 60px rgba(16,185,129,0.6); }

        .return-pip {
            position: absolute; top: 20px; left: 20px;
            width: 280px; aspect-ratio: 16/9;
            background: #111; border: 2px solid #52525b;
            border-radius: 16px; overflow: hidden;
            z-index: 80; opacity: 0; pointer-events: none;
            transition: opacity 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
        }
        .return-pip.active { opacity: 1; pointer-events: auto; }
        .return-pip video  { width: 100%; height: 100%; object-fit: cover; }
        .pip-label {
            position: absolute; bottom: 8px; left: 8px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
            color: white; font-size: 11px; padding: 4px 10px;
            border-radius: 6px; font-weight: bold;
            display: flex; align-items: center; gap: 5px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .pip-icon {
            position: absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size: 2rem; opacity: 0.4; pointer-events: none;
        }

        .guest-overlay {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(24,24,27,0.85); backdrop-filter: blur(10px);
            padding: 12px 25px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            z-index: 100; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .mic-btn {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.4rem; transition: all 0.2s;
            background: #27272a; color: white; border: 1px solid #3f3f46;
        }
        .mic-btn:hover:not(.off) { background: #3f3f46; transform: scale(1.05); }
        .mic-btn.off { background: #e11d48; border-color: #f43f5e; }

        .big-tally-text {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            font-size: 1.5rem; font-weight: 800; padding: 8px 24px;
            border-radius: 12px; z-index: 100; text-transform: uppercase;
            display: none; letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .guest-layout.tally-live .big-tally-text { display: flex; align-items: center; gap: 8px; background: #e11d48; color: white; }
        .guest-layout.tally-prev .big-tally-text { display: flex; align-items: center; gap: 8px; background: #10b981; color: white; }

        .stats-panel {
            background: rgba(24,24,27,0.7); border: 1px solid #3f3f46;
            border-radius: 12px; padding: 12px; margin: 10px 0;
            font-size: 0.8rem; color: #a1a1a1; font-family: 'Courier New', monospace;
        }
        .stat-line { display: flex; justify-content: space-between; margin: 4px 0; }
        .stat-good { color: #10b981; }
        .stat-bad  { color: #ef4444; }
        .divider   { height: 1px; background: #3f3f46; margin: 15px 0; }

        /* NUEVO: Indicador de estado de conexión */
        .connection-status {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            padding: 8px 16px; border-radius: 8px; font-size: 0.75rem;
            font-weight: bold; display: flex; align-items: center; gap: 8px;
            transition: all 0.3s ease;
        }
        .conn-connecting { background: rgba(251,191,36,0.9); color: #000; }
        .conn-connected { background: rgba(16,185,129,0.9); color: #fff; }
        .conn-disconnected { background: rgba(239,68,68,0.9); color: #fff; }
        .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loader {
            border: 4px solid rgba(139,92,246,0.2); border-top-color: #8b5cf6;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        .error-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(239,68,68,0.9); color: white;
            padding: 15px 25px; border-radius: 8px; border: 1px solid #dc2626;
            z-index: 10000; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to   { transform: translateX(-50%) translateY(0);      opacity: 1; }
        }
        @keyframes pulseRose {
            0%,100% { box-shadow: 0 0 0 0   rgba(244,63,94,0.4); }
            70%      { box-shadow: 0 0 0 10px rgba(244,63,94,0);   }
        }
        @media (max-width: 768px) {
            .director-controls {
                width: 100% !important; position: absolute;
                bottom: 0; left: 0; right: 0; max-height: 50vh;
                border-left: none; border-top: 1px solid #27272a;
            }
            .video-stage { height: 50%; }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CONFIG = {
        PEER_CONFIG: {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                ],
                iceTransportPolicy: 'all'
            }
        },
        MQTT_BROKER: 'wss://broker.emqx.io:8084/mqtt',
        MQTT_USER: 'streamcall',
        MQTT_PASS: 'streamcall123',
    };

    const Logger = {
        logs: [],
        info:  (e,d) => { Logger.logs.push({level:'info', event:e,data:String(d),ts:Date.now()}); console.log(`[INFO] ${e}:`,d); },
        error: (e,d) => { Logger.logs.push({level:'error',event:e,data:String(d),ts:Date.now()}); console.error(`[ERROR] ${e}:`,d); },
        warn:  (e,d) => { Logger.logs.push({level:'warn', event:e,data:String(d),ts:Date.now()}); console.warn(`[WARN] ${e}:`,d); },
        export: () => {
            const blob = new Blob([JSON.stringify(Logger.logs,null,2)],{type:'application/json'});
            const url  = URL.createObjectURL(blob);
            Object.assign(document.createElement('a'),{href:url,download:`sc-logs-${Date.now()}.json`}).click();
            URL.revokeObjectURL(url);
        }
    };

    const StatsCollector = {
        stats: { latency:0, packetLoss:0, jitter:0 },
        collect: async (pc) => {
            if (!pc) return;
            try {
                const s = await pc.getStats();
                s.forEach(r => {
                    if (r.type === 'inbound-rtp' && r.kind === 'video') {
                        StatsCollector.stats = {
                            latency:    Math.round((r.currentRoundTripTime||0)*1000),
                            packetLoss: +Math.max(0,((r.packetsLost||0)/((r.packetsReceived||0)+(r.packetsLost||0)||1)*100)).toFixed(2),
                            jitter:     +((r.jitter||0)*1000).toFixed(2),
                        };
                    }
                });
            } catch(e) {}
        }
    };

    const Storage = {
        save: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} },
        load: (k,d) => { try { const i=localStorage.getItem(k); return i?JSON.parse(i):d; } catch(e){ return d; } }
    };

    const RecordingService = {
        recorder:null, chunks:[], isRecording:false,
        start(stream) {
            if (!stream||!stream.getTracks().length) return;
            this.chunks=[];
            const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
                .find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
            this.recorder=new MediaRecorder(stream,{mimeType:mime});
            this.recorder.ondataavailable=e=>{if(e.data.size>0)this.chunks.push(e.data);};
            this.recorder.onstop=()=>{
                const blob = new Blob(this.chunks,{type:'video/webm'});
                const url = URL.createObjectURL(blob);
                Object.assign(document.createElement('a'),{href:url,download:`sc-${Date.now()}.webm`}).click();
                setTimeout(() => URL.revokeObjectURL(url), 60000); // Cleanup después de 1 min
            };
            this.recorder.start(); this.isRecording=true;
        },
        stop() { if(this.recorder&&this.isRecording){this.recorder.stop();this.isRecording=false;} }
    };

    const StatsPanel = ({stats}) => (
        <div className="stats-panel">
            <div className="stat-line"><span>Latencia:</span><span className={stats.latency<100?'stat-good':'stat-bad'}>{stats.latency} ms</span></div>
            <div className="stat-line"><span>Pérdida:</span><span className={stats.packetLoss<1?'stat-good':'stat-bad'}>{stats.packetLoss}%</span></div>
            <div className="stat-line"><span>Jitter:</span><span className={stats.jitter<30?'stat-good':'stat-bad'}>{stats.jitter} ms</span></div>
        </div>
    );

    /* NUEVO: Componente de estado de conexión */
    const ConnectionStatus = ({ state }) => {
        const labels = {
            connecting: 'Conectando...',
            connected: 'Conectado',
            disconnected: 'Desconectado',
            failed: 'Error de conexión'
        };
        return (
            <div className={`connection-status conn-${state}`}>
                <span className="conn-dot"></span>
                {labels[state] || state}
            </div>
        );
    };

    /* ════════════════════════════════════════════════════════════
       DIRECTOR / OBS VIEW (CORREGIDO)
       ════════════════════════════════════════════════════════════ */
    const ReceiverView = ({ roomName, isObsMode, pin }) => {
        const [status,        setStatus]       = useState('BUSCANDO...');
        const [connected,     setConnected]     = useState(false);
        const [connState,     setConnState]     = useState('connecting');
        const [tally,         setTally]         = useState('idle');
        const [cleanMode,     setCleanMode]     = useState(false);
        const [audioDevices,  setAudioDevices]  = useState([]);
        const [selectedAudio, setSelectedAudio] = useState('');
        const [micMuted,      setMicMuted]      = useState(false);
        const [stats,         setStats]         = useState({...StatsCollector.stats});
        const [rec,           setRec]           = useState(false);
        const [err,           setErr]           = useState(null);

        const peerRef         = useRef(null);
        const videoRef        = useRef(null);
        const audioRef        = useRef(null);
        const mqttRef         = useRef(null);
        const dirMicStreamRef = useRef(null);
        const recRef          = useRef(false);
        const timerStats      = useRef(null);
        const selectedARef    = useRef('');
        const activeCallRef   = useRef(null);

        useEffect(() => { recRef.current    = rec;           }, [rec]);
        useEffect(() => { selectedARef.current = selectedAudio; }, [selectedAudio]);

        useEffect(() => {
            init();
            
            // NUEVO: Manejo de beforeunload
            const handleBeforeUnload = () => {
                if (recRef.current) RecordingService.stop();
                dirMicStreamRef.current?.getTracks().forEach(t=>t.stop());
                peerRef.current?.destroy();
                mqttRef.current?.end();
            };
            window.addEventListener('beforeunload', handleBeforeUnload);
            
            return () => {
                window.removeEventListener('beforeunload', handleBeforeUnload);
                clearInterval(timerStats.current);
                try {
                    if (recRef.current) RecordingService.stop();
                    dirMicStreamRef.current?.getTracks().forEach(t=>t.stop());
                    peerRef.current?.destroy();
                    mqttRef.current?.end();
                } catch(e) {}
            };
        }, [roomName, isObsMode]);

        const acquireDirectorMic = async () => {
            try {
                dirMicStreamRef.current?.getTracks().forEach(t=>t.stop());
                const constraints = selectedARef.current
                    ? { audio:{ deviceId:{exact:selectedARef.current}, echoCancellation:true, noiseSuppression:true } }
                    : { audio:{ echoCancellation:true, noiseSuppression:true } };
                dirMicStreamRef.current = await navigator.mediaDevices.getUserMedia(constraints);
                Logger.info('DirMic','adquirido');
            } catch(e) {
                Logger.warn('DirMic', e.message);
                dirMicStreamRef.current = null;
            }
        };

        const init = async () => {
            try {
                if (!isObsMode) {
                    const devs  = await navigator.mediaDevices.enumerateDevices();
                    const aDevs = devs.filter(d=>d.kind==='audioinput');
                    setAudioDevices(aDevs);
                    const saved = Storage.load('sa', aDevs[0]?.deviceId||'');
                    setSelectedAudio(saved);
                    selectedARef.current = saved;

                    await acquireDirectorMic();

                    mqttRef.current = window.mqtt.connect(CONFIG.MQTT_BROKER, {
                        clientId: `dir_${Date.now()}`,
                        username: CONFIG.MQTT_USER,
                        password: CONFIG.MQTT_PASS,
                        clean: true
                    });
                    mqttRef.current.on('error', e => Logger.warn('MQTT-dir', e.message));
                }

                const myId = isObsMode
                    ? `obs_${roomName.toUpperCase()}`
                    : `dir_${roomName.toUpperCase()}`;

                peerRef.current = new Peer(myId, CONFIG.PEER_CONFIG);
                
                peerRef.current.on('open',  () => {
                    setStatus('LISTO');
                    setConnState('connected');
                });
                
                peerRef.current.on('call',  handleCall);
                
                peerRef.current.on('error', e => {
                    Logger.error('Peer-dir', e.type);
                    setConnState('failed');
                    if (e.type !== 'peer-unavailable') setErr(e.type);
                });
                
                // NUEVO: Monitorear estado de conexión ICE
                peerRef.current.on('connection', conn => {
                    conn.on('open', () => setConnState('connected'));
                    conn.on('close', () => setConnState('disconnected'));
                });

                timerStats.current = setInterval(() => {
                    const conns = Object.values(peerRef.current?.connections||{});
                    const pc = conns[0]?.[0]?.peerConnection;
                    if (pc) { 
                        StatsCollector.collect(pc); 
                        setStats({...StatsCollector.stats}); 
                        // NUEVO: Monitorear estado ICE
                        if (pc.iceConnectionState) {
                            setConnState(pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed' ? 'connected' : pc.iceConnectionState);
                        }
                    }
                }, 2000);

            } catch(e) {
                Logger.error('Dir-init', e.message);
                setConnState('failed');
                setErr(e.message);
            }
        };

        const handleCall = (call) => {
            try {
                activeCallRef.current = call;
                
                // CORREGIDO: Si no hay mic, creamos un stream con pista de audio silenciosa
                let answerStream = dirMicStreamRef.current;
                if (!answerStream) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const dest = ctx.createMediaStreamDestination();
                    answerStream = dest.stream;
                }
                
                call.answer(answerStream);

                call.on('stream', guestStream => {
                    if (videoRef.current) {
                        videoRef.current.srcObject = guestStream;
                        videoRef.current.play().catch(()=>{});
                    }
                    if (audioRef.current) {
                        audioRef.current.srcObject = guestStream;
                        audioRef.current.play().catch(()=>{});
                    }
                    setConnected(true);
                    setConnState('connected');
                    setStatus('ONLINE');
                    setErr(null);
                    if (recRef.current && !RecordingService.isRecording) {
                        RecordingService.start(guestStream);
                    }
                    Logger.info('Dir-stream','Guest stream recibido');
                });

                call.on('close', () => {
                    setConnected(false);
                    setConnState('disconnected');
                });
                call.on('error', e => {
                    setErr(e.message);
                    setConnState('failed');
                });
            } catch(e) {
                Logger.error('Dir-handleCall', e.message);
            }
        };

        const changeMic = async () => {
            await acquireDirectorMic();
            const newTrack = dirMicStreamRef.current?.getAudioTracks()[0];
            if (!newTrack) return;
            
            // CORREGIDO: Verificar que hay conexiones activas
            const conns = Object.values(peerRef.current?.connections||{}).flat();
            if (conns.length === 0) {
                Logger.warn('changeMic', 'No hay conexiones activas');
                return;
            }
            
            for (const conn of conns) {
                const sender = conn.peerConnection?.getSenders().find(s=>s.track?.kind==='audio');
                if (sender) {
                    sender.replaceTrack(newTrack).catch(e => Logger.warn('replaceTrack', e.message));
                }
            }
        };

        const toggleMicMute = () => {
            const tracks = dirMicStreamRef.current?.getAudioTracks()||[];
            if (!tracks.length) return;
            tracks[0].enabled = !tracks[0].enabled;
            setMicMuted(!tracks[0].enabled);
        };

        const tally_set = s => {
            setTally(s);
            mqttRef.current?.publish(`sc_tally/${roomName}`,JSON.stringify({state:s}),{retain:true});
        };

        const copy_link = m => {
            // CORREGIDO: Sanitizar roomName
            const safeRoom = roomName.replace(/[^a-zA-Z0-9]/g, '');
            const u = `${window.location.href.split('?')[0]}?mode=${m}&room=${safeRoom}${pin?`&pin=${pin}`:''}`;
            navigator.clipboard.writeText(u).then(()=>alert('✓ Copiado:\n'+u));
        };

        if (isObsMode) return (
            <div className="obs-layout">
                <ConnectionStatus state={connState} />
                <video ref={videoRef} className="obs-video" autoPlay playsInline muted />
                <audio ref={audioRef} autoPlay playsInline style={{display:'none'}} />
                {!connected && <div className="obs-status"><div className="loader"/> {status}</div>}
                {err && <div className="error-toast">{err}</div>}
            </div>
        );

        return (
            <div className={`director-layout ${cleanMode?'clean-mode':''}`}>
                {cleanMode && <div className="exit-btn" onClick={()=>setCleanMode(false)}>✕ Salir</div>}
                <div className="video-stage">
                    <ConnectionStatus state={connState} />
                    <video ref={videoRef} className="remote-video" autoPlay playsInline muted />
                    <audio ref={audioRef} autoPlay playsInline style={{display:'none'}} />
                    {!connected && <div style={{position:'absolute',color:'#71717a'}}>📡 {status}</div>}
                </div>
                <div className="director-controls">
                    <h2 style={{fontSize:'1.1rem',fontWeight:800,background:'linear-gradient(135deg,#a78bfa,#d8b4fe)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:'20px',textAlign:'center'}}>
                        📡 StreamCall PRO
                    </h2>

                    <label style={{color:'#a78bfa',fontSize:'0.75rem',marginBottom:'8px',display:'block',fontWeight:'bold'}}>🎙 Mic Retorno → Guest</label>
                    <select value={selectedAudio} onChange={e=>{
                        setSelectedAudio(e.target.value);
                        Storage.save('sa',e.target.value);
                        selectedARef.current=e.target.value;
                        if(connected) changeMic();
                    }}>
                        <option value="">-- Seleccionar micrófono --</option>
                        {audioDevices.map(d=>(
                            <option key={d.deviceId} value={d.deviceId}>{d.label||'Micrófono'}</option>
                        ))}
                    </select>
                    <button className={`btn ${micMuted?'btn-rose':'btn-dark'}`} onClick={toggleMicMute} disabled={!connected}>
                        {micMuted ? '🔇 Retorno silenciado' : '🔊 Retorno activo'}
                    </button>

                    <div className="divider"/>

                    <label style={{color:'#a1a1a1',fontSize:'0.75rem',marginBottom:'8px',display:'block',fontWeight:'bold'}}>⏺ Grabación</label>
                    <button className={`btn ${rec?'btn-rose':'btn-emerald'}`} disabled={!connected}
                        onClick={()=>{
                            if(rec){RecordingService.stop();recRef.current=false;setRec(false);}
                            else if(videoRef.current?.srcObject){RecordingService.start(videoRef.current.srcObject);recRef.current=true;setRec(true);}
                            else setErr('Sin stream activo');
                        }}>
                        {rec ? '⏹ Parar grabación' : '⏺ Grabar'}
                    </button>

                    <div className="divider"/>

                    <label style={{color:'#a1a1a1',fontSize:'0.75rem',marginBottom:'8px',display:'block',fontWeight:'bold'}}>🔗 Compartir</label>
                    <button className="btn btn-emerald" onClick={()=>copy_link('obs')}>📺 Copiar Link OBS</button>
                    <button className="btn btn-dark"    onClick={()=>copy_link('guest')}>👤 Copiar Link Guest</button>

                    <div className="divider"/>

                    <label style={{color:'#a1a1a1',fontSize:'0.75rem',marginBottom:'8px',display:'block',fontWeight:'bold'}}>🚦 Tally</label>
                    <div className="tally-grid">
                        <button className={`t-btn ${tally==='idle'?'active-idle':''}`} onClick={()=>tally_set('idle')}>OFF</button>
                        <button className={`t-btn ${tally==='prev'?'active-prev':''}`} onClick={()=>tally_set('prev')}>PREV</button>
                        <button className={`t-btn ${tally==='live'?'active-live':''}`} onClick={()=>tally_set('live')}>AIRE</button>
                    </div>

                    {connected && <StatsPanel stats={stats}/>}
                    <button className="btn btn-dark" onClick={Logger.export}>📥 Exportar Logs</button>
                    <button className="btn btn-dark" onClick={()=>setCleanMode(true)}>⛶ Modo Limpio</button>
                </div>
                {err && <div className="error-toast">{err}</div>}
            </div>
        );
    };

    /* ════════════════════════════════════════════════════════════
       GUEST VIEW (CORREGIDO)
       ════════════════════════════════════════════════════════════ */
    const GuestView = ({ roomName, pin }) => {
        const [joined,    setJoined]    = useState(false);
        const [quality,   setQuality]   = useState(Storage.load('pq','720'));
        const [tally,     setTally]     = useState('idle');
        const [micOff,    setMicOff]    = useState(false);
        const [camOff,    setCamOff]    = useState(false);
        const [hasReturn, setHasReturn] = useState(false);
        const [pinIn,     setPinIn]     = useState('');
        const [needsPin,  setNeedsPin]  = useState(!!pin);
        const [camera,    setCamera]    = useState(Storage.load('cm','user'));
        const [rec,       setRec]       = useState(false);
        const [err,       setErr]       = useState(null);
        const [connState, setConnState] = useState('connecting');

        const localVideoRef  = useRef(null);
        const returnVideoRef = useRef(null);
        const returnAudioRef = useRef(null);
        const peerRef        = useRef(null);
        const mqttRef        = useRef(null);
        const localStreamRef = useRef(null);
        const timerStats     = useRef(null);
        const recRef         = useRef(false);
        const abortRef       = useRef(false);
        const outCallRef     = useRef(null);

        useEffect(()=>{ recRef.current=rec; },[rec]);

        // CORREGIDO: Separar efectos para evitar recreación innecesaria
        useEffect(()=>{
            if(!joined) return;
            abortRef.current=false;
            init_guest();
            
            const handleBeforeUnload = () => {
                if(recRef.current) RecordingService.stop();
                localStreamRef.current?.getTracks().forEach(t=>t.stop());
                peerRef.current?.destroy();
                mqttRef.current?.end();
            };
            window.addEventListener('beforeunload', handleBeforeUnload);
            
            return ()=>{
                window.removeEventListener('beforeunload', handleBeforeUnload);
                abortRef.current=true;
                clearInterval(timerStats.current);
                try {
                    if(recRef.current) RecordingService.stop();
                    localStreamRef.current?.getTracks().forEach(t=>t.stop());
                    peerRef.current?.destroy();
                    mqttRef.current?.end();
                } catch(e){}
            };
        },[joined]);
        
        // CORREGIDO: Efecto separado para cambios de calidad/cámara
        useEffect(()=>{
            if(!joined || !localStreamRef.current) return;
            // Solo reiniciar el stream local, no todo el peer
            restartLocalStream();
        },[quality, camera]);

        const restartLocalStream = async () => {
            try {
                const oldStream = localStreamRef.current;
                const res={'360':[640,360],'720':[1280,720],'1080':[1920,1080]};
                const [w,h]=res[quality]||res['720'];
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video:{width:{ideal:w},height:{ideal:h},facingMode:camera},
                    audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
                });
                
                if(abortRef.current){ newStream.getTracks().forEach(t=>t.stop()); return; }
                
                // Reemplazar tracks en la conexión existente
                const conns = Object.values(peerRef.current?.connections||{}).flat();
                for (const conn of conns) {
                    const senders = conn.peerConnection?.getSenders() || [];
                    newStream.getTracks().forEach(track => {
                        const sender = senders.find(s => s.track?.kind === track.kind);
                        if (sender) {
                            sender.replaceTrack(track).catch(e => Logger.warn('replaceTrack', e.message));
                        }
                    });
                }
                
                // Actualizar video local
                if(localVideoRef.current) {
                    localVideoRef.current.srcObject = newStream;
                }
                
                // Detener tracks antiguos
                oldStream?.getTracks().forEach(t=>t.stop());
                localStreamRef.current = newStream;
                
            } catch(e) {
                Logger.error('restartLocalStream', e.message);
            }
        };

        const init_guest = async ()=>{
            try {
                mqttRef.current = window.mqtt.connect(CONFIG.MQTT_BROKER,{
                    clientId:`guest_${Date.now()}`,
                    username:CONFIG.MQTT_USER, password:CONFIG.MQTT_PASS
                });
                let subscribed=false;
                mqttRef.current.on('connect',()=>{
                    if(subscribed) return; subscribed=true;
                    mqttRef.current.subscribe(`sc_tally/${roomName}`);
                    mqttRef.current.on('message',(_,payload)=>{
                        try { const d=JSON.parse(payload.toString()); if(d.state) setTally(d.state); }catch(e){}
                    });
                });
                mqttRef.current.on('error',e=>Logger.warn('MQTT-guest',e.message));

                const res={'360':[640,360],'720':[1280,720],'1080':[1920,1080]};
                const [w,h]=res[quality]||res['720'];
                const stream = await navigator.mediaDevices.getUserMedia({
                    video:{width:{ideal:w},height:{ideal:h},facingMode:camera, frameRate:{max:30}},
                    audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
                }).catch(e=>{
                    if(e.name==='NotAllowedError') throw new Error('Permiso de cámara/micrófono denegado');
                    if(e.name==='NotFoundError')   throw new Error('Cámara o micrófono no encontrado');
                    throw e;
                });

                if(abortRef.current){ stream.getTracks().forEach(t=>t.stop()); return; }

                localStreamRef.current=stream;
                if(localVideoRef.current){
                    localVideoRef.current.srcObject=stream;
                    localVideoRef.current.play().catch(()=>{});
                }

                // CORREGIDO: Sanitizar roomName para el ID
                const safeRoom = roomName.replace(/[^a-zA-Z0-9]/g, '');
                peerRef.current=new Peer(`guest_${safeRoom}_${Date.now().toString(36)}`,CONFIG.PEER_CONFIG);

                peerRef.current.on('open',()=>{
                    if(abortRef.current) return;
                    Logger.info('Guest-peer',`Conectado como guest`);
                    setConnState('connected');

                    // Llamada al Director
                    const outCall = peerRef.current.call(
                        `dir_${safeRoom}`,
                        localStreamRef.current
                    );
                    outCallRef.current = outCall;

                    outCall.on('stream', returnStream => {
                        Logger.info('Guest-return','stream recibido, tracks:'+returnStream.getTracks().length);

                        if(returnVideoRef.current){
                            returnVideoRef.current.srcObject=returnStream;
                            returnVideoRef.current.play().catch(()=>{});
                        }
                        if(returnAudioRef.current){
                            returnAudioRef.current.srcObject=returnStream;
                            returnAudioRef.current.play().catch(()=>{});
                        }
                        setHasReturn(true);
                    });

                    outCall.on('error', e=>{
                        Logger.warn('OutCall-err', e.message);
                        setConnState('failed');
                    });
                    outCall.on('close',()=>{ 
                        setHasReturn(false); 
                        setConnState('disconnected');
                        Logger.warn('OutCall','closed'); 
                    });

                    // Llamada al OBS
                    const obsCall=peerRef.current.call(`obs_${safeRoom}`,localStreamRef.current);
                    obsCall?.on('error',()=>{});
                });

                peerRef.current.on('call', c=>{
                    c.answer(localStreamRef.current);
                    c.on('error',()=>{});
                });

                peerRef.current.on('error', e=>{
                    if(e.type!=='peer-unavailable') {
                        setErr(e.type);
                        setConnState('failed');
                    }
                });
                
                // NUEVO: Monitorear conexión
                peerRef.current.on('disconnected', () => setConnState('disconnected'));

                timerStats.current=setInterval(()=>{
                    const conns=Object.values(peerRef.current?.connections||{});
                    const pc=conns[0]?.[0]?.peerConnection;
                    if(pc) {
                        StatsCollector.collect(pc);
                        if (pc.iceConnectionState) {
                            setConnState(pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed' ? 'connected' : pc.iceConnectionState);
                        }
                    }
                },2000);

                setErr(null);
            } catch(e){
                Logger.error('Guest-init',e.message);
                setConnState('failed');
                setErr(e.message);
            }
        };

        if(!joined&&needsPin) return (
            <div className="lobby-container">
                <div className="glass-box">
                    <div style={{width:64,height:64,background:'rgba(139,92,246,0.2)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:28}}>🔒</div>
                    <h2 style={{fontSize:'1.5rem',fontWeight:800,marginBottom:24,textAlign:'center'}}>Sala protegida</h2>
                    <label style={{fontSize:'0.75rem',color:'#a1a1a1',display:'block',marginBottom:8,fontWeight:'bold'}}>PIN</label>
                    <input type="password" value={pinIn} placeholder="••••" autoFocus
                        onChange={e=>setPinIn(e.target.value)}
                        onKeyPress={e=>e.key==='Enter'&&(pinIn===pin?(setNeedsPin(false),setJoined(true)):setErr('PIN incorrecto'))}
                    />
                    <button className="btn btn-violet"
                        onClick={()=>pinIn===pin?(setNeedsPin(false),setJoined(true)):setErr('PIN incorrecto')}>
                        Verificar
                    </button>
                    {err&&<div className="error-toast">{err}</div>}
                </div>
            </div>
        );

        if(!joined) return (
            <div className="lobby-container">
                <div className="glass-box">
                    <div style={{width:64,height:64,background:'rgba(139,92,246,0.2)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:28}}>📹</div>
                    <h2 style={{fontSize:'1.5rem',fontWeight:800,marginBottom:8,textAlign:'center'}}>Sala: {roomName}</h2>
                    <p style={{color:'#71717a',textAlign:'center',marginBottom:24,fontSize:'0.9rem'}}>Configura tu calidad antes de entrar</p>
                    <label style={{fontSize:'0.75rem',color:'#a1a1a1',display:'block',marginBottom:8,fontWeight:'bold'}}>Calidad de video</label>
                    <select value={quality} onChange={e=>{setQuality(e.target.value);Storage.save('pq',e.target.value);}}>
                        <option value="360">360p — Baja</option>
                        <option value="720">720p — Media</option>
                        <option value="1080">1080p — Alta</option>
                    </select>
                    <button className="btn btn-violet" onClick={()=>setJoined(true)}>Entrar →</button>
                    {err&&<div className="error-toast">{err}</div>}
                </div>
            </div>
        );

        return (
            <div className={`guest-layout tally-${tally}`}>
                <ConnectionStatus state={connState} />
                <div className="guest-tally-border"/>
                <div className="big-tally-text">
                    {tally==='live'?<>🔴 AL AIRE</>:<>⚠️ PREVIO</>}
                </div>

                <div className={`return-pip ${hasReturn?'active':''}`}>
                    <video ref={returnVideoRef} autoPlay playsInline muted style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                    <audio ref={returnAudioRef} autoPlay playsInline style={{display:'none'}}/>
                    <div className="pip-icon">🎧</div>
                    <div className="pip-label">📺 Retorno</div>
                </div>

                <video ref={localVideoRef} className="guest-video" muted autoPlay playsInline/>

                <div className="guest-overlay">
                    <div style={{fontSize:'0.75rem',fontWeight:'bold',color:'#a1a1a1',background:'rgba(139,92,246,0.1)',padding:'6px 12px',borderRadius:20}}>
                        {roomName}
                    </div>
                    <div className={`mic-btn ${micOff?'off':''}`} title={micOff?'Activar mic':'Silenciar mic'}
                        onClick={()=>{
                            const at=localStreamRef.current?.getAudioTracks();
                            if(!at?.length) return;
                            at[0].enabled=!at[0].enabled; setMicOff(!at[0].enabled);
                        }}>
                        {micOff?'🔇':'🎤'}
                    </div>
                    <div className={`mic-btn ${camOff?'off':''}`} title={camOff?'Activar cámara':'Apagar cámara'}
                        onClick={()=>{
                            const vt=localStreamRef.current?.getVideoTracks();
                            if(!vt?.length) return;
                            vt[0].enabled=!vt[0].enabled; setCamOff(!vt[0].enabled);
                        }}>
                        {camOff?'📵':'📹'}
                    </div>
                    <div className="mic-btn" title="Cambiar cámara"
                        onClick={()=>{const nc=camera==='user'?'environment':'user';setCamera(nc);Storage.save('cm',nc);}}>
                        🔄
                    </div>
                    <div className={`mic-btn ${rec?'off':''}`} title={rec?'Parar grabación':'Grabar local'}
                        onClick={()=>{
                            if(rec){RecordingService.stop();recRef.current=false;setRec(false);}
                            else if(localStreamRef.current){RecordingService.start(localStreamRef.current);recRef.current=true;setRec(true);}
                        }}>
                        {rec?'⏹':'⏺'}
                    </div>
                </div>
                {err&&<div className="error-toast">{err}</div>}
            </div>
        );
    };

    /* APP ROOT */
    const App = () => {
        const [mode,  setMode]  = useState(null);
        const [room,  setRoom]  = useState('');
        const [pin,   setPin]   = useState('');
        const [theme, setTheme] = useState(Storage.load('th','dark'));

        useEffect(()=>{
            const p=new URLSearchParams(window.location.search);
            const m=p.get('mode'),r=p.get('room'),n=p.get('pin')||'';
            if(m&&r){ 
                // CORREGIDO: Sanitizar roomName
                const safeRoom = r.replace(/[^a-zA-Z0-9]/g, '');
                setRoom(safeRoom); 
                setPin(n); 
                setMode(m); 
                if(m==='obs') document.body.classList.add('obs-mode'); 
            }
            else    { setRoom(Math.random().toString(36).substring(2,6).toUpperCase()); }
            if(theme==='light') document.body.classList.add('light-theme');
        },[]);

        // CORREGIDO: Error de sintaxis en template literal
        const goTo=m=>{ 
            if(!room.trim()) return; 
            const safeRoom = room.replace(/[^a-zA-Z0-9]/g, '');
            window.location.href=`?mode=${m}&room=${safeRoom}${pin?`&pin=${pin}`:''}`; 
        };

        if(mode==='director') return <ReceiverView roomName={room} isObsMode={false} pin={pin}/>;
        if(mode==='obs')      return <ReceiverView roomName={room} isObsMode={true}  pin={pin}/>;
        if(mode==='guest')    return <GuestView    roomName={room} pin={pin}/>;

        return (
            <div className="lobby-container">
                <div className="glass-box">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                        <div style={{width:64,height:64,background:'rgba(139,92,246,0.2)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>📡</div>
                        <button onClick={()=>{const nt=theme==='dark'?'light':'dark';setTheme(nt);Storage.save('th',nt);document.body.classList.toggle('light-theme');}}
                            style={{background:'none',border:'none',color:'#8b5cf6',fontSize:'1.5rem',cursor:'pointer'}}>
                            {theme==='dark'?'🌙':'☀️'}
                        </button>
                    </div>
                    <h1 style={{fontSize:'2rem',fontWeight:800,marginBottom:4,textTransform:'uppercase',background:'linear-gradient(135deg,#a78bfa,#d8b4fe)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',textAlign:'center'}}>
                        StreamCall PRO
                    </h1>
                    <p style={{color:'#52525b',textAlign:'center',marginBottom:28,fontSize:'0.8rem'}}>v10.1 — WebRTC + MQTT Tally</p>
                    <label style={{fontSize:'0.75rem',color:'#a1a1a1',display:'block',marginBottom:8,fontWeight:'bold'}}>ID de Sala</label>
                    <input value={room} onChange={e=>setRoom(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''))} placeholder="SALA" maxLength="20"/>
                    <label style={{fontSize:'0.75rem',color:'#a1a1a1',display:'block',marginBottom:8,fontWeight:'bold'}}>PIN (opcional)</label>
                    <input value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g, ''))} type="password" placeholder="PIN" maxLength="6"/>
                    <button className="btn btn-violet"  onClick={()=>goTo('director')}>🎛 Entrar como Director</button>
                    <button className="btn btn-emerald" onClick={()=>goTo('guest')}>👤 Entrar como Guest</button>
                    <button className="btn btn-dark"    onClick={Logger.export}>📥 Exportar Logs</button>
                </div>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
