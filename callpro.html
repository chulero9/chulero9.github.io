<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall V10 PRO (Neon Edition)</title>
    
    <!-- Librerías Esenciales -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        * { box-sizing: border-box; }
        
        body { 
            background-color: #09090b;
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }
        body.obs-mode { background-color: transparent !important; }
        body.light-theme { 
            background-color: #f8f9fa;
            color: #1a1a1a;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #71717a; }

        .lobby-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            background: radial-gradient(circle at center, #18181b 0%, #09090b 100%); 
            padding: 20px; 
            text-align: center; 
        }
        body.light-theme .lobby-container {
            background: radial-gradient(circle at center, #e5e7eb 0%, #f3f4f6 100%);
        }

        .glass-box { 
            background: rgba(24, 24, 27, 0.6); 
            backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); 
            max-width: 400px; 
            width: 100%; 
        }
        body.light-theme .glass-box {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }

        input, select { 
            width: 100%; 
            background: #121214; 
            border: 1px solid #3f3f46; 
            color: white; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            text-align: center; 
            font-weight: bold; 
            margin-bottom: 20px; 
            outline: none; 
            text-transform: uppercase; 
            transition: all 0.3s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        body.light-theme input, 
        body.light-theme select {
            background: #f0f0f0;
            border: 1px solid #d1d5db;
            color: #1a1a1a;
        }

        input:focus, select:focus { 
            border-color: #8b5cf6; 
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); 
        }
        
        .quality-select { 
            font-size: 1rem; 
            text-align: center; 
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            font-weight: 800; 
            font-size: 0.95rem; 
            border-radius: 12px; 
            cursor: pointer; 
            border: none; 
            transition: all 0.2s ease; 
            text-transform: uppercase; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:active:not(:disabled) { transform: translateY(1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-violet { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .btn-emerald { background: linear-gradient(135deg, #10b981, #059669); color: white; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn-rose { background: linear-gradient(135deg, #f43f5e, #be123c); color: white; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3); }
        .btn-dark { background: #27272a; color: white; margin-bottom: 12px; border: 1px solid #3f3f46; }
        .btn-dark:hover:not(:disabled) { background: #3f3f46; }

        .obs-layout { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
        }
        .obs-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }
        .obs-status { 
            position: relative; 
            z-index: 9999; 
            background: rgba(0,0,0,0.85); 
            color: #a78bfa; 
            padding: 20px 30px; 
            border-radius: 12px; 
            font-family: 'Courier New', monospace; 
            font-size: 16px; 
            border: 2px solid #a78bfa; 
            text-align: center; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .director-layout { 
            display: flex; 
            height: 100vh; 
            position: relative; 
        }
        .video-stage { 
            flex: 1; 
            background: #000; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .remote-video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        .director-controls { 
            width: 380px; 
            background: #0f0f11; 
            border-left: 1px solid #27272a; 
            display: flex; 
            flex-direction: column; 
            z-index: 10; 
            flex-shrink: 0; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
            padding: 20px;
        }
        body.light-theme .director-controls {
            background: #f8f9fa;
            border-left-color: #e5e7eb;
        }

        .tally-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 25px; 
        }
        .t-btn { 
            padding: 16px 5px; 
            font-size: 0.8rem; 
            font-weight: 800; 
            border-radius: 10px; 
            cursor: pointer; 
            border: 2px solid transparent; 
            background: #18181b; 
            color: #71717a; 
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .t-btn.active-idle { 
            border-color: #52525b; 
            color: white; 
            background: #27272a; 
        }
        .t-btn.active-prev { 
            background: rgba(16, 185, 129, 0.15); 
            border-color: #10b981; 
            color: #34d399; 
        }
        .t-btn.active-live { 
            background: rgba(244, 63, 94, 0.15); 
            border-color: #f43f5e; 
            color: #fb7185; 
            animation: pulseRose 2s infinite; 
        }
        
        .clean-mode .director-controls { display: none !important; }
        .clean-mode .video-stage { width: 100vw; }

        .exit-btn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 100; 
            background: rgba(225, 29, 72, 0.9); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.2); 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s ease;
        }
        .exit-btn:hover { background: rgba(225, 29, 72, 1); }

        .guest-layout { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        .guest-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        
        .guest-tally-border { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 12px solid transparent; 
            pointer-events: none; 
            transition: all 0.3s ease; 
            z-index: 50; 
            box-sizing: border-box; 
        }
        .guest-layout.tally-live .guest-tally-border { 
            border-color: #f43f5e; 
            box-shadow: inset 0 0 60px rgba(244, 63, 94, 0.6); 
        }
        .guest-layout.tally-prev .guest-tally-border { 
            border-color: #10b981; 
            box-shadow: inset 0 0 60px rgba(16, 185, 129, 0.6); 
        }
        
        .return-pip { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            width: 280px; 
            aspect-ratio: 16/9; 
            background: #000; 
            border: 2px solid #52525b; 
            border-radius: 16px; 
            overflow: hidden; 
            z-index: 80; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s; 
            cursor: grab; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .return-pip.active { 
            opacity: 1; 
            pointer-events: auto; 
        }
        .return-pip video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .pip-label { 
            position: absolute; 
            bottom: 8px; 
            left: 8px; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(4px); 
            color: white; 
            font-size: 10px; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 4px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .guest-overlay { 
            position: absolute; 
            bottom: 60px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(24, 24, 27, 0.85); 
            backdrop-filter: blur(10px); 
            padding: 12px 25px; 
            border-radius: 50px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            z-index: 100; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }
        
        .mic-btn { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-size: 1.4rem; 
            transition: all 0.2s ease; 
            background: #27272a; 
            color: white; 
            border: 1px solid #3f3f46;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .mic-btn:hover:not(.off) { 
            background: #3f3f46; 
            transform: scale(1.05); 
        }
        .mic-btn.off { 
            background: #e11d48; 
            color: white; 
            border-color: #f43f5e; 
        }

        .big-tally-text { 
            position: absolute; 
            top: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 1.5rem; 
            font-weight: 800; 
            padding: 8px 24px; 
            border-radius: 12px; 
            z-index: 100; 
            text-transform: uppercase; 
            display: none; 
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .guest-layout.tally-live .big-tally-text { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: #e11d48; 
            color: white; 
        }
        .guest-layout.tally-prev .big-tally-text { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: #10b981; 
            color: white; 
        }

        .stats-panel {
            background: rgba(24, 24, 27, 0.7);
            border: 1px solid #3f3f46;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            font-size: 0.8rem;
            color: #a1a1a1;
            font-family: 'Courier New', monospace;
        }
        body.light-theme .stats-panel {
            background: rgba(243, 244, 246, 0.7);
            border-color: #d1d5db;
            color: #6b7280;
        }
        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }
        .stat-good { color: #10b981; }
        .stat-warn { color: #f59e0b; }
        .stat-bad { color: #ef4444; }

        .diagnostics-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(24, 24, 27, 0.95);
            border: 2px solid #8b5cf6;
            border-radius: 12px;
            padding: 15px;
            max-width: 300px;
            z-index: 999;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            max-height: 80vh;
            overflow-y: auto;
        }
        .diagnostics-overlay h3 {
            color: #8b5cf6;
            margin-top: 0;
            border-bottom: 1px solid #3f3f46;
            padding-bottom: 8px;
        }
        .diagnostics-item {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            color: #a1a1a1;
        }

        @keyframes pulseRose { 
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } 
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        .loader {
            border: 4px solid rgba(139, 92, 246, 0.2);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        .error-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #dc2626;
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .director-controls {
                width: 100% !important;
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                max-height: 50vh;
                border-left: none;
                border-top: 1px solid #27272a;
            }
            .video-stage {
                height: 50%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const CONFIG = {
            PEER_CONFIG: { 
                config: { 
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' },
                        { urls: 'stun:stun4.l.google.com:19302' },
                    ],
                    'iceTransportPolicy': 'all'
                } 
            },
            MQTT_BROKER: 'wss://broker.emqx.io:8084/mqtt',
            MQTT_USER: 'streamcall',
            MQTT_PASS: 'streamcall123',
            MAX_RECONNECT_ATTEMPTS: 3,
            RECONNECT_DELAY: 2000,
        };

        const Logger = {
            logs: [],
            
            log(level, event, data = {}) {
                try {
                    const entry = {
                        timestamp: new Date().toISOString(),
                        level,
                        event,
                        data,
                    };
                    this.logs.push(entry);
                    console.log(`[${level}] ${event}:`, data);
                    
                    if (this.logs.length > 1000) {
                        this.logs = this.logs.slice(-1000);
                    }
                } catch (e) {
                    console.error('Logger error:', e);
                }
            },
            
            info(event, data) { this.log('INFO', event, data); },
            warn(event, data) { this.log('WARN', event, data); },
            error(event, data) { this.log('ERROR', event, data); },
            
            export() {
                try {
                    const data = JSON.stringify(this.logs, null, 2);
                    const blob = new Blob([data], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `streamcall-logs-${Date.now()}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    Logger.info('Export', 'Logs exportados');
                } catch (e) {
                    Logger.error('Export', e);
                }
            }
        };

        const StatsCollector = {
            stats: {
                latency: 0,
                packetLoss: 0,
                jitter: 0,
                videoResolution: '0x0',
            },
            
            updateStats(newStats) {
                this.stats = { ...this.stats, ...newStats };
            },
            
            getConnectionQuality() {
                const { latency, packetLoss } = this.stats;
                if (latency < 50 && packetLoss < 1) return 'excellent';
                if (latency < 100 && packetLoss < 2) return 'good';
                if (latency < 200 && packetLoss < 5) return 'fair';
                return 'poor';
            },
            
            async collectFromPeerConnection(peerConnection) {
                try {
                    if (!peerConnection) return;
                    
                    const stats = await peerConnection.getStats();
                    
                    stats.forEach(report => {
                        try {
                            if (report.type === 'inbound-rtp' && report.kind === 'video') {
                                const latency = (report.currentRoundTripTime || 0) * 1000;
                                const packetLoss = report.packetsLost && report.packetsReceived 
                                    ? (report.packetsLost / (report.packetsReceived + report.packetsLost)) * 100 
                                    : 0;
                                
                                this.updateStats({
                                    latency: latency.toFixed(2),
                                    packetLoss: Math.max(0, packetLoss.toFixed(2)),
                                    jitter: ((report.jitter || 0) * 1000).toFixed(2),
                                    videoResolution: `${report.frameWidth || 0}x${report.frameHeight || 0}`,
                                });
                            }
                        } catch (e) {
                            Logger.warn('StatsItem', e);
                        }
                    });
                } catch (e) {
                    Logger.warn('StatsCollection', e);
                }
            }
        };

        const Storage = {
            save(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    Logger.warn('StorageSave', e);
                }
            },
            
            load(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    Logger.warn('StorageLoad', e);
                    return defaultValue;
                }
            },
        };

        const RecordingService = {
            recorder: null,
            chunks: [],
            isRecording: false,
            
            start(stream) {
                try {
                    if (!stream || stream.getTracks().length === 0) {
                        Logger.warn('Recording', 'Stream inválido');
                        return;
                    }
                    
                    this.chunks = [];
                    
                    const mimeTypes = [
                        'video/webm;codecs=vp9,opus',
                        'video/webm;codecs=vp8,opus',
                        'video/webm',
                    ];
                    
                    let selectedMime = 'video/webm';
                    for (let mime of mimeTypes) {
                        if (MediaRecorder.isTypeSupported(mime)) {
                            selectedMime = mime;
                            break;
                        }
                    }
                    
                    this.recorder = new MediaRecorder(stream, {
                        mimeType: selectedMime,
                        audioBitsPerSecond: 128000,
                        videoBitsPerSecond: 2500000,
                    });
                    
                    this.recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) this.chunks.push(e.data);
                    };
                    
                    this.recorder.onstop = () => this.download();
                    this.recorder.onerror = (e) => Logger.error('RecorderError', e.error);
                    
                    this.recorder.start();
                    this.isRecording = true;
                    Logger.info('Recording', 'iniciado');
                } catch (e) {
                    Logger.error('RecordingStart', e);
                }
            },
            
            stop() {
                try {
                    if (this.recorder && this.isRecording) {
                        this.recorder.stop();
                        this.isRecording = false;
                        Logger.info('Recording', 'detenido');
                    }
                } catch (e) {
                    Logger.error('RecordingStop', e);
                }
            },
            
            download() {
                try {
                    if (this.chunks.length === 0) return;
                    
                    const blob = new Blob(this.chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `streamcall-${Date.now()}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    Logger.info('Recording', 'descargado');
                } catch (e) {
                    Logger.error('RecordingDownload', e);
                }
            }
        };

        const StatsPanel = ({ stats }) => (
            <div className="stats-panel">
                <div className="stat-line">
                    <span>Latencia:</span>
                    <span className={stats.latency < 100 ? 'stat-good' : stats.latency < 200 ? 'stat-warn' : 'stat-bad'}>
                        {stats.latency}ms
                    </span>
                </div>
                <div className="stat-line">
                    <span>Pérdida:</span>
                    <span className={stats.packetLoss < 1 ? 'stat-good' : stats.packetLoss < 5 ? 'stat-warn' : 'stat-bad'}>
                        {stats.packetLoss}%
                    </span>
                </div>
                <div className="stat-line">
                    <span>Res:</span>
                    <span>{stats.videoResolution}</span>
                </div>
            </div>
        );

        const DiagnosticsOverlay = ({ stats, logs, onExport }) => (
            <div className="diagnostics-overlay">
                <h3>🔧 DIAGNÓSTICOS</h3>
                <div className="diagnostics-item">
                    <span>Latencia:</span>
                    <span>{stats.latency}ms</span>
                </div>
                <div className="diagnostics-item">
                    <span>Pérdida:</span>
                    <span>{stats.packetLoss}%</span>
                </div>
                <div className="diagnostics-item">
                    <span>Logs:</span>
                    <span>{logs.length}</span>
                </div>
                <button 
                    onClick={onExport}
                    style={{
                        width: '100%',
                        padding: '8px',
                        marginTop: '10px',
                        background: '#8b5cf6',
                        border: 'none',
                        borderRadius: '6px',
                        color: 'white',
                        cursor: 'pointer',
                        fontSize: '0.8rem',
                        fontWeight: 'bold',
                    }}
                >
                    📥 Exportar Logs
                </button>
            </div>
        );

        // COMPONENTE DIRECTOR
        const ReceiverView = ({ roomName, isObsMode, pin = '' }) => {
            const [status, setStatus] = useState('BUSCANDO SEÑAL...');
            const [guestConnected, setGuestConnected] = useState(false);
            const [tally, setTally] = useState('idle');
            const [cleanMode, setCleanMode] = useState(false);
            const [audioDevices, setAudioDevices] = useState([]);
            const [selectedAudio, setSelectedAudio] = useState('');
            const [talkbackActive, setTalkbackActive] = useState(false);
            const [showDiagnostics, setShowDiagnostics] = useState(false);
            const [stats, setStats] = useState({ ...StatsCollector.stats });
            const [recordingActive, setRecordingActive] = useState(false);
            const [error, setError] = useState(null);

            const peer = useRef(null);
            const remoteVideoRef = useRef(null);
            const mqttClient = useRef(null);
            const returnStreamRef = useRef(null);
            const returnCallRef = useRef(null);
            const statsIntervalRef = useRef(null);

            useEffect(() => {
                initializeReceiver();
                return cleanup;
            }, [roomName, isObsMode]);

            const initializeReceiver = async () => {
                try {
                    Logger.info('ReceiverInit', `Modo: ${isObsMode ? 'OBS' : 'Director'}`);

                    if (!isObsMode) {
                        try {
                            const devs = await navigator.mediaDevices.enumerateDevices();
                            const audios = devs.filter(d => d.kind === 'audioinput');
                            setAudioDevices(audios);
                            if (audios.length > 0) {
                                setSelectedAudio(Storage.load('selectedAudio') || audios[0].deviceId);
                            }
                        } catch (e) {
                            Logger.warn('EnumerateDevices', e.message);
                        }
                        connectMQTT();
                    }

                    initializePeer();
                    
                    statsIntervalRef.current = setInterval(() => {
                        if (peer.current?._pc) {
                            StatsCollector.collectFromPeerConnection(peer.current._pc);
                            setStats({ ...StatsCollector.stats });
                        }
                    }, 2000);
                } catch (e) {
                    Logger.error('ReceiverInit', e.message);
                    setError(e.message);
                }
            };

            const connectMQTT = () => {
                try {
                    const options = {
                        clientId: `dir_${Date.now()}`,
                        username: CONFIG.MQTT_USER,
                        password: CONFIG.MQTT_PASS,
                        reconnectPeriod: CONFIG.RECONNECT_DELAY,
                        clean: true,
                    };
                    
                    mqttClient.current = mqtt.connect(CONFIG.MQTT_BROKER, options);
                    mqttClient.current.on('connect', () => Logger.info('MQTT', 'Conectado'));
                    mqttClient.current.on('error', (err) => Logger.error('MQTT', err.message));
                } catch (e) {
                    Logger.error('MQTTConnect', e.message);
                }
            };

            const initializePeer = () => {
                try {
                    const baseId = roomName.toUpperCase();
                    const myId = isObsMode ? `obs_${baseId}` : `dir_${baseId}`;
                    
                    Logger.info('Peer', `Inicializando: ${myId}`);
                    peer.current = new Peer(myId, CONFIG.PEER_CONFIG);

                    peer.current.on('open', (id) => {
                        setStatus('SALA LISTA');
                        Logger.info('Peer', `Abierto: ${id}`);
                    });

                    peer.current.on('call', handleIncomingCall);
                    peer.current.on('error', (err) => {
                        Logger.error('PeerError', err.type);
                        if (err.type !== 'peer-unavailable') {
                            setError('Error: ' + err.type);
                        }
                    });
                } catch (e) {
                    Logger.error('PeerInit', e.message);
                    setError(e.message);
                }
            };

            const handleIncomingCall = (call) => {
                try {
                    Logger.info('Call', `Entrante de: ${call.peer}`);
                    call.answer();

                    call.on('stream', (stream) => {
                        Logger.info('Stream', 'Recibido');
                        if (remoteVideoRef.current) {
                            remoteVideoRef.current.srcObject = stream;
                            remoteVideoRef.current.play()
                                .then(() => {
                                    setGuestConnected(true);
                                    setStatus('ONLINE');
                                    setError(null);
                                    Logger.info('Video', 'Reproduciendo');
                                    
                                    if (recordingActive && !RecordingService.isRecording) {
                                        RecordingService.start(stream);
                                    }
                                })
                                .catch(e => {
                                    setStatus('ERROR DE REPRODUCCIÓN');
                                    Logger.error('PlayError', e.message);
                                });
                        }
                    });

                    call.on('error', (err) => Logger.error('CallError', err.message));
                    call.on('close', () => {
                        setGuestConnected(false);
                        setStatus('DESCONECTADO');
                    });
                } catch (e) {
                    Logger.error('IncomingCall', e.message);
                }
            };

            const cleanup = () => {
                clearInterval(statsIntervalRef.current);
                try {
                    if (recordingActive) RecordingService.stop();
                    returnStreamRef.current?.getTracks().forEach(t => t.stop());
                    returnCallRef.current?.close();
                    if (peer.current) peer.current.destroy();
                    mqttClient.current?.end();
                } catch (e) {
                    Logger.warn('Cleanup', e.message);
                }
            };

            const handleTally = (s) => {
                try {
                    setTally(s);
                    if (mqttClient.current?.connected) {
                        mqttClient.current.publish(`sc_tally/${roomName}`, JSON.stringify({ state: s }), { retain: true });
                    }
                } catch (e) {
                    Logger.error('Tally', e.message);
                }
            };

            const toggleReturn = async () => {
                try {
                    if (talkbackActive) {
                        returnStreamRef.current?.getTracks().forEach(t => t.stop());
                        returnCallRef.current?.close();
                        setTalkbackActive(false);
                    } else {
                        const s = await navigator.mediaDevices.getUserMedia({
                            audio: { deviceId: selectedAudio },
                            video: false
                        });
                        returnStreamRef.current = s;
                        const guestId = `guest_${roomName.toUpperCase()}`;
                        returnCallRef.current = peer.current.call(guestId, s);
                        setTalkbackActive(true);
                        Logger.info('Talkback', 'Iniciado');
                    }
                } catch (e) {
                    Logger.error('Talkback', e.message);
                    setError('Error: ' + e.message);
                }
            };

            const copyLink = (m) => {
                try {
                    const url = `${window.location.href.split('?')[0]}?mode=${m}&room=${roomName}${pin ? `&pin=${pin}` : ''}`;
                    navigator.clipboard.writeText(url);
                    alert(`Link copiado`);
                } catch (e) {
                    Logger.error('Copy', e.message);
                }
            };

            if (isObsMode) {
                return (
                    <div className="obs-layout">
                        <video ref={remoteVideoRef} className="obs-video" autoPlay playsInline muted />
                        {!guestConnected && <div className="obs-status"><div className="loader" />{status}</div>}
                        {showDiagnostics && <DiagnosticsOverlay stats={stats} logs={Logger.logs} onExport={() => Logger.export()} />}
                        {error && <div className="error-toast">{error}</div>}
                    </div>
                );
            }

            return (
                <div className={`director-layout ${cleanMode ? 'clean-mode' : ''}`}>
                    {cleanMode && <div className="exit-btn" onClick={() => setCleanMode(false)}>✕ SALIR</div>}
                    
                    <div className="video-stage">
                        <video ref={remoteVideoRef} className="remote-video" autoPlay playsInline muted />
                        {!guestConnected && <div style={{ position: 'absolute', color: '#71717a', fontWeight: 'bold' }}>📡 {status}</div>}
                    </div>

                    <div className="director-controls">
                        <h2 style={{ fontSize: '1.25rem', fontWeight: 800, background: 'linear-gradient(135deg, #a78bfa, #d8b4fe)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '20px', marginTop: 0, textAlign: 'center' }}>
                            📡 StreamCall PRO
                        </h2>

                        <label style={{ color: '#a78bfa', fontWeight: 'bold', fontSize: '0.75rem', marginBottom: '8px', display: 'block' }}>🎧 RETORNO</label>
                        <select value={selectedAudio} onChange={e => { setSelectedAudio(e.target.value); Storage.save('selectedAudio', e.target.value); }}>
                            {audioDevices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || 'Audio'}</option>)}
                        </select>
                        
                        <button className={`btn ${talkbackActive ? 'btn-rose' : 'btn-violet'}`} onClick={toggleReturn} disabled={!guestConnected}>
                            {talkbackActive ? '⏹ Detener' : '▶ Activar'}
                        </button>

                        <div style={{ height: '1px', background: '#3f3f46', margin: '15px 0' }} />

                        <button className={`btn ${recordingActive ? 'btn-rose' : 'btn-emerald'}`} onClick={() => {
                            if (recordingActive) {
                                RecordingService.stop();
                                setRecordingActive(false);
                            } else if (remoteVideoRef.current?.srcObject) {
                                RecordingService.start(remoteVideoRef.current.srcObject);
                                setRecordingActive(true);
                            } else {
                                setError('Sin stream');
                            }
                        }} disabled={!guestConnected}>
                            {recordingActive ? '⏹ Grabar' : '⏺ Grabar'}
                        </button>

                        <div style={{ height: '1px', background: '#3f3f46', margin: '15px 0' }} />

                        <label style={{ color: '#a1a1a1', fontWeight: 'bold', fontSize: '0.75rem', marginBottom: '8px', display: 'block' }}>🔗 ENLACES</label>
                        <button className="btn btn-emerald" onClick={() => copyLink('obs')}>Link OBS</button>
                        <button className="btn btn-dark" onClick={() => copyLink('guest')}>Link Guest</button>

                        <div style={{ height: '1px', background: '#3f3f46', margin: '15px 0' }} />

                        <label style={{ color: '#a1a1a1', fontWeight: 'bold', fontSize: '0.75rem', marginBottom: '8px', display: 'block' }}>🚦 TALLY</label>
                        <div className="tally-grid">
                            <button className={`t-btn ${tally === 'idle' ? 'active-idle' : ''}`} onClick={() => handleTally('idle')}>OFF</button>
                            <button className={`t-btn ${tally === 'prev' ? 'active-prev' : ''}`} onClick={() => handleTally('prev')}>PREV</button>
                            <button className={`t-btn ${tally === 'live' ? 'active-live' : ''}`} onClick={() => handleTally('live')}>AIRE</button>
                        </div>

                        {guestConnected && <StatsPanel stats={stats} />}

                        <button className="btn btn-dark" onClick={() => setShowDiagnostics(!showDiagnostics)}>🐛 Diag</button>
                        <button className="btn btn-dark" onClick={() => setCleanMode(true)}>⛶ Limpia</button>
                    </div>

                    {showDiagnostics && <DiagnosticsOverlay stats={stats} logs={Logger.logs} onExport={() => Logger.export()} />}
                    {error && <div className="error-toast">{error}</div>}
                </div>
            );
        };

        // COMPONENTE GUEST
        const GuestView = ({ roomName, pin = '' }) => {
            const [joined, setJoined] = useState(false);
            const [quality, setQuality] = useState(Storage.load('preferredQuality', '720'));
            const [tally, setTally] = useState('idle');
            const [micMuted, setMicMuted] = useState(false);
            const [camOff, setCamOff] = useState(false);
            const [receivingVideo, setReceivingVideo] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinRequired, setPinRequired] = useState(!!pin);
            const [stats, setStats] = useState({ ...StatsCollector.stats });
            const [cameraMode, setCameraMode] = useState(Storage.load('cameraMode', 'user'));
            const [recordingActive, setRecordingActive] = useState(false);
            const [error, setError] = useState(null);
            const [guestStatus, setGuestStatus] = useState('Iniciando...');

            const localVideoRef = useRef(null);
            const returnMediaRef = useRef(null);
            const peer = useRef(null);
            const mqttClient = useRef(null);
            const localStream = useRef(null);
            const statsIntervalRef = useRef(null);

            useEffect(() => {
                if (!joined) return;
                initializeGuest();
                return cleanup;
            }, [joined, quality, cameraMode]);

            const initializeGuest = async () => {
                try {
                    Logger.info('GuestInit', `Calidad: ${quality}, Cámara: ${cameraMode}`);
                    setGuestStatus('Obteniendo media...');

                    // MQTT
                    const options = {
                        clientId: `guest_${Date.now()}`,
                        username: CONFIG.MQTT_USER,
                        password: CONFIG.MQTT_PASS,
                        reconnectPeriod: CONFIG.RECONNECT_DELAY,
                    };
                    
                    mqttClient.current = mqtt.connect(CONFIG.MQTT_BROKER, options);
                    mqttClient.current.on('connect', () => Logger.info('MQTT', 'Conectado'));
                    mqttClient.current.on('message', (topic, payload) => {
                        try {
                            const data = JSON.parse(payload.toString());
                            if (data.state) setTally(data.state);
                        } catch (e) {
                            // Ignorar errores de parse
                        }
                    });
                    mqttClient.current.on('error', () => {});

                    // getUserMedia
                    const res = { '360': [640, 360], '720': [1280, 720], '1080': [1920, 1080] };
                    const [w, h] = res[quality] || res['720'];
                    
                    const s = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: w }, height: { ideal: h }, facingMode: cameraMode },
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });
                    
                    localStream.current = s;
                    setGuestStatus('Stream obtenido');
                    
                    if (localVideoRef.current) {
                        localVideoRef.current.srcObject = s;
                        await localVideoRef.current.play();
                    }

                    // Peer
                    const guestId = `guest_${roomName.toUpperCase()}`;
                    Logger.info('Peer', `ID: ${guestId}`);
                    setGuestStatus('Conectando a Peer...');
                    
                    peer.current = new Peer(guestId, CONFIG.PEER_CONFIG);

                    peer.current.on('open', (id) => {
                        Logger.info('Peer', `Abierto: ${id}`);
                        setGuestStatus('Esperando director...');
                    });

                    peer.current.on('call', (c) => {
                        try {
                            Logger.info('Call', `De: ${c.peer}`);
                            c.answer(localStream.current);
                            c.on('stream', (rem) => {
                                if (returnMediaRef.current) {
                                    returnMediaRef.current.srcObject = rem;
                                    returnMediaRef.current.play().catch(() => {});
                                }
                                setReceivingVideo(true);
                            });
                        } catch (e) {
                            Logger.error('CallAnswer', e.message);
                        }
                    });

                    peer.current.on('error', (err) => {
                        Logger.error('PeerError', err.type);
                        if (err.type !== 'peer-unavailable') {
                            setError('Error: ' + err.type);
                        }
                    });

                    // Stats
                    statsIntervalRef.current = setInterval(() => {
                        if (peer.current?._pc) {
                            StatsCollector.collectFromPeerConnection(peer.current._pc);
                            setStats({ ...StatsCollector.stats });
                        }
                    }, 2000);

                    // Subscribe MQTT
                    if (mqttClient.current?.connected) {
                        mqttClient.current.subscribe(`sc_tally/${roomName}`);
                    }

                    setError(null);
                    setGuestStatus('Conectado';
                } catch (e) {
                    Logger.error('GuestInit', e.message);
                    setError('Error: ' + e.message);
                    setGuestStatus('Error: ' + e.message);
                }
            };

            const cleanup = () => {
                clearInterval(statsIntervalRef.current);
                try {
                    if (recordingActive) RecordingService.stop();
                    localStream.current?.getTracks().forEach(t => t.stop());
                    if (peer.current) peer.current.destroy();
                    mqttClient.current?.end();
                } catch (e) {
                    Logger.warn('Cleanup', e.message);
                }
            };

            const toggleMic = () => {
                if (localStream.current?.getAudioTracks()[0]) {
                    const t = localStream.current.getAudioTracks()[0];
                    t.enabled = !t.enabled;
                    setMicMuted(!t.enabled);
                }
            };

            const toggleCam = () => {
                if (localStream.current?.getVideoTracks()[0]) {
                    const t = localStream.current.getVideoTracks()[0];
                    t.enabled = !t.enabled;
                    setCamOff(!t.enabled);
                }
            };

            const switchCamera = () => {
                const newMode = cameraMode === 'user' ? 'environment' : 'user';
                setCameraMode(newMode);
                Storage.save('cameraMode', newMode);
            };

            if (!joined) {
                if (pinRequired) {
                    return (
                        <div className="lobby-container">
                            <div className="glass-box">
                                <div style={{ width: '64px', height: '64px', background: 'rgba(139, 92, 246, 0.2)', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', border: '1px solid rgba(139, 92, 246, 0.3)' }}>🔒</div>
                                <h2 style={{ fontSize: '1.5rem', fontWeight: 800, marginBottom: '24px' }}>Sala Protegida</h2>
                                <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>PIN</label>
                                <input 
                                    type="password"
                                    value={pinInput}
                                    onChange={e => setPinInput(e.target.value)}
                                    onKeyPress={e => e.key === 'Enter' && (pinInput === pin ? (setPinRequired(false), setJoined(true)) : setError('PIN incorrecto'))}
                                    placeholder="PIN"
                                    autoFocus
                                />
                                <button className="btn btn-violet" onClick={() => pinInput === pin ? (setPinRequired(false), setJoined(true)) : setError('PIN incorrecto')}>Verificar</button>
                                {error && <div className="error-toast">{error}</div>}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="lobby-container">
                        <div className="glass-box">
                            <div style={{ width: '64px', height: '64px', background: 'rgba(139, 92, 246, 0.2)', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', border: '1px solid rgba(139, 92, 246, 0.3)' }}>📹</div>
                            <h2 style={{ fontSize: '1.5rem', fontWeight: 800, marginBottom: '24px' }}>Sala: {roomName}</h2>
                            <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>Calidad</label>
                            <select className="quality-select" value={quality} onChange={e => { setQuality(e.target.value); Storage.save('preferredQuality', e.target.value); }}>
                                <option value="360">BAJA (360p)</option>
                                <option value="720">MEDIA (720p)</option>
                                <option value="1080">ALTA (1080p)</option>
                            </select>
                            <button className="btn btn-violet" onClick={() => setJoined(true)}>Entrar →</button>
                            {error && <div className="error-toast">{error}</div>}
                        </div>
                    </div>
                );
            }

            return (
                <div className={`guest-layout tally-${tally}`}>
                    <div className="guest-tally-border" />
                    <div className="big-tally-text">
                        {tally === 'live' ? <>🔴 AL AIRE</> : <>⚠️ PREVENIDO</>}
                    </div>

                    <div className={`return-pip ${receivingVideo ? 'active' : ''}`}>
                        <video ref={returnMediaRef} autoPlay playsInline muted />
                        <div className="pip-label">📺 Programa</div>
                    </div>

                    <video ref={localVideoRef} className="guest-video" muted autoPlay playsInline />

                    <div className="guest-overlay">
                        <div style={{ fontSize: '0.75rem', fontWeight: 'bold', color: '#a1a1a1', background: 'rgba(139, 92, 246, 0.1)', padding: '6px 12px', borderRadius: '20px' }}>
                            {roomName}
                        </div>
                        <div className={`mic-btn ${micMuted ? 'off' : ''}`} onClick={toggleMic}>{micMuted ? '🔇' : '🎤'}</div>
                        <div className={`mic-btn ${camOff ? 'off' : ''}`} onClick={toggleCam}>{camOff ? '📵' : '📹'}</div>
                        <div className="mic-btn" onClick={switchCamera}>🔄</div>
                        <div className={`mic-btn ${recordingActive ? 'off' : ''}`} onClick={() => {
                            if (recordingActive) {
                                RecordingService.stop();
                                setRecordingActive(false);
                            } else if (localStream.current) {
                                RecordingService.start(localStream.current);
                                setRecordingActive(true);
                            }
                        }}>{recordingActive ? '⏹' : '⏺'}</div>
                    </div>

                    {error && <div className="error-toast">{error}</div>}
                </div>
            );
        };

        // APP PRINCIPAL
        const App = () => {
            const [mode, setMode] = useState(null);
            const [roomName, setRoomName] = useState('');
            const [pin, setPin] = useState('');
            const [theme, setTheme] = useState(Storage.load('theme', 'dark'));

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                let m = params.get('mode');
                let r = params.get('room');
                let p = params.get('pin') || '';

                if (m && r) {
                    setRoomName(r);
                    setPin(p);
                    setMode(m);
                    if (m === 'obs') document.body.classList.add('obs-mode');
                } else {
                    setRoomName(Math.random().toString(36).substring(2, 6).toUpperCase());
                }

                if (theme === 'light') document.body.classList.add('light-theme');
            }, []);

            if (mode === 'director') return <ReceiverView roomName={roomName} isObsMode={false} pin={pin} />;
            if (mode === 'obs') return <ReceiverView roomName={roomName} isObsMode={true} pin={pin} />;
            if (mode === 'guest') return <GuestView roomName={roomName} pin={pin} />;

            return (
                <div className="lobby-container">
                    <div className="glass-box">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                            <div style={{ width: '64px', height: '64px', background: 'rgba(139, 92, 246, 0.2)', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(139, 92, 246, 0.3)' }}>📡</div>
                            <button onClick={() => { const t = theme === 'dark' ? 'light' : 'dark'; setTheme(t); Storage.save('theme', t); document.body.classList.toggle('light-theme'); }} style={{ background: 'none', border: 'none', color: '#8b5cf6', fontSize: '1.5rem', cursor: 'pointer' }}>
                                {theme === 'dark' ? '🌙' : '☀️'}
                            </button>
                        </div>

                        <h1 style={{ fontSize: '2rem', fontWeight: 800, marginBottom: '32px', textTransform: 'uppercase', background: 'linear-gradient(135deg, #a78bfa, #d8b4fe)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', textAlign: 'center' }}>StreamCall PRO</h1>

                        <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>ID de Sala</label>
                        <input value={roomName} onChange={e => setRoomName(e.target.value.toUpperCase())} placeholder="SALA" maxLength="20" />

                        <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>PIN (Opcional)</label>
                        <input value={pin} onChange={e => setPin(e.target.value)} type="password" placeholder="PIN" maxLength="6" />

                        <button className="btn btn-violet" onClick={() => window.location.href = `?mode=director&room=${roomName}${pin ? `&pin=${pin}` : ''}`}>🎛 Panel Director</button>
                        <button className="btn btn-dark" onClick={() => Logger.export()}>📥 Exportar Logs</button>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
