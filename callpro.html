<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall V10 PRO - WORKING</title>
   
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
       
        * { box-sizing: border-box; }
       
        body {
            background-color: #09090b;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        body.obs-mode { background-color: transparent !important; }
        body.light-theme { background-color: #f8f9fa; color: #1a1a1a; }
        .lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: radial-gradient(circle at center, #18181b 0%, #09090b 100%);
            padding: 20px;
        }
        body.light-theme .lobby-container { background: radial-gradient(circle at center, #e5e7eb 0%, #f3f4f6 100%); }
        .glass-box {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            max-width: 400px;
            width: 100%;
        }
        body.light-theme .glass-box { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0, 0, 0, 0.1); }
        input, select {
            width: 100%;
            background: #121214;
            border: 1px solid #3f3f46;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.2rem;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        body.light-theme input, body.light-theme select { background: #f0f0f0; border: 1px solid #d1d5db; color: #1a1a1a; }
        input:focus, select:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
        .btn {
            width: 100%;
            padding: 14px;
            font-weight: 800;
            font-size: 0.95rem;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
       
        .btn-violet { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; margin-bottom: 12px; }
        .btn-emerald { background: linear-gradient(135deg, #10b981, #059669); color: white; margin-bottom: 12px; }
        .btn-rose { background: linear-gradient(135deg, #f43f5e, #be123c); color: white; margin-bottom: 12px; }
        .btn-dark { background: #27272a; color: white; margin-bottom: 12px; border: 1px solid #3f3f46; }
        .btn-dark:hover:not(:disabled) { background: #3f3f46; }
        .obs-layout { width: 100vw; height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        .obs-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .obs-status { position: relative; z-index: 9999; background: rgba(0,0,0,0.85); color: #a78bfa; padding: 20px 30px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 16px; border: 2px solid #a78bfa; display: flex; align-items: center; gap: 10px; }
        .director-layout { display: flex; height: 100vh; position: relative; }
        .video-stage { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .remote-video { width: 100%; height: 100%; object-fit: contain; }
       
        .director-controls {
            width: 380px;
            background: #0f0f11;
            border-left: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
            padding: 20px;
        }
        body.light-theme .director-controls { background: #f8f9fa; border-left-color: #e5e7eb; }
        .tally-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .t-btn {
            padding: 16px 5px;
            font-size: 0.8rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            background: #18181b;
            color: #71717a;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .t-btn.active-idle { border-color: #52525b; color: white; background: #27272a; }
        .t-btn.active-prev { background: rgba(16, 185, 129, 0.15); border-color: #10b981; color: #34d399; }
        .t-btn.active-live { background: rgba(244, 63, 94, 0.15); border-color: #f43f5e; color: #fb7185; animation: pulseRose 2s infinite; }
       
        .clean-mode .director-controls { display: none !important; }
        .clean-mode .video-stage { width: 100vw; }
        .exit-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
            background: rgba(225, 29, 72, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s ease;
        }
        .exit-btn:hover { background: rgba(225, 29, 72, 1); }
        .guest-layout {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .guest-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
       
        .guest-tally-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 12px solid transparent;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 50;
            box-sizing: border-box;
        }
        .guest-layout.tally-live .guest-tally-border { border-color: #f43f5e; box-shadow: inset 0 0 60px rgba(244, 63, 94, 0.6); }
        .guest-layout.tally-prev .guest-tally-border { border-color: #10b981; box-shadow: inset 0 0 60px rgba(16, 185, 129, 0.6); }
       
        .return-pip {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            aspect-ratio: 16/9;
            background: #000;
            border: 2px solid #52525b;
            border-radius: 16px;
            overflow: hidden;
            z-index: 80;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .return-pip.active { opacity: 1; pointer-events: auto; }
        .return-pip video { width: 100%; height: 100%; object-fit: cover; }
        .pip-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            color: white;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .guest-overlay {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
       
        .mic-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.2s ease;
            background: #27272a;
            color: white;
            border: 1px solid #3f3f46;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .mic-btn:hover:not(.off) { background: #3f3f46; transform: scale(1.05); }
        .mic-btn.off { background: #e11d48; color: white; border-color: #f43f5e; }
        .big-tally-text {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: 800;
            padding: 8px 24px;
            border-radius: 12px;
            z-index: 100;
            text-transform: uppercase;
            display: none;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .guest-layout.tally-live .big-tally-text { display: flex; align-items: center; gap: 8px; background: #e11d48; color: white; }
        .guest-layout.tally-prev .big-tally-text { display: flex; align-items: center; gap: 8px; background: #10b981; color: white; }
        .stats-panel { background: rgba(24, 24, 27, 0.7); border: 1px solid #3f3f46; border-radius: 12px; padding: 12px; margin: 10px 0; font-size: 0.8rem; color: #a1a1a1; font-family: 'Courier New', monospace; }
        .stat-line { display: flex; justify-content: space-between; margin: 4px 0; }
        .stat-good { color: #10b981; }
        .stat-warn { color: #f59e0b; }
        .stat-bad { color: #ef4444; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; }
        .status-connecting { background: #f59e0b; color: white; }
        .status-connected { background: #10b981; color: white; }
        .status-error { background: #ef4444; color: white; }
        @keyframes pulseRose {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border: 4px solid rgba(139, 92, 246, 0.2); border-top-color: #8b5cf6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        .error-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.9); color: white; padding: 15px 25px; border-radius: 8px; border: 1px solid #dc2626; z-index: 10000; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @media (max-width: 768px) {
            .director-controls { width: 100% !important; position: absolute; bottom: 0; left: 0; right: 0; max-height: 50vh; border-left: none; border-top: 1px solid #27272a; }
            .video-stage { height: 50%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CONFIG = {
            PEER_CONFIG: {
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                    ],
                    'iceTransportPolicy': 'all'
                }
            },
        };

        const Storage = {
            save: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} },
            load: (k, d) => { try { const i = localStorage.getItem(k); return i ? JSON.parse(i) : d; } catch (e) { return d; } }
        };

        const RecordingService = {
            recorder: null,
            chunks: [],
            isRecording: false,
            start: (stream) => {
                try {
                    if (!stream || stream.getTracks().length === 0) return;
                    RecordingService.chunks = [];
                    const mimeTypes = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
                    let mime = 'video/webm';
                    for (let m of mimeTypes) {
                        if (MediaRecorder.isTypeSupported(m)) { mime = m; break; }
                    }
                    RecordingService.recorder = new MediaRecorder(stream, { mimeType: mime });
                    RecordingService.recorder.ondataavailable = (e) => { if (e.data.size > 0) RecordingService.chunks.push(e.data); };
                    RecordingService.recorder.onstop = () => {
                        const blob = new Blob(RecordingService.chunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `streamcall-${Date.now()}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    };
                    RecordingService.recorder.start();
                    RecordingService.isRecording = true;
                } catch (e) {
                    console.error('RecStart', e.message);
                }
            },
            stop: () => {
                try {
                    if (RecordingService.recorder && RecordingService.isRecording) {
                        RecordingService.recorder.stop();
                        RecordingService.isRecording = false;
                    }
                } catch (e) {
                    console.error('RecStop', e.message);
                }
            }
        };

        const StatsPanel = ({ stats }) => (
            <div className="stats-panel">
                <div className="stat-line"><span>Latencia:</span><span className={stats.latency < 100 ? 'stat-good' : 'stat-bad'}>{stats.latency}ms</span></div>
                <div className="stat-line"><span>Pérdida:</span><span className={stats.packetLoss < 1 ? 'stat-good' : 'stat-bad'}>{stats.packetLoss}%</span></div>
                <div className="stat-line"><span>Resolución:</span><span>{stats.videoResolution}</span></div>
            </div>
        );

        // DIRECTOR
        const ReceiverView = ({ roomName, isObsMode, pin }) => {
            const [status, setStatus] = useState('BUSCANDO...');
            const [connected, setConnected] = useState(false);
            const [tally, setTally] = useState('idle');
            const [cleanMode, setCleanMode] = useState(false);
            const [audios, setAudios] = useState([]);
            const [selectedAudio, setSelectedAudio] = useState('');
            const [talkback, setTalkback] = useState(false);
            const [stats, setStats] = useState({ latency: 0, packetLoss: 0, videoResolution: '0x0' });
            const [rec, setRec] = useState(false);
            const [err, setErr] = useState(null);
            const peer = useRef(null);
            const video = useRef(null);
            const talkStream = useRef(null);
            const talkCall = useRef(null);
            const timerStats = useRef(null);
            const incomingCall = useRef(null);

            useEffect(() => {
                init();
                return () => cleanup();
            }, [roomName, isObsMode]);

            const cleanup = () => {
                try {
                    clearInterval(timerStats.current);
                    if (rec) RecordingService.stop();
                    
                    if (talkStream.current) {
                        talkStream.current.getTracks().forEach(t => { t.stop(); });
                        talkStream.current = null;
                    }
                    
                    if (talkCall.current) {
                        talkCall.current.close();
                        talkCall.current = null;
                    }
                    
                    if (incomingCall.current) {
                        incomingCall.current.close();
                        incomingCall.current = null;
                    }
                    
                    if (peer.current) {
                        peer.current.destroy();
                        peer.current = null;
                    }
                } catch (e) {
                    console.error('Cleanup error:', e);
                }
            };

            const init = async () => {
                try {
                    if (!isObsMode) {
                        const devs = await navigator.mediaDevices.enumerateDevices();
                        const as = devs.filter(d => d.kind === 'audioinput');
                        setAudios(as);
                        if (as.length > 0) setSelectedAudio(Storage.load('sa', as[0].deviceId));
                    }

                    const baseId = roomName.toUpperCase();
                    const myId = isObsMode ? `obs_${baseId}` : `dir_${baseId}`;
                    peer.current = new Peer(myId, CONFIG.PEER_CONFIG);

                    peer.current.on('open', () => {
                        console.log('📡 Director abierto:', myId);
                        setStatus('LISTO');
                    });
                    
                    peer.current.on('call', handleCall);
                    peer.current.on('error', (e) => {
                        console.error('❌ Peer error:', e.type);
                        if (e.type !== 'peer-unavailable') setErr(`Error: ${e.type}`);
                    });

                    timerStats.current = setInterval(() => {
                        if (incomingCall.current && incomingCall.current.peerConnection) {
                            incomingCall.current.peerConnection.getStats().then(stats => {
                                stats.forEach(r => {
                                    if (r.type === 'inbound-rtp' && r.kind === 'video') {
                                        setStats({
                                            latency: Math.round((r.currentRoundTripTime || 0) * 1000),
                                            packetLoss: ((r.packetsLost || 0) / Math.max(1, (r.packetsReceived || 0) + (r.packetsLost || 0)) * 100).toFixed(2),
                                            videoResolution: `${r.frameWidth || 0}x${r.frameHeight || 0}`,
                                        });
                                    }
                                });
                            }).catch(e => console.warn('Stats error:', e));
                        }
                    }, 2000);
                } catch (e) {
                    console.error('❌ Init error:', e.message);
                    setErr(e.message);
                }
            };

            const handleCall = (call) => {
                try {
                    incomingCall.current = call;
                    call.answer();
                    call.on('stream', (s) => {
                        if (video.current) {
                            video.current.srcObject = s;
                            video.current.play().catch(e => {
                                console.warn('Play error:', e.message);
                                setErr(`Error reproducción: ${e.message}`);
                            });
                            setConnected(true);
                            setStatus('ONLINE');
                            setErr(null);
                            if (rec && !RecordingService.isRecording) RecordingService.start(s);
                        }
                    });
                    call.on('close', () => {
                        setConnected(false);
                        setStatus('DESCONECTADO');
                    });
                    call.on('error', (e) => {
                        console.error('❌ Call error:', e.message);
                        setErr(e.message);
                    });
                } catch (e) {
                    console.error('❌ HandleCall error:', e.message);
                }
            };

            const toggle_talkback = async () => {
                try {
                    if (talkback) {
                        if (talkStream.current) {
                            talkStream.current.getTracks().forEach(t => t.stop());
                            talkStream.current = null;
                        }
                        if (talkCall.current) {
                            talkCall.current.close();
                            talkCall.current = null;
                        }
                        setTalkback(false);
                    } else {
                        const s = await navigator.mediaDevices.getUserMedia({
                            audio: selectedAudio ? { deviceId: { exact: selectedAudio } } : true
                        });
                        talkStream.current = s;
                        if (peer.current) {
                            talkCall.current = peer.current.call(`guest_${roomName.toUpperCase()}`, s);
                        }
                        setTalkback(true);
                    }
                } catch (e) {
                    console.error('❌ Talkback error:', e.message);
                    setErr(e.message);
                }
            };

            const copy_link = (m) => {
                try {
                    const u = `${window.location.href.split('?')[0]}?mode=${m}&room=${roomName}${pin ? `&pin=${pin}` : ''}`;
                    navigator.clipboard.writeText(u);
                    alert('✓ Link copiado');
                } catch (e) {
                    console.error('Copy error:', e);
                }
            };

            if (isObsMode) {
                return (
                    <div className="obs-layout">
                        <video ref={video} className="obs-video" autoPlay playsInline muted />
                        {!connected && <div className="obs-status"><div className="loader" />{status}</div>}
                        {err && <div className="error-toast">{err}</div>}
                    </div>
                );
            }

            return (
                <div className={`director-layout ${cleanMode ? 'clean-mode' : ''}`}>
                    {cleanMode && <div className="exit-btn" onClick={() => setCleanMode(false)}>✕</div>}
                    <div className="video-stage">
                        <video ref={video} className="remote-video" autoPlay playsInline muted />
                        {!connected && <div style={{ position: 'absolute', color: '#71717a', textAlign: 'center' }}>
                            <div className="loader" style={{ margin: '0 auto 15px' }} />
                            📡 {status}
                        </div>}
                    </div>
                    <div className="director-controls">
                        <h2 style={{ fontSize: '1.25rem', fontWeight: 800, background: 'linear-gradient(135deg, #a78bfa, #d8b4fe)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '20px', textAlign: 'center' }}>📡 StreamCall V10</h2>
                        
                        <div className={`status-badge ${connected ? 'status-connected' : 'status-connecting'}`}>
                            {connected ? '✓ CONECTADO' : '⏳ ESPERANDO'}
                        </div>

                        <label style={{ color: '#a78bfa', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🎧 Audio</label>
                        <select value={selectedAudio} onChange={e => { setSelectedAudio(e.target.value); Storage.save('sa', e.target.value); }}>
                            <option value="">-- Seleccionar --</option>
                            {audios.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || 'Audio'}</option>)}
                        </select>

                        <button className={`btn ${talkback ? 'btn-rose' : 'btn-violet'}`} onClick={toggle_talkback} disabled={!connected}>
                            {talkback ? '⏹ Parar' : '▶ Retorno'}
                        </button>

                        <div style={{ height: '1px', background: '#3f3f46', margin: '15px 0' }} />

                        <button className={`btn ${rec ? 'btn-rose' : 'btn-emerald'}`} onClick={() => {
                            if (rec) { RecordingService.stop(); setRec(false); }
                            else if (video.current?.srcObject) { RecordingService.start(video.current.srcObject); setRec(true); }
                            else setErr('Sin stream');
                        }} disabled={!connected}>{rec ? '⏹' : '⏺'} Grabar</button>

                        <div style={{ height: '1px', background: '#3f3f46', margin: '15px 0' }} />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🔗 Enlaces</label>
                        <button className="btn btn-emerald" onClick={() => copy_link('obs')}>Link OBS</button>
                        <button className="btn btn-dark" onClick={() => copy_link('guest')}>Link Guest</button>

                        <div style={{ height: '1px', background: '#3f3f46', margin: '15px 0' }} />

                        <label style={{ color: '#a1a1a1', fontSize: '0.75rem', marginBottom: '8px', display: 'block', fontWeight: 'bold' }}>🚦 Tally</label>
                        <div className="tally-grid">
                            <button className={`t-btn ${tally === 'idle' ? 'active-idle' : ''}`} onClick={() => setTally('idle')}>OFF</button>
                            <button className={`t-btn ${tally === 'prev' ? 'active-prev' : ''}`} onClick={() => setTally('prev')}>PREV</button>
                            <button className={`t-btn ${tally === 'live' ? 'active-live' : ''}`} onClick={() => setTally('live')}>AIRE</button>
                        </div>

                        {connected && <StatsPanel stats={stats} />}

                        <button className="btn btn-dark" onClick={() => setCleanMode(true)}>⛶ Modo Limpio</button>
                    </div>
                    {err && <div className="error-toast">{err}</div>}
                </div>
            );
        };

        // GUEST
        const GuestView = ({ roomName, pin }) => {
            const [joined, setJoined] = useState(false);
            const [quality, setQuality] = useState(Storage.load('pq', '720'));
            const [tally, setTally] = useState('idle');
            const [micOff, setMicOff] = useState(false);
            const [camOff, setCamOff] = useState(false);
            const [has_video, setHasVideo] = useState(false);
            const [pin_in, setPinIn] = useState('');
            const [needs_pin, setNeedsPin] = useState(!!pin);
            const [stats, setStats] = useState({ latency: 0, packetLoss: 0, videoResolution: '0x0' });
            const [camera, setCamera] = useState(Storage.load('cm', 'user'));
            const [rec, setRec] = useState(false);
            const [err, setErr] = useState(null);
            const [connectionStatus, setConnectionStatus] = useState('Iniciando...');
            const localVideo = useRef(null);
            const returnVideo = useRef(null);
            const peer = useRef(null);
            const localStream = useRef(null);
            const timerStats = useRef(null);
            const callRef = useRef(null);
            const connectionAttempts = useRef(0);

            useEffect(() => {
                if (!joined) return;
                init_guest();
                return () => cleanup();
            }, [joined, quality, camera]);

            const cleanup = () => {
                try {
                    clearInterval(timerStats.current);
                    
                    if (localStream.current) {
                        localStream.current.getTracks().forEach(t => t.stop());
                        localStream.current = null;
                    }
                    
                    if (callRef.current) {
                        callRef.current.close();
                        callRef.current = null;
                    }
                    
                    if (peer.current) {
                        peer.current.destroy();
                        peer.current = null;
                    }
                } catch (e) {
                    console.error('Cleanup error:', e);
                }
            };

            const init_guest = async () => {
                try {
                    setConnectionStatus('Obteniendo cámara...');
                    
                    const res = { '360': [640, 360], '720': [1280, 720], '1080': [1920, 1080] };
                    const [w, h] = res[quality] || res['720'];
                   
                    const s = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: w }, height: { ideal: h }, facingMode: camera },
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });
                   
                    localStream.current = s;
                   
                    if (localVideo.current) {
                        localVideo.current.srcObject = s;
                        await localVideo.current.play();
                    }

                    setConnectionStatus('Conectando al director...');

                    const guestId = `guest_${roomName.toUpperCase()}`;
                    peer.current = new Peer(guestId, CONFIG.PEER_CONFIG);

                    peer.current.on('open', () => {
                        console.log('✓ Guest abierto:', guestId);
                        connectToDirector();
                    });

                    peer.current.on('call', (c) => {
                        try {
                            console.log('✓ Llamada entrante');
                            c.answer(localStream.current);
                            c.on('stream', (rem) => {
                                if (returnVideo.current) {
                                    returnVideo.current.srcObject = rem;
                                    returnVideo.current.play().catch(() => {});
                                }
                                setHasVideo(true);
                                setConnectionStatus('✓ Conectado');
                            });
                        } catch (e) {
                            console.error('❌ Call error:', e.message);
                        }
                    });

                    peer.current.on('error', (e) => {
                        if (e.type !== 'peer-unavailable') {
                            console.error('❌ Peer error:', e.type);
                            setErr(`Error: ${e.type}`);
                        }
                    });

                    timerStats.current = setInterval(() => {
                        if (callRef.current && callRef.current.peerConnection) {
                            callRef.current.peerConnection.getStats().then(stats => {
                                stats.forEach(r => {
                                    if (r.type === 'outbound-rtp' && r.kind === 'video') {
                                        setStats({
                                            latency: Math.round((r.currentRoundTripTime || 0) * 1000),
                                            packetLoss: ((r.packetsSent || 0) > 0 ? 0 : 0).toFixed(2),
                                            videoResolution: `${r.frameWidth || 0}x${r.frameHeight || 0}`,
                                        });
                                    }
                                });
                            }).catch(e => console.warn('Stats error:', e));
                        }
                    }, 2000);

                    setErr(null);
                } catch (e) {
                    console.error('❌ InitGuest error:', e.message);
                    setErr(e.message);
                    setConnectionStatus('Error de conexión');
                }
            };

            const connectToDirector = () => {
                try {
                    const directorId = `dir_${roomName.toUpperCase()}`;
                    connectionAttempts.current++;
                    setConnectionStatus(`Intento ${connectionAttempts.current}...`);
                    
                    callRef.current = peer.current.call(directorId, localStream.current);
                    
                    // Reintentar cada 3 segundos si no conecta
                    setTimeout(() => {
                        if (!has_video && connectionAttempts.current < 10) {
                            connectToDirector();
                        } else if (connectionAttempts.current >= 10) {
                            setErr('No se puede conectar al director');
                            setConnectionStatus('Fallo de conexión');
                        }
                    }, 3000);
                } catch (e) {
                    console.error('❌ Connect error:', e.message);
                }
            };

            if (!joined) {
                if (needs_pin) {
                    return (
                        <div className="lobby-container">
                            <div className="glass-box">
                                <div style={{ width: '64px', height: '64px', background: 'rgba(139, 92, 246, 0.2)', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>🔒</div>
                                <h2 style={{ fontSize: '1.5rem', fontWeight: 800, marginBottom: '24px' }}>Sala Protegida</h2>
                                <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>PIN</label>
                                <input type="password" value={pin_in} onChange={e => setPinIn(e.target.value)} onKeyPress={e => e.key === 'Enter' && (pin_in === pin ? (setNeedsPin(false), setJoined(true)) : setErr('PIN incorrecto'))} placeholder="PIN" autoFocus />
                                <button className="btn btn-violet" onClick={() => pin_in === pin ? (setNeedsPin(false), setJoined(true)) : setErr('PIN incorrecto')}>Verificar</button>
                                {err && <div className="error-toast">{err}</div>}
                            </div>
                        </div>
                    );
                }
                return (
                    <div className="lobby-container">
                        <div className="glass-box">
                            <div style={{ width: '64px', height: '64px', background: 'rgba(139, 92, 246, 0.2)', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>📹</div>
                            <h2 style={{ fontSize: '1.5rem', fontWeight: 800, marginBottom: '24px', color: '#a78bfa' }}>Sala: {roomName}</h2>
                            <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>Calidad</label>
                            <select value={quality} onChange={e => { setQuality(e.target.value); Storage.save('pq', e.target.value); }}>
                                <option value="360">360p BAJA</option>
                                <option value="720">720p MEDIA</option>
                                <option value="1080">1080p ALTA</option>
                            </select>
                            <button className="btn btn-violet" onClick={() => setJoined(true)}>▶ Entrar</button>
                            {err && <div className="error-toast">{err}</div>}
                        </div>
                    </div>
                );
            }

            return (
                <div className={`guest-layout tally-${tally}`}>
                    <div className="guest-tally-border" />
                    <div className="big-tally-text">{tally === 'live' ? <>🔴 AIRE</> : <>⚠️ PREV</>}</div>
                    <div className={`return-pip ${has_video ? 'active' : ''}`}>
                        <video ref={returnVideo} autoPlay playsInline muted />
                        <div className="pip-label">📺</div>
                    </div>
                    <video ref={localVideo} className="guest-video" muted autoPlay playsInline />
                    <div className="guest-overlay">
                        <div style={{ fontSize: '0.75rem', fontWeight: 'bold', color: '#a1a1a1', background: 'rgba(139, 92, 246, 0.1)', padding: '6px 12px', borderRadius: '20px' }}>{roomName}</div>
                        <div className={`mic-btn ${micOff ? 'off' : ''}`} onClick={() => {
                            const at = localStream.current?.getAudioTracks();
                            if (at && at.length > 0) {
                                at[0].enabled = !at[0].enabled;
                                setMicOff(!at[0].enabled);
                            }
                        }}>{micOff ? '🔇' : '🎤'}</div>
                        <div className={`mic-btn ${camOff ? 'off' : ''}`} onClick={() => {
                            const vt = localStream.current?.getVideoTracks();
                            if (vt && vt.length > 0) {
                                vt[0].enabled = !vt[0].enabled;
                                setCamOff(!vt[0].enabled);
                            }
                        }}>{camOff ? '📵' : '📹'}</div>
                        <div className="mic-btn" onClick={() => { const nc = camera === 'user' ? 'environment' : 'user'; setCamera(nc); Storage.save('cm', nc); }}>🔄</div>
                        <div className={`mic-btn ${rec ? 'off' : ''}`} onClick={() => {
                            if (rec) { RecordingService.stop(); setRec(false); }
                            else if (localStream.current) { RecordingService.start(localStream.current); setRec(true); }
                        }}>{rec ? '⏹' : '⏺'}</div>
                    </div>
                    {err && <div className="error-toast">{err}</div>}
                </div>
            );
        };

        // APP
        const App = () => {
            const [mode, setMode] = useState(null);
            const [room, setRoom] = useState('');
            const [pin, setPin] = useState('');
            const [theme, setTheme] = useState(Storage.load('th', 'dark'));

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                let m = p.get('mode');
                let r = p.get('room');
                let n = p.get('pin') || '';
                if (m && r) {
                    setRoom(r);
                    setPin(n);
                    setMode(m);
                    if (m === 'obs') document.body.classList.add('obs-mode');
                } else {
                    setRoom(Math.random().toString(36).substring(2, 6).toUpperCase());
                }
                if (theme === 'light') document.body.classList.add('light-theme');
            }, []);

            if (mode === 'director') return <ReceiverView roomName={room} isObsMode={false} pin={pin} />;
            if (mode === 'obs') return <ReceiverView roomName={room} isObsMode={true} pin={pin} />;
            if (mode === 'guest') return <GuestView roomName={room} pin={pin} />;

            return (
                <div className="lobby-container">
                    <div className="glass-box">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                            <div style={{ width: '64px', height: '64px', background: 'rgba(139, 92, 246, 0.2)', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>📡</div>
                            <button onClick={() => { const nt = theme === 'dark' ? 'light' : 'dark'; setTheme(nt); Storage.save('th', nt); document.body.classList.toggle('light-theme'); }} style={{ background: 'none', border: 'none', color: '#8b5cf6', fontSize: '1.5rem', cursor: 'pointer' }}>{theme === 'dark' ? '🌙' : '☀️'}</button>
                        </div>
                        <h1 style={{ fontSize: '2rem', fontWeight: 800, marginBottom: '32px', textTransform: 'uppercase', background: 'linear-gradient(135deg, #a78bfa, #d8b4fe)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', textAlign: 'center' }}>StreamCall V10</h1>
                        <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>ID Sala</label>
                        <input value={room} onChange={e => setRoom(e.target.value.toUpperCase())} placeholder="SALA" maxLength="20" />
                        <label style={{ fontSize: '0.75rem', color: '#a1a1a1', display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>PIN</label>
                        <input value={pin} onChange={e => setPin(e.target.value)} type="password" placeholder="PIN" maxLength="6" />
                        <button className="btn btn-violet" onClick={() => window.location.href = `?mode=director&room=${room}${pin ? `&pin=${pin}` : ''}`}>🎛 Director</button>
                        <button className="btn btn-emerald" onClick={() => window.location.href = `?mode=guest&room=${room}${pin ? `&pin=${pin}` : ''}`}>📹 Guest</button>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
