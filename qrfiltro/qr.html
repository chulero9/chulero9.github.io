
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        #qr-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        #qr-text {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }
        #qrcode {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="qr-container">
        <div id="qr-text">¡Enviá tu mensaje!</div>
        <div id="qrcode"></div>
    </div>

    <script>
        const SUBMIT_URL = 'https://chulero9.github.io/qrfiltro/submit.html';
        
        new QRCode(document.getElementById("qrcode"), {
            text: SUBMIT_URL,
            width: 150,
            height: 150,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
