
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Mensaje</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f4f4f4; 
        }
        input[type="text"] { 
            width: 90%; 
            max-width: 400px; 
            padding: 15px; 
            font-size: 18px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
        }
        button { 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            font-size: 18px; 
            border-radius: 8px; 
            cursor: pointer; 
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .msg { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 8px; 
            display: none; 
            font-weight: bold;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
        .success-pending { 
            background: #fff3cd; 
            color: #856404; 
            border: 1px solid #ffc107; 
        }
        .success-live { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #28a745; 
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #dc3545; 
        }
        .info { 
            color: #666; 
            font-size: 14px; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>
    <h2>¡Aparecé en pantalla!</h2>
    <input type="text" id="msgText" placeholder="Escribí tu mensaje..." maxlength="100">
    <br>
    <button onclick="send()" id="sendBtn">Enviar</button>
    <div id="result" class="msg"></div>
    <div class="info">Los mensajes están sujetos a moderación</div>

    <script>
        const API_URL = 'https://landing.ar/qrtv/api.php';
        
        async function send() {
            const text = document.getElementById('msgText').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('sendBtn');
            
            if (!text) {
                resultDiv.className = 'msg error';
                resultDiv.textContent = 'Escribí un mensaje primero';
                resultDiv.style.display = 'block';
                return;
            }
            
            // Deshabilitar botón mientras envía
            btn.disabled = true;
            btn.textContent = 'Enviando...';
            
            try {
                const formData = new FormData();
                formData.append('text', text);
                
                const res = await fetch(API_URL + '?action=add', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (data.status === 'ok') {
                    if (data.approved) {
                        resultDiv.className = 'msg success-live';
                        resultDiv.innerHTML = '✅ ¡Mensaje enviado!<br><small>Ya está rotando en pantalla</small>';
                    } else {
                        resultDiv.className = 'msg success-pending';
                        resultDiv.innerHTML = '⏸ ¡Mensaje recibido!<br><small>Está pendiente de aprobación del moderador</small>';
                    }
                    document.getElementById('msgText').value = '';
                } else {
                    resultDiv.className = 'msg error';
                    if (data.message && data.message.includes('no permitidas')) {
                        resultDiv.innerHTML = '❌ Tu mensaje contiene palabras no apropiadas';
                    } else {
                        resultDiv.textContent = 'Error: ' + (data.message || 'Desconocido');
                    }
                }
            } catch (err) {
                resultDiv.className = 'msg error';
                resultDiv.textContent = 'Error de conexión. Intentá de nuevo.';
            }
            
            resultDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Enviar';
            
            setTimeout(() => {
                resultDiv.style.display = 'none';
            }, 5000);
        }
        
        document.getElementById('msgText').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
