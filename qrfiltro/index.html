
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ticker OBS</title>
    <style>
        body { 
            margin: 0; 
            background: transparent; 
            font-family: Arial, sans-serif; 
            overflow: hidden; 
        }
        #ticker-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background-color: #ff0000;
            color: white;
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
        }
        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 20s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <div id="ticker-container">
        <div class="ticker-text" id="ticker-content">Esperando mensajes...</div>
    </div>

    <script>
        const API_URL = 'https://landing.ar/qrtv/api.php';
        
        async function updateTicker() {
            try {
                const res = await fetch(`${API_URL}?action=get&filter=active&_=${Date.now()}`);
                const data = await res.json();
                
                document.getElementById('ticker-container').style.backgroundColor = data.settings?.color || '#ff0000';
                
                const msgs = data.messages || [];
                const content = document.getElementById('ticker-content');
                
                if (msgs.length > 0) {
                    const text = msgs.map(m => m.text).join(' &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ');
                    content.innerHTML = text + ' &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ' + text;
                } else {
                    content.innerHTML = "Esperando mensajes...";
                }
            } catch (err) {
                console.error('Error ticker:', err);
            }
        }

        updateTicker();
        setInterval(updateTicker, 5000);
    </script>
</body>
</html>
