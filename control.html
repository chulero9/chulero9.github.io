<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control del Ticker</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
}

.container {
    width: 400px;
    margin: 30px auto;
}

h2 {
    margin-bottom: 20px;
}

.card {
    background: #2c2c2c;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

label {
    display: block;
    margin: 10px 0;
}

input[type="color"] {
    width: 50px;
    height: 30px;
    border: none;
}

button {
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.btn-save {
    background: #28a745;
    color: white;
}

.btn-delete {
    background: #dc3545;
    color: white;
}

.btn-delete-all {
    background: #ffc107;
    color: black;
}

.message {
    background: #3a3a3a;
    padding: 10px;
    border-radius: 6px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-left: 4px solid #28a745;
}
</style>
</head>

<body>

<div class="container">

<h2>Control del Ticker</h2>

<!-- Ajustes -->
<div class="card">
    <h3>🎨 Ajustes Visuales</h3>

    <label>
        Color del Ticker:
        <input type="color" id="colorPicker">
    </label>

    <label>
        <input type="checkbox" id="autoDelete">
        Borrar mensajes automáticamente (24hs)
    </label>

    <button class="btn-save" onclick="guardarAjustes()">Guardar Ajustes</button>
</div>

<!-- Mensajes -->
<div class="card">
    <h3>💬 Mensajes Activos</h3>

    <button class="btn-delete-all" onclick="borrarTodos()">Borrar TODOS</button>

    <div id="listaMensajes"></div>
</div>

</div>

<script>

// Cargar datos
function cargarDatos() {
    fetch('api.php?action=get')
    .then(r => r.json())
    .then(data => {

        // Ajustes
        if (data.settings) {
            document.getElementById('colorPicker').value = data.settings.color || "#ff0000";
            document.getElementById('autoDelete').checked = data.settings.autoDelete;
        }

        // Mensajes
        const contenedor = document.getElementById('listaMensajes');
        contenedor.innerHTML = "";

        if (data.messages && data.messages.length > 0) {
            data.messages.forEach(m => {

                const div = document.createElement('div');
                div.className = "message";

                div.innerHTML = `
                    <span>${m.text}</span>
                    <button class="btn-delete" onclick="borrarMensaje(${m.id})">Borrar</button>
                `;

                contenedor.appendChild(div);
            });
        } else {
            contenedor.innerHTML = "<p>No hay mensajes</p>";
        }

    });
}

// Guardar ajustes
function guardarAjustes() {
    const color = document.getElementById('colorPicker').value;
    const autoDelete = document.getElementById('autoDelete').checked ? 1 : 0;

    const params = new URLSearchParams();
    params.append('color', color);
    params.append('autoDelete', autoDelete);

    fetch('api.php?action=settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params.toString()
    })
    .then(() => alert("Ajustes guardados"));
}

// Borrar uno
function borrarMensaje(id) {
    fetch('api.php?action=delete&id=' + id)
    .then(() => cargarDatos());
}

// Borrar todos
function borrarTodos() {
    if (!confirm("¿Borrar todos los mensajes?")) return;

    fetch('api.php?action=deleteAll')
    .then(() => cargarDatos());
}

// Auto refresco
setInterval(cargarDatos, 3000);
cargarDatos();

</script>

</body>
</html>
