<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel MASTER Ticker</title>

<style>
body {
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    padding:15px;
}

h2,h3 { margin-top:10px; }

input, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}

button {
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.msg {
    background:#222;
    padding:8px;
    margin:5px 0;
    border-radius:5px;
    font-size:13px;
}
.actions button {
    width:48%;
    margin-top:5px;
}
</style>
</head>

<body>

<h2>🎛 PANEL MASTER</h2>

<!-- ENVIAR MANUAL -->
<input id="msg" placeholder="Mensaje manual...">
<button onclick="agregarManual()">Agregar directo al aire</button>

<hr>

<!-- PENDIENTES -->
<h3>📩 Pendientes (usuarios)</h3>
<div id="pendientes"></div>

<hr>

<!-- ACTIVOS -->
<h3>📺 En pantalla</h3>
<button onclick="borrarTodo()">🧨 Borrar TODOS</button>
<div id="activos"></div>

<hr>

<!-- AJUSTES -->
<h3>⚙️ Ajustes</h3>

<label>Color</label>
<input type="color" id="color">

<label>Velocidad</label>
<input type="range" min="50" max="300" id="vel">

<label>Tamaño texto</label>
<input type="range" min="18" max="40" id="size">

<button onclick="guardarAjustes()">💾 Guardar ajustes</button>
<button onclick="toggle()">ON / OFF</button>

<script>
const ws = new WebSocket("ws://" + location.hostname + ":3000");

let estado = {
    mensajes: [],
    pendientes: [],
    color:"#ff0000",
    velocidad:100,
    size:24,
    activo:true
};

ws.onmessage = e => {
    estado = JSON.parse(e.data);
    limpiarExpirados();
    render();
};

function enviar(){
    ws.send(JSON.stringify(estado));
}

/* ===== MENSAJES ===== */

// manual directo
function agregarManual(){
    const text = document.getElementById("msg").value;
    if(!text) return;

    estado.mensajes.push({
        text:text,
        time: Date.now()
    });

    document.getElementById("msg").value="";
    enviar();
}

// aprobar desde usuarios
function aprobar(i){
    ws.send(JSON.stringify({ aprobar:i }));
}

// rechazar
function rechazar(i){
    ws.send(JSON.stringify({ rechazar:i }));
}

// eliminar activo
function borrarMensaje(i){
    estado.mensajes.splice(i,1);
    enviar();
}

// borrar todos
function borrarTodo(){
    estado.mensajes = [];
    enviar();
}

/* ===== AUTO DELETE 24H ===== */
function limpiarExpirados(){
    const ahora = Date.now();

    estado.mensajes = estado.mensajes.filter(m => (ahora - m.time) < 86400000);
}

/* ===== AJUSTES ===== */

function guardarAjustes(){
    estado.color = document.getElementById("color").value;
    estado.velocidad = document.getElementById("vel").value;
    estado.size = document.getElementById("size").value;
    enviar();
}

function toggle(){
    estado.activo = !estado.activo;
    enviar();
}

/* ===== UI ===== */

function render(){

    // PENDIENTES
    document.getElementById("pendientes").innerHTML = "";

    estado.pendientes.forEach((m,i)=>{
        document.getElementById("pendientes").innerHTML += `
            <div class="msg">
                ${m.text}
                <div class="actions">
                    <button onclick="aprobar(${i})">✅ Aprobar</button>
                    <button onclick="rechazar(${i})">❌ Rechazar</button>
                </div>
            </div>
        `;
    });

    // ACTIVOS
    document.getElementById("activos").innerHTML = "";

    estado.mensajes.forEach((m,i)=>{
        document.getElementById("activos").innerHTML += `
            <div class="msg">
                ${m.text}
                <button onclick="borrarMensaje(${i})">❌ Eliminar</button>
            </div>
        `;
    });

    // SETTINGS
    document.getElementById("color").value = estado.color;
    document.getElementById("vel").value = estado.velocidad;
    document.getElementById("size").value = estado.size;
}

/* LIMPIEZA AUTOMÁTICA */
setInterval(()=>{
    limpiarExpirados();
    enviar();
},60000);

</script>

</body>
</html>
