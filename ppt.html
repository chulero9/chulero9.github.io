<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPT Call - LAN Clean</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; height: 100vh; overflow: hidden; }
   
    /* === FIX PARPADEO === */
    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
   
    .lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #0f172a; padding: 20px; }
    .glass { background: rgba(30, 41, 59, 0.95); padding: 40px; border-radius: 16px; width: 100%; max-width: 450px; border: 1px solid #334155; }
    input { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; text-align: center; }
    .btn { width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; background: #3b82f6; color: white; font-size: 1rem; margin-bottom: 10px; }
    .btn-purple { background: #8b5cf6; }
    .checkbox-container { display: flex; align-items: center; gap: 10px; margin: 15px 0; padding: 15px; background: rgba(51, 65, 85, 0.5); border-radius: 8px; cursor: pointer; }
    .checkbox-label { font-size: 0.9rem; color: #cbd5e1; }
    .director { display: flex; flex-direction: column; height: 100vh; background: #000; }
    .header { background: #0f172a; border-bottom: 1px solid #334155; padding: 15px; text-align: center; }
    .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 10px; padding: 10px; }
    .slot { background: #1e293b; border: 2px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .slot-header { position: absolute; top: 0; left: 0; right: 0; padding: 10px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
    .video-area { flex: 1; background: #000; position: relative; }
    .badge { background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; border: 1px solid; pointer-events: auto; }
    .badge.screen { color: #8b5cf6; border-color: #8b5cf6; }
    .badge.camera { color: #3b82f6; border-color: #3b82f6; }
    .badge.connection { position: absolute; top: 10px; right: 10px; font-size: 0.65rem; color: #22c55e; border-color: #22c55e; background: rgba(0,0,0,0.8); }
    .status { position: absolute; color: #64748b; text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .copy-btn { position: absolute; bottom: 15px; right: 15px; background: #8b5cf6; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; z-index: 30; display: flex; align-items: center; gap: 6px; }
    .copy-btn:hover { background: #7c3aed; }
    .live-btn { position: absolute; bottom: 15px; left: 15px; padding: 10px 18px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; cursor: pointer; z-index: 30; display: flex; align-items: center; gap: 6px; }
    .presenter { width: 100vw; height: 100vh; position: relative; background: #000; }
    .tally-border { position: absolute; inset: 0; border: 15px solid transparent; pointer-events: none; z-index: 50; transition: all 0.3s; }
    .tally-border.live { border-color: #ef4444; box-shadow: inset 0 0 50px rgba(239,68,68,0.5); }
    .on-air { position: absolute; top: 20px; right: 20px; background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; font-weight: bold; display: none; z-index: 100; }
    .on-air.active { display: block; }
    .audio-indicator { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 6px; font-size: 0.75rem; z-index: 100; }
    .connection-indicator { position: absolute; top: 50px; left: 20px; font-size: 0.7rem; color: #64748b; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; z-index: 100; }
    .p-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); padding: 15px; border-radius: 12px; display: flex; gap: 10px; z-index: 100; border: 1px solid #334155; }
    .p-btn { width: 50px; height: 50px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 1.2rem; cursor: pointer; }
    .p-btn.off { background: #ef4444; }
    .p-btn.switch { width: auto; padding: 0 15px; font-size: 0.8rem; font-weight: bold; }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
    .mode-card { background: rgba(51, 65, 85, 0.5); border: 2px solid #334155; border-radius: 8px; padding: 20px; cursor: pointer; text-align: center; }
    .mode-card.selected { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.2); }
    .mode-icon { font-size: 2rem; margin-bottom: 8px; color: #8b5cf6; }
    .error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 6px; margin: 10px 0; font-size: 0.8rem; }
    .obs { width: 100vw; height: 100vh; background: transparent; position: relative; overflow: hidden; }
    .obs-video { width: 100%; height: 100%; object-fit: contain; display: block; }
    .obs-wait { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #64748b; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .obs-ready { position: absolute; top: 20px; left: 20px; background: rgba(34, 197, 94, 0.9); color: #000; padding: 6px 14px; border-radius: 9999px; font-size: 0.75rem; font-weight: bold; z-index: 100; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PEER_CONFIG = {
      config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    };

    // ==========================================
    // VIDEO COMPONENT (FIX PARPADEO)
    // ==========================================
    const Video = React.memo(({ stream, ...props }) => {
      const ref = useRef(null);
      useEffect(() => {
        const video = ref.current;
        if (!video || !stream) return;
        video.srcObject = stream;
        video.muted = props.muted !== false;
        const play = () => video.play().catch(() => {});
        video.onloadedmetadata = play;
        if (stream.active) play();
        return () => {
          if (video.srcObject) video.srcObject = null;
        };
      }, [stream]);
      return <video ref={ref} autoPlay playsInline {...props} />;
    });

    // ==========================================
    // DIRECTOR (CORREGIDO)
    // ==========================================
    const Director = ({ room }) => {
      const [slots, setSlots] = useState({1:{},2:{},3:{}});
      const [activeSlot, setActiveSlot] = useState(null);
      const peer = useRef(null);
      const dataConnsRef = useRef({});

      useEffect(() => {
        peer.current = new Peer(`dir_${room}`, PEER_CONFIG);

        peer.current.on('open', () => console.log('✅ Director listo'));

        // === CONEXIÓN DE DATOS (CORRECCIÓN CRÍTICA) ===
        peer.current.on('connection', (conn) => {
          const match = conn.peer.match(/pres_(.+?)_(\d+)_/);
          if (!match) return;
          const id = parseInt(match[2]);

          dataConnsRef.current[id] = conn;

          conn.on('data', (data) => {
            if (data.type === 'info' && data.source) {
              setSlots(s => ({ ...s, [id]: { ...s[id], source: data.source } }));
            }
          });

          conn.on('close', () => {
            delete dataConnsRef.current[id];
          });
        });

        peer.current.on('call', call => {
          const match = call.peer.match(/pres_(.+?)_(\d+)_/);
          if (!match) return;
          const id = parseInt(match[2]);

          call.answer();

          call.on('stream', stream => {
            setSlots(s => ({ ...s, [id]: { ...s[id], stream } }));
          });

          call.on('close', () => {
            setSlots(s => ({ ...s, [id]: {} }));
            delete dataConnsRef.current[id];
          });
        });

        return () => peer.current?.destroy();
      }, [room]);

      const toggleLive = (id) => {
        const newActive = activeSlot === id ? null : id;
        setActiveSlot(newActive);

        Object.keys(dataConnsRef.current).forEach(sid => {
          const conn = dataConnsRef.current[sid];
          if (conn?.open) conn.send({ tally: newActive === parseInt(sid) ? 'live' : 'idle' });
        });
      };

      const copyObsUrl = (id) => {
        const url = `${window.location.origin}${window.location.pathname}?mode=obs&room=${room}&slot=${id}&debug=false`;
        navigator.clipboard.writeText(url).then(() => {
          alert(`✅ Link OBS Slot ${id} COPIADO!\n\nPégalo en OBS Studio`);
        });
      };

      return (
        <div className="director">
          <div className="header">
            <h2 style={{color: '#8b5cf6'}}><i className="fas fa-th-large"></i> MONITOR | {room}</h2>
            <small style={{color: '#64748b'}}>Link OBS siempre visible • Sin parpadeo</small>
          </div>
          <div className="grid">
            {[1,2,3].map(id => {
              const slot = slots[id] || {};
              const hasStream = !!slot.stream;
              return (
                <div key={id} className="slot">
                  <div className="video-area">
                    {hasStream ? (
                      <>
                        <div className="slot-header">
                          <div className={`badge ${slot.source || 'camera'}`}>
                            {slot.source === 'screen' ? '📺 PANTALLA' : '📹 CÁMARA'}
                          </div>
                          <div className="badge connection">🟢 LAN</div>
                        </div>
                        <button onClick={() => toggleLive(id)} className={`live-btn ${activeSlot===id?'bg-red-600':'bg-emerald-600'}`}>
                          <i className={`fas ${activeSlot===id?'fa-circle':'fa-circle-play'}`}></i>
                          {activeSlot===id ? 'EN VIVO' : 'ACTIVAR EN VIVO'}
                        </button>
                      </>
                    ) : (
                      <div className="status">
                        <i className="fas fa-laptop" style={{fontSize:'2.5rem', marginBottom:'10px', opacity:0.3}}></i>
                        <div>SLOT {id}</div>
                        <small>Esperando presentador...</small>
                      </div>
                    )}
                    <button className="copy-btn" onClick={() => copyObsUrl(id)}>
                      <i className="fas fa-copy"></i> Link OBS
                    </button>
                    {hasStream && <Video stream={slot.stream} muted={false} />}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // ==========================================
    // PRESENTER (con cleanup de streams)
    // ==========================================
    const Presenter = ({ room, slot }) => {
      const [step, setStep] = useState('select');
      const [source, setSource] = useState('screen');
      const [includeMic, setIncludeMic] = useState(false);
      const [localStream, setLocalStream] = useState(null);
      const [tally, setTally] = useState('idle');
      const [error, setError] = useState('');
      const [muted, setMuted] = useState(false);
      const [connStatus, setConnStatus] = useState({ director: 'waiting', obs: 'waiting' });
      const peer = useRef(null);
      const micTrackRef = useRef(null);
      const directorIntervalRef = useRef(null);
      const obsIntervalRef = useRef(null);
      const myId = useRef(`pres_${room}_${slot}_${Date.now()}`).current;

      // Inicialización PeerJS
      useEffect(() => {
        peer.current = new Peer(myId, PEER_CONFIG);
        peer.current.on('open', () => console.log('✅ Presenter listo'));
        peer.current.on('error', err => { if (err.type !== 'peer-unavailable') console.error(err); });

        return () => {
          peer.current?.destroy();
          clearInterval(directorIntervalRef.current);
          clearInterval(obsIntervalRef.current);
        };
      }, []);

      // Cleanup de streams (evita cámara/micro encendidos al cerrar)
      useEffect(() => {
        return () => {
          if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
          }
        };
      }, [localStream]);

      const startLocalStream = async () => {
        try {
          setError('');
          let stream;

          if (source === 'screen') {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            if (includeMic) {
              const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
              micTrackRef.current = micStream.getAudioTracks()[0];
              stream = new MediaStream([screenStream.getVideoTracks()[0], ...screenStream.getAudioTracks(), micTrackRef.current]);
            } else {
              stream = screenStream;
            }
            screenStream.getVideoTracks()[0].onended = () => window.location.reload();
          } else {
            stream = await navigator.mediaDevices.getUserMedia({ 
              video: { width: { ideal: 1280 }, height: { ideal: 720 } }, 
              audio: true 
            });
            micTrackRef.current = stream.getAudioTracks()[0];
          }

          setLocalStream(stream);
          setStep('live');
          connectToDirector(stream);
          connectToObs(stream);
        } catch (e) {
          setError(e.message || 'Error al obtener el stream');
        }
      };

      const connectToDirector = (stream) => {
        let attempts = 0;
        const tryDirector = () => {
          if (!peer.current || attempts >= 15 || connStatus.director === 'connected') return;
          attempts++;
          const dirCall = peer.current.call(`dir_${room}`, stream);
          if (dirCall) dirCall.on('open', () => setConnStatus(s => ({...s, director:'connected'})));

          const dataConn = peer.current.connect(`dir_${room}`);
          dataConn.on('open', () => {
            setConnStatus(s => ({...s, director:'connected'}));
            dataConn.send({ type: 'info', source, slot: parseInt(slot)||1 });
          });
          dataConn.on('data', data => { 
            if (data.tally !== undefined) setTally(data.tally); 
          });
        };

        tryDirector();
        directorIntervalRef.current = setInterval(tryDirector, 2500);
      };

      const connectToObs = (stream) => {
        let attempts = 0;
        const tryObs = () => {
          if (!peer.current || attempts >= 40) return;
          attempts++;
          const obsCall = peer.current.call(`obs_${room}_${slot}`, stream);
          if (obsCall) obsCall.on('open', () => setConnStatus(s => ({...s, obs:'connected'})));
        };

        setTimeout(tryObs, 1500);
        obsIntervalRef.current = setInterval(tryObs, 5000);
        setTimeout(() => clearInterval(obsIntervalRef.current), 180000);
      };

      const toggleMic = () => {
        if (micTrackRef.current) {
          micTrackRef.current.enabled = !micTrackRef.current.enabled;
          setMuted(!micTrackRef.current.enabled);
        }
      };

      if (step === 'select') {
        return (
          <div className="lobby">
            <div className="glass">
              <h2 style={{color:'#8b5cf6', marginBottom:'20px'}}><i className="fas fa-laptop"></i> Laptop {slot}</h2>
              <div className="mode-grid">
                <div className={`mode-card ${source==='screen'?'selected':''}`} onClick={()=>setSource('screen')}>
                  <div className="mode-icon"><i className="fas fa-desktop"></i></div>
                  <div>Presentación</div>
                </div>
                <div className={`mode-card ${source==='camera'?'selected':''}`} onClick={()=>setSource('camera')}>
                  <div className="mode-icon"><i className="fas fa-video"></i></div>
                  <div>Cámara Web</div>
                </div>
              </div>
              {source==='screen' && (
                <label className="checkbox-container" onClick={()=>setIncludeMic(!includeMic)}>
                  <input type="checkbox" checked={includeMic} onChange={e=>setIncludeMic(e.target.checked)} />
                  <span className="checkbox-label">Incluir micrófono</span>
                </label>
              )}
              {error && <div className="error">{error}</div>}
              <button className="btn btn-purple" onClick={startLocalStream}>
                <i className="fas fa-play"></i> INICIAR TRANSMISIÓN
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="presenter">
          <div className={`tally-border ${tally}`}></div>
          <div className={`on-air ${tally==='live'?'active':''}`}>● EN VIVO</div>
          <div className="audio-indicator">
            {source==='screen' ? (includeMic ? '🎤 Micrófono activo' : '🔇 Solo audio del sistema') : '🎤 Cámara con audio'}
          </div>
          <div className="connection-indicator">
            Director: {connStatus.director==='connected'?'🟢':'🟡'} | OBS: {connStatus.obs==='connected'?'🟢':'🟡'}
          </div>
          {localStream && <Video stream={localStream} muted={true} style={{objectFit: source==='screen'?'contain':'cover'}} />}
          <div className="p-controls">
            {(includeMic || source==='camera') && <button className={`p-btn ${muted?'off':''}`} onClick={toggleMic}><i className={muted?'fas fa-microphone-slash':'fas fa-microphone'}></i></button>}
            <button className="p-btn switch" onClick={()=>window.location.reload()}>CAMBIAR</button>
            <button className="p-btn" style={{background:'#ef4444'}} onClick={()=>window.location.href='./'}><i className="fas fa-sign-out-alt"></i></button>
          </div>
        </div>
      );
    };

    // ==========================================
    // OBS (optimizado - código muerto eliminado)
    // ==========================================
    const Obs = ({ room, slot, debug }) => {
      const [stream, setStream] = useState(null);
      const [debugInfo, setDebugInfo] = useState('Iniciando...');
      const peer = useRef(null);

      useEffect(() => {
        const obsId = `obs_${room}_${slot}`;
        peer.current = new Peer(obsId, PEER_CONFIG);
        peer.current.on('open', () => setDebugInfo('✅ Listo'));
        peer.current.on('call', call => {
          call.answer();
          call.on('stream', s => {
            setStream(s);
            setDebugInfo('📺 STREAM ACTIVO');
          });
        });
        return () => peer.current?.destroy();
      }, [room, slot]);

      return (
        <div className="obs">
          {stream ? (
            <>
              <Video stream={stream} muted={false} className="obs-video" />
              <div className="obs-ready" style={{display:'block'}}>✅ OBS RECEIVER • SLOT {slot}</div>
            </>
          ) : (
            <div className="obs-wait">
              <i className="fas fa-circle-notch fa-spin" style={{fontSize:'3rem', marginBottom:'15px'}}></i>
              <div>Esperando señal del Presentador...</div>
              <small style={{marginTop:'20px', opacity:0.6}}>ID: obs_{room}_{slot}</small>
            </div>
          )}
          {debug && <div style={{position:'absolute', bottom: '20px', left: '20px', background: 'rgba(0,0,0,0.7)', padding: '8px 12px', borderRadius: '4px', fontSize: '0.75rem', zIndex: 100}}>{debugInfo}</div>}
        </div>
      );
    };

    // ==========================================
    // APP
    // ==========================================
    const App = () => {
      const [state, setState] = useState({ mode: null, room: 'EVENTO', slot: '1', debug: true });

      useEffect(() => {
        const p = new URLSearchParams(window.location.search);
        const m = p.get('mode');
        const r = p.get('room');
        const s = p.get('slot') || '1';
        const d = p.get('debug') !== 'false';

        if (m && r) {
          if (m === 'obs') document.body.style.background = 'transparent';
          setState({ mode: m, room: r.toUpperCase(), slot: s, debug: d });
        }
      }, []);

      if (state.mode === 'director') return <Director room={state.room} />;
      if (state.mode === 'obs') return <Obs room={state.room} slot={state.slot} debug={state.debug} />;
      if (state.mode === 'presenter') return <Presenter room={state.room} slot={state.slot} />;

      return (
        <div className="lobby">
          <div className="glass">
            <h1 style={{color:'#8b5cf6', marginBottom:'20px', textAlign:'center'}}><i className="fas fa-broadcast-tower"></i> StreamCall LAN</h1>
            <input 
              value={state.room} 
              onChange={e => setState({...state, room: e.target.value.toUpperCase()})} 
              placeholder="NOMBRE SALA" 
            />
            <button className="btn" onClick={() => window.location.href=`?mode=director&room=${state.room}`}>Soy Director</button>
            <button className="btn btn-purple" onClick={() => window.location.href=`?mode=presenter&room=${state.room}&slot=1`}>Soy Presentador (Slot 1)</button>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
